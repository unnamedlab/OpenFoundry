{{- $root := . -}}
{{- $release := .Values.release -}}
{{- $temporal := .Values.temporal | default dict -}}
{{- $workersRoot := .Values.temporalWorkers | default dict -}}
{{- $globalEnabled := true -}}
{{- if hasKey $workersRoot "enabled" -}}
  {{- $globalEnabled = $workersRoot.enabled -}}
{{- end -}}
{{- $workerDefaults := $workersRoot.defaults | default dict -}}
{{- $serviceMonitor := $workersRoot.serviceMonitor | default dict -}}
{{- if $globalEnabled }}
{{- range $name, $worker := ($workersRoot.workers | default dict) }}
{{- $enabled := true -}}
{{- if hasKey $worker "enabled" -}}
  {{- $enabled = $worker.enabled -}}
{{- end -}}
{{- if $enabled }}
{{- $taskQueue := required (printf "temporalWorkers.workers.%s.taskQueue is required" $name) $worker.taskQueue -}}
{{- $metricsPort := default (default 9090 $workerDefaults.metricsPort) $worker.metricsPort -}}
{{- $workerImage := $worker.image | default dict -}}
{{- $env := mergeOverwrite
      (dict
        "TEMPORAL_ADDRESS" ($temporal.address | default "temporal-frontend.temporal.svc.cluster.local:7233")
        "TEMPORAL_HOST_PORT" ($temporal.address | default "temporal-frontend.temporal.svc.cluster.local:7233")
        "TEMPORAL_NAMESPACE" ($temporal.namespace | default "default")
        "TEMPORAL_TASK_QUEUE" $taskQueue
        "OF_LOG_LEVEL" ($workerDefaults.logLevel | default "info")
        "METRICS_ADDR" (printf ":%v" $metricsPort)
      )
      ($workerDefaults.env | default dict)
      ($worker.env | default dict)
  -}}
{{- $svc := mergeOverwrite
      (dict
        "replicas" ($workerDefaults.replicas | default 2)
        "image" (dict "repository" ($workerImage.repository | default $name) "tag" ($workerImage.tag | default $.Values.image.tag))
        "ports" (list (dict "name" "metrics" "containerPort" $metricsPort "servicePort" $metricsPort))
        "env" $env
        "envSecrets" ($worker.envSecrets | default dict)
        "envFrom" ($worker.envFrom | default list)
        "service" (dict "enabled" true)
        "serviceAnnotations" ($worker.serviceAnnotations | default dict)
        "probes" (dict
          "readiness" (dict "enabled" true "path" "/healthz" "port" "metrics" "initialDelaySeconds" 5 "periodSeconds" 10)
          "liveness" (dict "enabled" true "path" "/healthz" "port" "metrics" "initialDelaySeconds" 15 "periodSeconds" 20)
        )
        "resources" ($workerDefaults.resources | default dict)
        "autoscaling" ($workerDefaults.autoscaling | default dict)
        "pdb" ($workerDefaults.pdb | default dict)
      )
      (omit $worker "enabled" "taskQueue" "metricsPort" "env" "envSecrets" "envFrom" "serviceAnnotations")
  -}}
{{- $ctx := dict
    "root" $root
    "name" $name
    "release" $release
    "image" (include "of-shared.image" (dict "root" $root "name" $name "service" $svc))
    "service" $svc
}}
---
{{ include "of-shared.serviceaccount" (dict "root" $root "name" $name "release" $release "annotations" (default dict $svc.serviceAccountAnnotations)) }}
---
{{ include "of-shared.deployment" $ctx }}
---
{{ include "of-shared.service" $ctx }}
---
{{ include "of-shared.networkpolicy" (merge $ctx (dict "allowFrom" (list))) }}
{{- if and $svc.autoscaling $svc.autoscaling.enabled }}
---
{{ include "of-shared.hpa" (dict "root" $root "name" $name "release" $release "autoscaling" $svc.autoscaling) }}
{{- end }}
{{- $globalPdb := ($root.Values.global.podDisruptionBudget | default dict) -}}
{{- $pdb := $svc.pdb | default dict -}}
{{- if not (hasKey $pdb "enabled") }}
  {{- $_ := set $pdb "enabled" ($globalPdb.enabled | default false) -}}
{{- end }}
{{- if and $pdb $pdb.enabled }}
---
{{ include "of-shared.pdb" (dict "root" $root "name" $name "release" $release "pdb" (mergeOverwrite (dict) $globalPdb $pdb)) }}
{{- end }}
{{- if $serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $name }}
  labels:
    {{- include "of-shared.labels" $ctx | nindent 4 }}
    {{- with ($serviceMonitor.labels | default dict) }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ $release }}
  endpoints:
    - port: metrics
      path: {{ $serviceMonitor.path | default "/metrics" | quote }}
      interval: {{ $serviceMonitor.interval | default "30s" | quote }}
      scrapeTimeout: {{ $serviceMonitor.scrapeTimeout | default "10s" | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
