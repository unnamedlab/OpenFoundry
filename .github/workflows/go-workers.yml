name: CI — Go workers (retired)

# All Go workers were retired by FASE 3-7 of the Foundry-pattern
# migration (Tareas 3.6, 4.3, 5.4, 6.5, 7.5). The workflow is
# kept as a placeholder so log links from old PRs do not 404; it
# only runs when files inside workers-go/ change, which should
# never happen until FASE 9 / Tarea 9.x removes the directory in
# full.
#
# When that cleanup lands, delete this workflow file too.

on:
  push:
    branches: [main]
    paths:
      - "workers-go/**"
      - ".github/workflows/go-workers.yml"
  pull_request:
    branches: [main]
    paths:
      - "workers-go/**"
      - ".github/workflows/go-workers.yml"

jobs:
  retired:
    name: Go workers retired
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "All Go workers (pipeline, reindex, workflow-automation,"
          echo "automation-ops, approvals) have been retired."
          echo "See docs/architecture/migration-plan-foundry-pattern-orchestration.md"
          echo "for the per-task replacement. FASE 9 cleanup will remove"
          echo "the workers-go/ directory entirely."
