---
# Iceberg catalog backed by Apache Polaris (REST catalog) and the in-cluster
# Ceph RGW S3 endpoint provisioned by Rook (see infra/k8s/rook/).
#
# The data is stored in the `openfoundry-iceberg` bucket (ObjectBucketClaim
# in infra/k8s/rook/bucket.yaml). S3 credentials are taken from the
# `trino-s3-iceberg` Secret — see runbook for how it is harvested from the
# OBC and rotated.
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-catalog-iceberg
  namespace: trino
  labels:
    app.kubernetes.io/name: trino
    app.kubernetes.io/component: catalog
    openfoundry.dev/catalog: iceberg
data:
  iceberg.properties: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.polaris.svc:8181/api/catalog
    iceberg.rest-catalog.warehouse=openfoundry
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_OAUTH2_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    iceberg.file-format=PARQUET
    iceberg.compression-codec=ZSTD
    # S3 (Ceph RGW) settings for the underlying storage.
    fs.native-s3.enabled=true
    s3.endpoint=http://rook-ceph-rgw-openfoundry.rook-ceph.svc:80
    s3.region=us-east-1
    s3.path-style-access=true
    s3.aws-access-key=${ENV:S3_ICEBERG_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_ICEBERG_SECRET_KEY}
