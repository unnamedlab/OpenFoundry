---
# S7.3.a + S7.3.b — Strimzi KafkaMirrorMaker2 replicating region A → B.
#
# Topology:
#   * Source cluster: `openfoundry` (region A, this k8s context).
#   * Target cluster: `openfoundry-b` (region B, reached over the
#     external listener `tls://kafka-b.openfoundry.example.com:9094`).
#
# Naming policy (S7.3.b):
#   * `replication.policy.class` is the default
#     `DefaultReplicationPolicy`, which prefixes replicated topics with
#     `<sourceClusterAlias>.`. We set the source alias to `dc-a`, so a
#     topic `cdc.postgres` in A appears as `dc-a.cdc.postgres` in B.
#   * The IdentityReplicationPolicy (preserves names) is intentionally
#     NOT used: it makes consumer-group offset translation ambiguous and
#     blocks bidirectional replication should we ever need active/active.
#
# Topics replicated:
#   * `topicsPattern: "cdc\\..*, dataset\\..*, lineage\\..*, model\\..*, audit\\..*"`
#     covers every base topic class declared in `../kafka-topics.yaml`
#     (cdc.*, dataset.changes, lineage.events, model.inferences,
#     audit.events) and any future topic that follows the same prefix
#     convention.
#   * Internal MM2 topics (`mm2-*`, `heartbeats`, `*.checkpoints.internal`,
#     `*.offsets.internal`) are excluded from the user pattern; MM2
#     creates and manages them itself.
#
# Connectors deployed:
#   * MirrorSourceConnector — copies records from A to B.
#   * MirrorCheckpointConnector — translates consumer group offsets so
#     consumers can resume in B after failover.
#   * MirrorHeartbeatConnector — emits `heartbeats` for lag monitoring.
#
# Auth: external listener of region B uses mTLS. The certificate /
# truststore Secrets `mm2-source-tls` and `mm2-target-tls` are wired in
# from cert-manager in region A (out of scope for this manifest).
#
# Lag SLO target: end-to-end replication lag < 30s for cdc.* topics under
# normal load. Monitored via the JMX metrics scraped by the Strimzi
# operator (`KafkaConnect.connector-metrics`) and the
# `kafka_connect_mirror_source_connector_replication_latency_ms` gauge.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaMirrorMaker2
metadata:
  name: of-mm2-a-to-b
  namespace: kafka
  labels:
    app.kubernetes.io/name: kafka-mirrormaker2
    app.kubernetes.io/instance: of-mm2-a-to-b
    openfoundry.io/dr-component: kafka-mm2
spec:
  version: 3.8.0
  replicas: 2
  connectCluster: openfoundry-b-target
  clusters:
    - alias: dc-a
      bootstrapServers: openfoundry-kafka-bootstrap.kafka.svc:9093
      tls:
        trustedCertificates:
          - secretName: openfoundry-cluster-ca-cert
            certificate: ca.crt
      authentication:
        type: tls
        certificateAndKey:
          secretName: mm2-source-tls
          certificate: user.crt
          key: user.key
      config:
        # Source-side consumer tuning — wide read pipe, no auto commit
        # (offsets are persisted to the target's `mm2-offsets` topic).
        consumer.max.poll.records: "2000"
        consumer.fetch.min.bytes: "1048576"
        consumer.fetch.max.wait.ms: "500"
    - alias: openfoundry-b-target
      bootstrapServers: kafka-b.openfoundry.example.com:9094
      tls:
        trustedCertificates:
          - secretName: openfoundry-b-cluster-ca-cert
            certificate: ca.crt
      authentication:
        type: tls
        certificateAndKey:
          secretName: mm2-target-tls
          certificate: user.crt
          key: user.key
      config:
        # MM2 internal topics on the target (offsets, status, configs).
        config.storage.replication.factor: "3"
        offset.storage.replication.factor: "3"
        status.storage.replication.factor: "3"
        # Producer durability — match A's `acks=all` semantics so
        # replicated records inherit the same durability guarantees.
        producer.acks: "all"
        producer.compression.type: "lz4"
        producer.linger.ms: "20"
        producer.batch.size: "65536"
        producer.enable.idempotence: "true"
  mirrors:
    - sourceCluster: dc-a
      targetCluster: openfoundry-b-target
      sourceConnector:
        tasksMax: 6
        config:
          # S7.3.b — keep the default policy; replicated topics get
          # `dc-a.` prefix on the target.
          replication.policy.class: >-
            org.apache.kafka.connect.mirror.DefaultReplicationPolicy
          replication.policy.separator: "."
          replication.factor: "3"
          sync.topic.acls.enabled: "false"
          sync.topic.configs.enabled: "true"
          refresh.topics.interval.seconds: "60"
          offset-syncs.topic.replication.factor: "3"
      checkpointConnector:
        tasksMax: 2
        config:
          # Consumer group offsets translated to the target every 30s so
          # downstream consumers in region B can resume from the right
          # position on failover. `groups.exclude` filters MM2's own
          # internal groups.
          replication.policy.class: >-
            org.apache.kafka.connect.mirror.DefaultReplicationPolicy
          replication.policy.separator: "."
          checkpoints.topic.replication.factor: "3"
          sync.group.offsets.enabled: "true"
          sync.group.offsets.interval.seconds: "30"
          emit.checkpoints.interval.seconds: "30"
          groups.exclude: "console-consumer-.*, connect-.*, __.*"
      heartbeatConnector:
        tasksMax: 1
        config:
          heartbeats.topic.replication.factor: "3"
          emit.heartbeats.interval.seconds: "5"
      topicsPattern: "cdc\\..*, dataset\\..*, lineage\\..*, model\\..*, audit\\..*"
      topicsExcludePattern: "mm2-.*, .*\\.replica"
      groupsPattern: ".*"
      groupsExcludePattern: "console-consumer-.*, connect-.*, __.*"
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  jvmOptions:
    -Xms: 1536m
    -Xmx: 1536m
  metricsConfig:
    type: jmxPrometheusExporter
    valueFrom:
      configMapKeyRef:
        name: of-mm2-metrics
        key: metrics-config.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: of-mm2-metrics
  namespace: kafka
data:
  metrics-config.yaml: |
    lowercaseOutputName: true
    rules:
      - pattern: "kafka.connect.mirror<type=MirrorSourceConnector, target=(.+), topic=(.+), partition=(.+)><>(replication-latency-ms|record-age-ms|byte-rate)"
        name: kafka_mm2_source_$4
        labels:
          target: "$1"
          topic: "$2"
          partition: "$3"
        type: GAUGE
      - pattern: "kafka.connect.mirror<type=MirrorCheckpointConnector, source=(.+), target=(.+)><>(checkpoint-latency-ms)"
        name: kafka_mm2_checkpoint_$3
        labels:
          source: "$1"
          target: "$2"
        type: GAUGE
      - pattern: "kafka.connect.mirror<type=MirrorHeartbeatConnector><>(heartbeat-rate)"
        name: kafka_mm2_heartbeat_rate
        type: GAUGE
