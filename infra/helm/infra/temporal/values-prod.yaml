# Production values for the official `temporalio/temporal` Helm chart
# (>=0.46.0). Tracks the `~0.46` minor; the renovate config in
# `.github/renovate.json` pins this file when bumping.
#
# Decisions encoded here:
#   * Persistence backend: Apache Cassandra cluster `of-cass-prod`,
#     keyspaces `temporal_persistence` (default) + `temporal_visibility`
#     (visibility), both pre-created with NTS{dc1:3,dc2:3,dc3:3}.
#   * No Elasticsearch. Visibility uses Cassandra advanced visibility
#     (Temporal 1.22+) — sufficient for the workloads in S2 and avoids
#     adding ES to the operator footprint.
#   * Server tiers: 3 replicas each (frontend, history, matching,
#     worker). PodAntiAffinity on zone => one replica per AZ.
#   * The chart's bundled cassandra/elasticsearch/prometheus subcharts
#     are disabled — those components are owned by other operators.
#   * UI auth disabled at the chart level (oauth2-proxy sidecar lives
#     in `ui-ingress.yaml` and routes through edge-gateway-service).

server:
  image:
    repository: temporalio/server
    tag: 1.24.2  # tracked alongside chart 0.46.x
  replicaCount: 3

  config:
    logLevel: info
    numHistoryShards: 4096

    persistence:
      defaultStore: default
      visibilityStore: visibility

      datastores:
        default:
          cassandra:
            hosts:
              - of-cass-prod-dc1-service.cassandra.svc.cluster.local
              - of-cass-prod-dc2-service.cassandra.svc.cluster.local
              - of-cass-prod-dc3-service.cassandra.svc.cluster.local
            port: 9042
            keyspace: temporal_persistence
            user: { secretKeyRef: { name: temporal-cassandra-credentials, key: username } }
            password: { secretKeyRef: { name: temporal-cassandra-credentials, key: password } }
            consistency:
              default:
                consistency: LOCAL_QUORUM
                serialConsistency: LOCAL_SERIAL
            tls:
              enabled: true
              # Cert mount provided by the Linkerd CA + cert-manager
              # bundle shared with the Cassandra cluster.
              caFile: /etc/temporal/cassandra-tls/ca.crt
              certFile: /etc/temporal/cassandra-tls/tls.crt
              keyFile: /etc/temporal/cassandra-tls/tls.key
              enableHostVerification: true
              serverName: of-cass-prod
            maxConns: 20

        visibility:
          cassandra:
            hosts:
              - of-cass-prod-dc1-service.cassandra.svc.cluster.local
              - of-cass-prod-dc2-service.cassandra.svc.cluster.local
              - of-cass-prod-dc3-service.cassandra.svc.cluster.local
            port: 9042
            keyspace: temporal_visibility
            user: { secretKeyRef: { name: temporal-cassandra-credentials, key: username } }
            password: { secretKeyRef: { name: temporal-cassandra-credentials, key: password } }
            consistency:
              default:
                consistency: LOCAL_QUORUM
                serialConsistency: LOCAL_SERIAL
            tls:
              enabled: true
              caFile: /etc/temporal/cassandra-tls/ca.crt
              certFile: /etc/temporal/cassandra-tls/tls.crt
              keyFile: /etc/temporal/cassandra-tls/tls.key
              enableHostVerification: true
              serverName: of-cass-prod
            maxConns: 10

  # Mount the cert-manager-issued client certificate for mTLS to the
  # Cassandra cluster. The secret is generated by the Issuer in the
  # `cassandra` namespace and replicated into `temporal` via
  # reflector / external-secrets.
  additionalVolumes:
    - name: cassandra-tls
      secret:
        secretName: temporal-cassandra-client-tls
  additionalVolumeMounts:
    - name: cassandra-tls
      mountPath: /etc/temporal/cassandra-tls
      readOnly: true

  frontend:
    replicaCount: 3
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2,    memory: 2Gi }
    podAnnotations:
      linkerd.io/inject: enabled
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - { key: app.kubernetes.io/component, operator: In, values: [frontend] }
            topologyKey: topology.kubernetes.io/zone

  history:
    replicaCount: 3
    resources:
      requests: { cpu: 1,    memory: 2Gi }
      limits:   { cpu: 4,    memory: 4Gi }
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - { key: app.kubernetes.io/component, operator: In, values: [history] }
            topologyKey: topology.kubernetes.io/zone

  matching:
    replicaCount: 3
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2,    memory: 2Gi }
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - { key: app.kubernetes.io/component, operator: In, values: [matching] }
            topologyKey: topology.kubernetes.io/zone

  worker:
    replicaCount: 3
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2,    memory: 2Gi }
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - { key: app.kubernetes.io/component, operator: In, values: [worker] }
            topologyKey: topology.kubernetes.io/zone

  metrics:
    serviceMonitor:
      enabled: false   # we ship our own — see servicemonitor.yaml.
    prometheus:
      timerType: histogram

# The chart's bundled stateful subcharts are disabled — these
# components are owned by other operators in this cluster.
cassandra:
  enabled: false
elasticsearch:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
mysql:
  enabled: false

# Schema upgrades. The chart runs `temporal-cassandra-tool setup-schema`
# on first install and `update-schema` on upgrades. The keyspaces must
# exist before this Job runs (see cassandra-keyspaces-job.yaml).
schema:
  setup:
    enabled: true
    backoffLimit: 6
  update:
    enabled: true
    backoffLimit: 6

# UI is enabled but auth is delegated to oauth2-proxy in the ingress
# overlay (`ui-ingress.yaml`). The chart's built-in auth would conflict
# with our central OIDC.
web:
  enabled: true
  image:
    repository: temporalio/ui
    tag: 2.30.1
  replicaCount: 2
  config:
    auth:
      enabled: false   # handled upstream by oauth2-proxy / edge-gateway.
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
