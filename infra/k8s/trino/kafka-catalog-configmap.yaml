---
# Kafka catalog — read-only, intended for troubleshooting and ad-hoc
# inspection of topics. The Trino Kafka connector is *not* exposed to
# end users and must never be used to ingest data into Iceberg; use
# the Flink/Spark ingestion pipelines instead.
#
# Schemas for each topic are kept in the Confluent Schema Registry; the
# connector resolves Avro/Protobuf records via the registry endpoint
# below. Add new topics by appending them to `kafka.table-names` and
# providing the matching `*.json` table descriptor in
# /etc/trino/kafka/ (mounted from this same ConfigMap).
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-catalog-kafka
  namespace: trino
  labels:
    app.kubernetes.io/name: trino
    app.kubernetes.io/component: catalog
    openfoundry.dev/catalog: kafka
data:
  kafka.properties: |
    connector.name=kafka
    kafka.nodes=kafka-bootstrap.kafka.svc:9092
    kafka.default-schema=default
    kafka.table-names=default.audit_events,default.lineage_events,default.pipeline_runs
    kafka.hide-internal-columns=false
    # Read-only safety net: refuse any INSERT/DELETE/UPDATE planner pushdown.
    kafka.messages-per-split=1000
    # Avro decoding via Confluent Schema Registry.
    kafka.table-description-supplier=confluent
    kafka.confluent-schema-registry-url=http://schema-registry.kafka.svc:8081
    kafka.confluent-subjects-cache-refresh-interval=1m
    # Bound the per-query data scanned to keep ad-hoc browsing safe.
    kafka.max-poll-records=500
