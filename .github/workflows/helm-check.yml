name: CI — Helm

on:
  push:
    branches: [main]
    paths:
      - "infra/k8s/helm/**"
      - "infra/k8s/platform/**"
      - ".github/workflows/helm-check.yml"
      - "justfile"
  pull_request:
    branches: [main]
    paths:
      - "infra/k8s/helm/**"
      - "infra/k8s/platform/**"
      - ".github/workflows/helm-check.yml"
      - "justfile"

jobs:
  helm-bundle:
    name: Helm Split Bundle Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4
      - uses: helmfile/helmfile-action@v2
        with:
          helmfile-version: v0.171.0
      - name: Refresh chart dependencies
        run: |
          for release in of-platform of-data-engine of-ontology of-ml-aip of-apps-ops; do
            helm dependency update "infra/k8s/helm/${release}"
          done
      - name: Lint dev / staging / prod
        working-directory: infra/k8s/helm
        run: |
          helmfile -e dev     lint
          helmfile -e staging lint
          helmfile -e prod    lint
      - name: Render dev bundle
        working-directory: infra/k8s/helm
        run: helmfile -e dev     template > /tmp/openfoundry-dev.yaml
      - name: Render staging bundle
        working-directory: infra/k8s/helm
        run: helmfile -e staging template > /tmp/openfoundry-staging.yaml
      - name: Render prod bundle
        working-directory: infra/k8s/helm
        run: helmfile -e prod    template > /tmp/openfoundry-prod.yaml
      - name: Lint platform dev / staging / prod
        working-directory: infra/k8s/platform
        run: |
          helmfile -e dev     lint
          helmfile -e staging lint
          helmfile -e prod    lint
      - name: Render platform prod bundle
        working-directory: infra/k8s/platform
        run: helmfile -e prod template --args "--api-versions monitoring.coreos.com/v1/PodMonitor" > /tmp/openfoundry-platform-prod.yaml
