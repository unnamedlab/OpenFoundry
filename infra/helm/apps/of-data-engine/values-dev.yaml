image:
  registry: registry.registry.svc.cluster.local:5000
  tag: "0.1.0"

global:
  imagePullPolicy: IfNotPresent
  deploymentFabric:
    environment: dev
  autoscaling:
    enabled: false
  resourcesOverride:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  kafka:
    bootstrap: openfoundry-kafka-bootstrap.kafka.svc:9092

services:
  sql-bi-gateway-service:
    # NOTE — S8 / ADR-0030: dev override for the consolidated gateway.
    replicas: 1
    env:
      DISTRIBUTED_QUERY_WORKERS: "2"
      RUST_LOG: info
      TRINO_FLIGHT_SQL_URL: http://trino-flight-sql-proxy.trino.svc:50133
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      keda:
        enabled: false
    envSecrets:
      DATABASE_URL:
        secretName: sql-bi-gateway-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: sql-bi-gateway-db-dsn
        key: reader_url
  pipeline-build-service:
    replicas: 1
  analytical-logic-service:
    envSecrets:
      DATABASE_URL:
        secretName: analytical-logic-db-dsn
        key: writer_url
      DATABASE_READ_URL:
