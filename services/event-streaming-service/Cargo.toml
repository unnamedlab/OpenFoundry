[package]
name = "event-streaming-service"
description = "Event streaming router: dispatches events to the correct messaging backend (NATS for control / signal traffic, Kafka for data) using a declarative routing table"
build = "build.rs"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.async-nats]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.bytes]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.globset]
workspace = true

[dependencies.prometheus]
workspace = true

[dependencies.prost]
workspace = true

[dependencies.regex]
workspace = true

[dependencies.reqwest]
workspace = true
features = ["multipart"]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.serde_yaml]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tokio-stream]
version = "0.1"
