---
# S6.1.b — `pg-runtime-config` workhorse CNPG cluster.
#
# Hosts runtime/operational state for the bulk of services that do not
# fit `pg-schemas` (definitions/catalogs) or `pg-policy` (security/audit).
# Includes session/scheduler/observability/SQL/notebook/control-plane
# state — 23 schemas; see `pg-runtime-config-bootstrap-sql` ConfigMap
# for the exhaustive list and the per-schema role grants.
#
# Sized largest of the four: 500Gi (heaviest write workload), 12 cores
# limit, 32Gi memory limit. Two PVCs per instance — separate WAL.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-runtime-config
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: pg-runtime-config
    app.kubernetes.io/component: postgres
    openfoundry.io/managed-by: cnpg
    openfoundry.io/cluster-role: runtime-config
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised

  minSyncReplicas: 1
  maxSyncReplicas: 1

  postgresql:
    parameters:
      synchronous_commit: "on"
      wal_level: "replica"
      max_wal_size: "8GB"
      shared_buffers: "4GB"
      work_mem: "64MB"
      effective_cache_size: "16GB"
      max_connections: "600"

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: pg-runtime-config-app
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: pg-runtime-config-bootstrap-sql
            key: bootstrap.sql

  storage:
    size: 500Gi
    storageClass: ceph-rbd

  walStorage:
    size: 100Gi
    storageClass: ceph-rbd

  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "12"
      memory: 32Gi

  affinity:
    topologyKey: topology.kubernetes.io/zone
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred

  monitoring:
    enablePodMonitor: true

  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://openfoundry-pg-backups/pg-runtime-config"
      endpointURL: "http://rook-ceph-rgw-openfoundry-store.rook-ceph.svc:80"
      s3Credentials:
        accessKeyId:
          name: pg-runtime-config-backup
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-runtime-config-backup
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 2
