# Bench JWT credential, projected from Vault by external-secrets.
#
# Vault path:
#   secret/data/openfoundry/bench/ontology-bench-token
#
# That secret is rotated by identity-federation every 12 h. The JWT it
# produces is signed with the standard tenant-scoped key and carries:
#
#   {
#     "sub":    "svc:bench-runner",
#     "tenant": "bench-tenant",
#     "scope":  ["ontology:read", "ontology:list", "actions:execute"],
#     "exp":    <now + 12h>
#   }
#
# Limiting the scope to bench-tenant means an accidental leak cannot
# be replayed against production tenants — Cedar policies in
# authz-cedar deny cross-tenant traversal regardless of the bearer.
#
# The plain `stringData` block at the bottom is a placeholder; in any
# real environment external-secrets owns the contents and overwrites
# the literal `REPLACE_VIA_EXTERNAL_SECRETS` value on the first
# reconcile. We keep the placeholder so `kubectl apply -f` against a
# kind cluster does not 404 the Job spec.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bench-credentials
  namespace: openfoundry-bench
spec:
  refreshInterval: 1h
  secretStoreRef:
    # `vault-backend` is the cluster-wide ClusterSecretStore wired up
    # in infra/k8s/platform/manifests/observability/external-secrets/. It uses the
    # Kubernetes auth method with the `bench-runner` ServiceAccount
    # bound to a Vault role that can only read the bench path.
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: bench-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        annotations:
          openfoundry.io/scope: "tenant=bench-tenant"
          openfoundry.io/issuer: "identity-federation"
      data:
        jwt: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: openfoundry/bench/ontology-bench-token
        property: token
---
# Placeholder Secret so kustomize/kubectl applies in dev clusters
# without external-secrets succeed. The ExternalSecret above takes
# ownership and overwrites this on its first reconcile in any cluster
# where the operator is installed.
apiVersion: v1
kind: Secret
metadata:
  name: bench-credentials
  namespace: openfoundry-bench
  annotations:
    external-secrets.io/source: "vault:secret/data/openfoundry/bench/ontology-bench-token"
    openfoundry.io/note: "Overwritten by ExternalSecret in any non-trivial cluster."
type: Opaque
stringData:
  jwt: "REPLACE_VIA_EXTERNAL_SECRETS"
