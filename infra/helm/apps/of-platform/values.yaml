# of-platform values — owns gateway, identity, authz, tenancy, the
# shared ingress, and the cross-release platform profile ConfigMap.
release: of-platform

serviceAccount:
  create: true
  name: ""
  annotations: {}

image:
  registry: ghcr.io/openfoundry
  tag: "0.1.0"

global:
  imagePullPolicy: IfNotPresent
  imageRegistry: ""
  imagePullSecrets: []
  existingSecret: open-foundry-env
  publicWebOrigin: https://openfoundry.example.com
  labels:
    app.kubernetes.io/part-of: openfoundry
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    readOnlyRootFilesystem: false
  terminationGracePeriodSeconds: 30
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  networkPolicy:
    enabled: true
    allowSameNamespaceTraffic: true
    additionalEgressCidrs: []
  platformProfile:
    enabled: true
    configMapName: openfoundry-platform-profile
  probes:
    readiness:
      enabled: true
      path: /health
      initialDelaySeconds: 8
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    liveness:
      enabled: true
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
  deploymentFabric:
    cloud: kubernetes
    environment: shared
    cell: core
    region: global
    multiCloud:
      enabled: false
      activeProvider: ""
      workloadIdentity:
        awsRoleArn: ""
        gcpServiceAccount: ""
        azureClientId: ""
      providers: []
    airGap:
      enabled: false
      privateRegistry: ""
      releaseBundle: ""
      disablePublicEgress: false
      mirrorRegistries: []
      allowedEgressCidrs: []
    geoRestrictions:
      enabled: false
      allowedCountries: []
      allowedIngressCidrs: []
      allowedEgressCidrs: []
      ingressAnnotations: {}
      requiredNodeLabels: {}
      residencyLabel: ""
  cassandra:
    localDc: dc1
  kafka:
    bootstrap: ""
    topicPrefix: ""

# S8.5 — single ingress entrypoint owned by of-platform; the other
# releases consume the same hostname through shared service discovery.
ingress:
  enabled: true
  className: traefik
  host: openfoundry.local
  path: /
  pathType: Prefix
  serviceName: edge-gateway-service
  servicePort: 8080
  annotations: {}
  tls: []

# S8.3 — Postgres migrations as Helm pre-upgrade Jobs.
migrations:
  pg-schemas:
    enabled: true
    dsnSecret:
      name: pg-schemas-app
      key: dsn
  pg-policy:
    enabled: true
    dsnSecret:
      name: pg-policy-app
      key: dsn

# FASE 7 / Tarea 7.4 — `approvals-timeout-sweep` CronJob.
# Drives the `pending → expired` transition on
# `audit_compliance.approval_requests` rows past their `expires_at`.
# Disabled by default; enable per-environment in
# values-{dev,staging,prod}.yaml once the approvals-service image
# carries the second binary.
approvalsTimeoutSweep:
  enabled: false
  schedule: "*/5 * * * *"
  logLevel: info
  image:
    repository: approvals-service
    # Empty ⇒ inherit `global.imageTag`.
    tag: ""
  # When set, mounts DATABASE_URL from the named secret. Defaults
  # to leaving DATABASE_URL unset, expecting the operator to wire
  # it via `env`.
  databaseUrlSecretName: ""
  databaseUrlSecretKey: DATABASE_URL
  env: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

apollo:
  enabled: false
  schedule: "*/15 * * * *"
  actionMode: observe
  image:
    repository: curlimages/curl
    tag: "8.8.0"
  gatewayUrl: ""
  readinessPath: /api/v1/control-panel/upgrade-readiness
  fleetsPath: /api/v1/marketplace/devops/fleets
  reconcileFleetIds: []
  promoteWebhookPath: ""
  tokenSecretName: open-foundry-apollo
  tokenSecretKey: token
  env: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

services:
  edge-gateway-service:
    replicas: 3
    ports:
      - name: http
        containerPort: 8080
    env:
      RUST_LOG: info
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    pdb:
      enabled: true
      minAvailable: 2

  identity-federation-service:
    replicas: 2
    ports:
