{{- if .Values.networkPolicies.enabled }}
---
# CiliumNetworkPolicy (cilium.io/v2) restricting which workloads can talk
# to the Kafka brokers and to Apicurio Registry. This complements the
# `KafkaUser` ACLs managed by the Strimzi Entity Operator: ACLs handle
# authn/authz at the Kafka protocol level, NetworkPolicy restricts the
# raw L3/L4 reachability of the listener ports.
#
# Producers and consumers are identified by the label
# `openfoundry.io/kafka-role: {producer|consumer}` plus the per-service
# label `openfoundry.io/service: <name>`. Add new services here as they
# come online — every service that talks to Kafka or Apicurio must be
# declared explicitly; default-deny everywhere else.
#
# Why CiliumNetworkPolicy and not vanilla NetworkPolicy: we need
# per-service identity selectors and DNS-aware egress (for the CNPG
# `-rw` service hostname). The cluster baseline is Cilium in CNI mode
# (kube-proxy replacement enabled).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kafka-default-deny
  namespace: kafka
spec:
  endpointSelector:
    matchLabels:
      strimzi.io/cluster: openfoundry
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kafka-allow-clients
  namespace: kafka
spec:
  endpointSelector:
    matchLabels:
      strimzi.io/cluster: openfoundry
      strimzi.io/kind: Kafka
  ingress:
    # Producers — services that publish to data-plane topics.
    - fromEndpoints:
        - matchExpressions:
            - key: openfoundry.io/kafka-role
              operator: In
              values: [producer, producer-consumer]
            - key: openfoundry.io/service
              operator: In
              values:
                - dataset-service
                - lineage-service
                - model-serving
                - audit-service
                - debezium-connect
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP
            - port: "9093"
              protocol: TCP
    # Consumers — services that subscribe to data-plane topics.
    - fromEndpoints:
        - matchExpressions:
            - key: openfoundry.io/kafka-role
              operator: In
              values: [consumer, producer-consumer]
            - key: openfoundry.io/service
              operator: In
              values:
                - dataset-indexer
                - lineage-collector
                - audit-sink
                - feature-store
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP
            - port: "9093"
              protocol: TCP
    # Strimzi internal traffic between brokers and operators.
    - fromEndpoints:
        - matchLabels:
            strimzi.io/cluster: openfoundry
      toPorts:
        - ports:
            - port: "9090"   # replication
              protocol: TCP
            - port: "9091"   # control-plane
              protocol: TCP
            - port: "9092"
              protocol: TCP
            - port: "9093"
              protocol: TCP
  egress:
    # DNS — required for service discovery (broker bootstrap, CNPG -rw).
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Inter-broker / operator traffic stays within the cluster.
    - toEndpoints:
        - matchLabels:
            strimzi.io/cluster: openfoundry
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: apicurio-allow-clients
  namespace: apicurio
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: apicurio-registry
  ingress:
    # Schema producers (services owning schemas) and schema consumers
    # (everyone reading them) all reach the registry over HTTP/8080.
    - fromEndpoints:
        - matchExpressions:
            - key: openfoundry.io/kafka-role
              operator: In
              values: [producer, consumer, producer-consumer]
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Apicurio talks to its CNPG-managed Postgres in the same namespace.
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: apicurio-pg
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
{{- end }}
