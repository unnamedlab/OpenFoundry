[package]
name = "testing"
description = "Shared test utilities: fixtures, testcontainers setup, and mocks"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.rand]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.testcontainers]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.wiremock]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.sqlx]
workspace = true
features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"]

# Optional Cassandra harness (feature `it-cassandra`). Off by
# default so consumers that only need Postgres don't pull the Scylla
# driver into their compile graph.
[dependencies.scylla]
workspace = true
optional = true

[features]
default = []
# Enables `testing::cassandra::boot_cassandra`. Pulls the `scylla`
# driver. Crates that consume the helper should re-export an
# `it-cassandra` feature of their own that turns this one on:
#
# ```toml
# [features]
# it-cassandra = ["testing/it-cassandra"]
# ```
it-cassandra = ["dep:scylla"]

[lib]
path = "src/lib.rs"
name = "testing"
required-features = []
crate-type = ["lib"]
