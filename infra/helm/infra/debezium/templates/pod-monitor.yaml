{{- /* Skip the PodMonitor when the Prometheus Operator CRDs are not
       installed (e.g. dev profile, where `observabilityInstalled` is
       false in `infra/helm/helmfile.yaml.gotmpl`). The chart still
       applies cleanly; metrics scraping resumes once kube-prometheus
       is present. */ -}}
{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
---
# S4.1.f — PodMonitor for the Debezium Connect cluster.
#
# Strimzi exposes the JMX exporter on port 9404; the metrics map is
# defined in the ConfigMap `debezium-connect-metrics`
# (see `kafka-connect.yaml`).
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: debezium-connect
  namespace: kafka
  labels:
    openfoundry.io/component: debezium-connect
spec:
  selector:
    matchLabels:
      strimzi.io/cluster: debezium
      strimzi.io/kind: KafkaConnect
  namespaceSelector:
    matchNames: [kafka]
  podMetricsEndpoints:
    - port: tcp-prometheus
      path: /metrics
      interval: 30s
      scrapeTimeout: 25s
{{- end }}
