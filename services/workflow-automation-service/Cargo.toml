[package]
name = "workflow-automation-service"
description = "Continuous and scheduled business automations: workflow definitions/runs, saga-backed operational automations, human-in-the-loop approvals (S8 merge of automation-operations-service + approvals-service)"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.event-bus-data]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.idempotency]
workspace = true
features = ["postgres"]

[dependencies.outbox]
workspace = true

[dependencies.prometheus]
workspace = true

[dependencies.reqwest]
workspace = true

[dependencies.saga]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.state-machine]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[lib]
path = "src/lib.rs"
name = "workflow_automation_service"

[[bin]]
path = "src/main.rs"
name = "workflow-automation-service"
required-features = []

# S8 — companion CronJob binary inherited from the legacy
# `approvals-service`. Drives the `pending → expired` transition on
# `audit_compliance.approval_requests`. Same image as the main
# binary; the K8s CronJob template overrides `command` to
# `/usr/local/bin/approvals-timeout-sweep`.
[[bin]]
path = "src/bin/approvals_timeout_sweep.rs"
name = "approvals-timeout-sweep"

[features]
default = []
# Inherited from the legacy `automation-operations-service` (FASE 6 /
# Tarea 6.4). Gates the `tests/saga_chaos.rs` integration test which
# boots a Postgres testcontainer (Docker required). Off by default
# so plain `cargo test -p workflow-automation-service` stays a no-IO
# unit run; CI / nightly enables it explicitly.
it-postgres = []

[dev-dependencies.testing]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.async-trait]
workspace = true

[dev-dependencies.testcontainers]
workspace = true
