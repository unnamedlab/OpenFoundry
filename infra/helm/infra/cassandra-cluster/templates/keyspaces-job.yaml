{{- if .Values.keyspaces.enabled }}
{{- $cluster := .Values.keyspaces.clusterName | default "of-cass-dev" -}}
{{- $rf := .Values.keyspaces.replicationFactor | default 3 -}}
{{- $dcs := .Values.keyspaces.dcs | default (list "dc1") -}}
{{- $namespace := .Release.Namespace -}}
---
# Helm post-install / post-upgrade Job that bootstraps the OpenFoundry
# application keyspaces against the Cassandra cluster.
#
# Why a Job and not the operator:
#   * k8ssandra-operator deliberately does not own application schema.
#     Application keyspace ownership belongs to OpenFoundry release
#     pipelines (versioned, idempotent CQL), not to infra reconciliation.
#   * Temporal is excluded — its keyspaces (`temporal_persistence`,
#     `temporal_visibility`) are bootstrapped by `temporal-cassandra-tool`
#     from the Temporal frontend chart (see ADR-0021).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $cluster }}-keyspaces-bootstrap
  namespace: {{ $namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cassandra-keyspaces-bootstrap
        app.kubernetes.io/part-of: openfoundry
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cqlsh
          image: cassandra:5.0.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: CASSANDRA_HOST
              value: "{{ $cluster }}-dc1-service.{{ $namespace }}.svc"
            - name: CASSANDRA_PORT
              value: "9042"
            - name: CQLSH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $cluster }}-superuser
                  key: username
            - name: CQLSH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $cluster }}-superuser
                  key: password
          volumeMounts:
            - name: cql
              mountPath: /cql
            - name: tmp
              mountPath: /tmp
          command:
            - /bin/bash
            - -ec
            - |
              for i in $(seq 1 60); do
                if cqlsh "${CASSANDRA_HOST}" "${CASSANDRA_PORT}" \
                    -u "${CQLSH_USER}" -p "${CQLSH_PASSWORD}" \
                    -e "DESCRIBE CLUSTER" >/dev/null 2>&1; then
                  echo "Cassandra reachable on attempt $i"; break
                fi
                echo "waiting for Cassandra... ($i/60)"; sleep 5
              done

              cqlsh "${CASSANDRA_HOST}" "${CASSANDRA_PORT}" \
                -u "${CQLSH_USER}" -p "${CQLSH_PASSWORD}" \
                --file=/cql/keyspaces.cql
      volumes:
        - name: cql
          configMap:
            name: {{ $cluster }}-keyspaces-cql
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $cluster }}-keyspaces-cql
  namespace: {{ $namespace }}
data:
  keyspaces.cql: |
    -- OpenFoundry application keyspaces (six per ADR-0020). Temporal
    -- keyspaces are managed separately by the Temporal frontend chart.
    -- DURABLE_WRITES is left at the default (true).
    {{- $replication := "" }}
    {{- range $i, $dc := $dcs }}
      {{- if $i }}{{ $replication = printf "%s, " $replication }}{{ end }}
      {{- $replication = printf "%s'%s': '%d'" $replication $dc (int $rf) }}
    {{- end }}

    CREATE KEYSPACE IF NOT EXISTS ontology_objects
      WITH replication = { 'class': 'NetworkTopologyStrategy', {{ $replication }} };

    CREATE KEYSPACE IF NOT EXISTS ontology_indexes
      WITH replication = { 'class': 'NetworkTopologyStrategy', {{ $replication }} };

    CREATE KEYSPACE IF NOT EXISTS actions_log
      WITH replication = { 'class': 'NetworkTopologyStrategy', {{ $replication }} };

    CREATE KEYSPACE IF NOT EXISTS sessions
      WITH replication = { 'class': 'NetworkTopologyStrategy', {{ $replication }} };

    CREATE KEYSPACE IF NOT EXISTS notifications_inbox
      WITH replication = { 'class': 'NetworkTopologyStrategy', {{ $replication }} };

    CREATE KEYSPACE IF NOT EXISTS agent_state
      WITH replication = { 'class': 'NetworkTopologyStrategy', {{ $replication }} };

    DESCRIBE KEYSPACES;
{{- end }}
