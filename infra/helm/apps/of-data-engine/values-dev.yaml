image:
  registry: registry.registry.svc.cluster.local:5000
  tag: "0.1.0"

sqlBiGateway:
  migrations:
    enabled: true
    dsnSecret:
      name: sql-bi-gateway-db-dsn
      key: writer_url

global:
  imagePullPolicy: Always
  deploymentFabric:
    environment: dev
  autoscaling:
    enabled: false
  resourcesOverride:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  kafka:
    bootstrap: openfoundry-kafka-bootstrap.kafka.svc:9092

services:
  sql-bi-gateway-service:
    # NOTE — S8 / ADR-0030: dev override for the consolidated gateway.
    # Probe uses port `http` (8080); the binary's HTTP healthz server
    # binds to PORT=8080 (auto-injected by of-shared from containerPort)
    # while the Flight SQL surface lives on the internal default 50133.
    replicas: 1
    env:
      DISTRIBUTED_QUERY_WORKERS: "2"
      RUST_LOG: info
      TRINO_FLIGHT_SQL_URL: http://trino-flight-sql-proxy.trino.svc:50133
      HEALTHZ_PORT: "8080"
    ports:
      # ORDER MATTERS — `of-shared.deployment` auto-injects PORT from the
      # FIRST port. We want PORT=50133 (Flight SQL gRPC) so the binary's
      # cfg.Port wires correctly, leaving the HTTP healthz server on
      # cfg.HealthzPort=8080 which the probe (port: http, path: /healthz)
      # actually targets.
      - name: flight
        containerPort: 50133
      - name: http
        containerPort: 8080
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      keda:
        enabled: false
    envSecrets:
      DATABASE_URL:
        secretName: sql-bi-gateway-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: sql-bi-gateway-db-dsn
        key: reader_url
  pipeline-build-service:
    replicas: 1
  analytical-logic-service:
    envSecrets:
      DATABASE_URL:
        secretName: analytical-logic-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: analytical-logic-db-dsn
        key: reader_url
  cdc-metadata-service:
    enabled: false
    envSecrets:
      DATABASE_URL:
        secretName: cdc-metadata-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: cdc-metadata-db-dsn
        key: reader_url
  # S8 / ADR-0030 (B14): checkpoints-purpose-service merged →
  # authorization-policy-service (of-platform).
  connector-management-service:
    envSecrets:
      DATABASE_URL:
        secretName: connector-management-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: connector-management-db-dsn
        key: reader_url
  data-asset-catalog-service:
    enabled: false
    envSecrets:
      DATABASE_URL:
        secretName: data-asset-catalog-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: data-asset-catalog-db-dsn
        key: reader_url
  dataset-versioning-service:
    envSecrets:
      DATABASE_URL:
        secretName: dataset-versioning-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: dataset-versioning-db-dsn
        key: reader_url
  # S8 / ADR-0030 — `event-streaming-service` merged →
  # `ingestion-replication-service`. The streaming DSN secret
  # (`event-streaming-db-dsn`) is no longer mounted; the streaming
  # runtime, when wired into the consolidated binary, will reuse
  # the ingestion-replication DSN or take a dedicated streaming
  # DSN through a follow-up secret-mount change.
  ingestion-replication-service:
    envSecrets:
      DATABASE_URL:
        secretName: ingestion-replication-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: ingestion-replication-db-dsn
        key: reader_url
      CDC_METADATA_DATABASE_URL:
        secretName: cdc-metadata-db-dsn
        key: writer_url
  # S8 / ADR-0030 (B15): lineage-deletion-service and
  # retention-policy-service merged → audit-compliance-service
  # (of-platform).
  # S8 / ADR-0030: pipeline-authoring-service merged → pipeline-build-service.
  # The authoring schema reuses pipeline-build's DSN.
  sql-warehousing-service:
    envSecrets:
      DATABASE_URL:
        secretName: sql-warehousing-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: sql-warehousing-db-dsn
        key: reader_url
  # S8 / ADR-0030 (B20): time-series-data-service merged →
  # ontology-exploratory-analysis-service.
  iceberg-catalog-service:
    envSecrets:
      DATABASE_URL:
        secretName: iceberg-catalog-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: iceberg-catalog-db-dsn
        key: reader_url
  pipeline-build-service:
    spark:
      rbac:
        create: false
    envSecrets:
      DATABASE_URL:
        secretName: pipeline-build-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: pipeline-build-db-dsn
        key: reader_url
  media-sets-service:
    envSecrets:
      DATABASE_URL:
        secretName: media-sets-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: media-sets-db-dsn
        key: reader_url
  lineage-service:
    envSecrets:
      DATABASE_URL:
        secretName: lineage-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: lineage-db-dsn
        key: reader_url
