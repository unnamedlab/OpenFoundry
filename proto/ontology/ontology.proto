syntax = "proto3";
package open_foundry.ontology;

import "common/types.proto";
import "google/protobuf/timestamp.proto";

service OntologyService {
  rpc CreateObjectType(CreateObjectTypeRequest) returns (ObjectType);
  rpc GetObjectType(GetObjectTypeRequest) returns (ObjectType);
  rpc ListObjectTypes(ListObjectTypesRequest) returns (ListObjectTypesResponse);
  rpc UpdateObjectType(UpdateObjectTypeRequest) returns (ObjectType);
  rpc DeleteObjectType(DeleteObjectTypeRequest) returns (DeleteObjectTypeResponse);
  rpc CreateProperty(CreatePropertyRequest) returns (Property);
  rpc ListProperties(ListPropertiesRequest) returns (ListPropertiesResponse);
  rpc CreateLinkType(CreateLinkTypeRequest) returns (LinkType);
  rpc ListLinkTypes(ListLinkTypesRequest) returns (ListLinkTypesResponse);
  rpc DeleteLinkType(DeleteLinkTypeRequest) returns (DeleteLinkTypeResponse);

  // ObjectType ↔ dataset bindings ("Models in the Ontology").
  rpc BindDataset(BindDatasetRequest) returns (ObjectTypeBinding);
  rpc UnbindDataset(UnbindDatasetRequest) returns (UnbindDatasetResponse);
  rpc MaterializeBinding(MaterializeBindingRequest) returns (MaterializeBindingResponse);
}

message ObjectType {
  open_foundry.common.Uuid id = 1;
  string name = 2;
  string display_name = 3;
  string description = 4;
  string primary_key_property = 5;
  string icon = 6;
  string color = 7;
  open_foundry.common.Uuid owner_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message Property {
  open_foundry.common.Uuid id = 1;
  open_foundry.common.Uuid object_type_id = 2;
  string name = 3;
  string display_name = 4;
  string description = 5;
  string property_type = 6;
  bool required = 7;
  bool unique_constraint = 8;
  string default_value_json = 9;
  string validation_rules_json = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message LinkType {
  open_foundry.common.Uuid id = 1;
  string name = 2;
  string display_name = 3;
  string description = 4;
  open_foundry.common.Uuid source_type_id = 5;
  open_foundry.common.Uuid target_type_id = 6;
  string cardinality = 7;
  open_foundry.common.Uuid owner_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message CreateObjectTypeRequest {
  string name = 1;
  string display_name = 2;
  string description = 3;
  string primary_key_property = 4;
  string icon = 5;
  string color = 6;
}

message GetObjectTypeRequest {
  open_foundry.common.Uuid id = 1;
}

message ListObjectTypesRequest {
  open_foundry.common.PageRequest pagination = 1;
  string search = 2;
}

message ListObjectTypesResponse {
  repeated ObjectType object_types = 1;
  open_foundry.common.PageResponse pagination = 2;
}

message UpdateObjectTypeRequest {
  open_foundry.common.Uuid id = 1;
  string display_name = 2;
  string description = 3;
  string primary_key_property = 4;
  string icon = 5;
  string color = 6;
}

message DeleteObjectTypeRequest {
  open_foundry.common.Uuid id = 1;
}

message DeleteObjectTypeResponse {}

message CreatePropertyRequest {
  open_foundry.common.Uuid object_type_id = 1;
  string name = 2;
  string display_name = 3;
  string description = 4;
  string property_type = 5;
  bool required = 6;
  bool unique_constraint = 7;
  string default_value_json = 8;
  string validation_rules_json = 9;
}

message ListPropertiesRequest {
  open_foundry.common.Uuid object_type_id = 1;
}

message ListPropertiesResponse {
  repeated Property properties = 1;
}

message CreateLinkTypeRequest {
  string name = 1;
  string display_name = 2;
  string description = 3;
  open_foundry.common.Uuid source_type_id = 4;
  open_foundry.common.Uuid target_type_id = 5;
  string cardinality = 6;
}

message ListLinkTypesRequest {
  open_foundry.common.Uuid object_type_id = 1;
  open_foundry.common.PageRequest pagination = 2;
}

message ListLinkTypesResponse {
  repeated LinkType link_types = 1;
  open_foundry.common.PageResponse pagination = 2;
}

message DeleteLinkTypeRequest {
  open_foundry.common.Uuid id = 1;
}

message DeleteLinkTypeResponse {}

// --- ObjectType ↔ dataset bindings ---------------------------------------

enum ObjectTypeBindingSyncMode {
  OBJECT_TYPE_BINDING_SYNC_MODE_UNSPECIFIED = 0;
  OBJECT_TYPE_BINDING_SYNC_MODE_SNAPSHOT = 1;
  OBJECT_TYPE_BINDING_SYNC_MODE_INCREMENTAL = 2;
  OBJECT_TYPE_BINDING_SYNC_MODE_VIEW = 3;
}

message ObjectTypeBindingPropertyMapping {
  string source_field = 1;
  string target_property = 2;
}

message ObjectTypeBinding {
  open_foundry.common.Uuid id = 1;
  open_foundry.common.Uuid object_type_id = 2;
  open_foundry.common.Uuid dataset_id = 3;
  string dataset_branch = 4;
  int32 dataset_version = 5;
  string primary_key_column = 6;
  repeated ObjectTypeBindingPropertyMapping property_mapping = 7;
  ObjectTypeBindingSyncMode sync_mode = 8;
  string default_marking = 9;
  int32 preview_limit = 10;
  open_foundry.common.Uuid owner_id = 11;
  google.protobuf.Timestamp last_materialized_at = 12;
  string last_run_status = 13;
  string last_run_summary_json = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
}

message BindDatasetRequest {
  open_foundry.common.Uuid object_type_id = 1;
  open_foundry.common.Uuid dataset_id = 2;
  string dataset_branch = 3;
  int32 dataset_version = 4;
  string primary_key_column = 5;
  repeated ObjectTypeBindingPropertyMapping property_mapping = 6;
  ObjectTypeBindingSyncMode sync_mode = 7;
  string default_marking = 8;
  int32 preview_limit = 9;
}

message UnbindDatasetRequest {
  open_foundry.common.Uuid object_type_id = 1;
  open_foundry.common.Uuid binding_id = 2;
}

message UnbindDatasetResponse {
  bool deleted = 1;
}

message MaterializeBindingRequest {
  open_foundry.common.Uuid object_type_id = 1;
  open_foundry.common.Uuid binding_id = 2;
  string dataset_branch = 3;
  int32 dataset_version = 4;
  int32 limit = 5;
  bool dry_run = 6;
}

message MaterializeBindingResponse {
  open_foundry.common.Uuid binding_id = 1;
  string status = 2;
  int32 rows_read = 3;
  int32 inserted = 4;
  int32 updated = 5;
  int32 skipped = 6;
  int32 errors = 7;
  bool dry_run = 8;
  repeated string error_details_json = 9;
}
