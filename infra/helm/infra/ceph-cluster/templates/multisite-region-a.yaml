---
# S7.1.a — Ceph RGW multisite (S3 Cross-Region Replication).
#
# Rook models S3 CRR through three Ceph CRDs:
#
#   1. CephObjectRealm    — top-level namespace shared by both regions.
#   2. CephObjectZoneGroup — master/secondary zone container.
#   3. CephObjectZone     — per-region pool set, attached to one
#                            CephObjectStore.
#
# Topology after this manifest is applied in BOTH regions:
#
#   realm:     openfoundry
#   zonegroup: openfoundry-zg              (master in region-a)
#     ├── zone: openfoundry-zone-a         (PRIMARY, RW, region A)
#     └── zone: openfoundry-zone-b         (SECONDARY, RO, region B)
#
# The realm/zonegroup pull endpoints in region B point at region A's
# RGW gateway; replication is asynchronous and uses Ceph's native
# multisite sync (no S3 CRR rules required, no `aws s3api
# put-bucket-replication`).
#
# The pull token (`access_key`/`secret_key` pair printed by
# `radosgw-admin period get` in region A) MUST be sync-ed to the
# region-B Secret `rgw-multisite-pull-token` BEFORE the secondary zone
# is created — see `infra/runbooks/ceph-multisite-bootstrap.md`.
#
# This file is region-agnostic: the `pull` block on the secondary zone
# is gated by `endpoints` so applying it in region A is a no-op (the
# zone is the master).
apiVersion: ceph.rook.io/v1
kind: CephObjectRealm
metadata:
  name: openfoundry
  namespace: rook-ceph
spec:
  # Empty `pull` ⇒ this is the master realm bootstrap; in region B set
  # `pull.endpoint` to the region-A RGW external URL (overlay below).
  defaultRealm: true
---
apiVersion: ceph.rook.io/v1
kind: CephObjectZoneGroup
metadata:
  name: openfoundry-zg
  namespace: rook-ceph
spec:
  realm: openfoundry
---
apiVersion: ceph.rook.io/v1
kind: CephObjectZone
metadata:
  name: openfoundry-zone-a
  namespace: rook-ceph
spec:
  zoneGroup: openfoundry-zg
  metadataPool:
    failureDomain: zone
    replicated:
      size: 3
      requireSafeReplicaSize: true
  dataPool:
    failureDomain: zone
    erasureCoded:
      dataChunks: 4
      codingChunks: 2
    parameters:
      bulk: "true"
      compression_mode: aggressive
  preservePoolsOnDelete: true
  customEndpoints:
    # External hostname advertised to the secondary zone for pulling
    # period/metadata. MUST be reachable from region B.
    - "https://rgw-region-a.openfoundry.example.com"
