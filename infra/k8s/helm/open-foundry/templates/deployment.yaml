{{- range $serviceName, $service := .Values.services }}
{{- if $service.enabled }}
{{- $globalNodeSelector := $.Values.global.deploymentFabric.geoRestrictions.requiredNodeLabels | default dict }}
{{- $serviceNodeSelector := $service.nodeSelector | default dict }}
{{- $nodeSelector := merge (dict) $globalNodeSelector $serviceNodeSelector }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-foundry.fullname" (dict "root" $ "serviceName" $serviceName) }}
  namespace: {{ include "open-foundry.namespace" (dict "root" $) }}
  labels:
{{ include "open-foundry.commonLabels" (dict "root" $ "serviceName" $serviceName) | nindent 4 }}
spec:
  replicas: {{ $service.replicas }}
  selector:
    matchLabels:
{{ include "open-foundry.selectorLabels" (dict "root" $ "serviceName" $serviceName) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "open-foundry.commonLabels" (dict "root" $ "serviceName" $serviceName) | nindent 8 }}
{{- $hasAnnotations := or (gt (len $.Values.global.podAnnotations) 0) (gt (len ($service.podAnnotations | default dict)) 0) }}
{{- if $hasAnnotations }}
      annotations:
{{- range $annotationKey, $annotationValue := $.Values.global.podAnnotations }}
        {{ $annotationKey }}: {{ $annotationValue | quote }}
{{- end }}
{{- range $annotationKey, $annotationValue := ($service.podAnnotations | default dict) }}
        {{ $annotationKey }}: {{ $annotationValue | quote }}
{{- end }}
{{- end }}
    spec:
      serviceAccountName: {{ include "open-foundry.serviceAccountName" (dict "root" $) }}
{{- if gt (len $.Values.global.imagePullSecrets) 0 }}
      imagePullSecrets:
{{- range $.Values.global.imagePullSecrets }}
        - name: {{ . | quote }}
{{- end }}
{{- end }}
      terminationGracePeriodSeconds: {{ default $.Values.global.terminationGracePeriodSeconds $service.terminationGracePeriodSeconds }}
      securityContext:
{{ toYaml (default $.Values.global.podSecurityContext $service.podSecurityContext) | indent 8 }}
{{- if $.Values.global.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $.Values.global.topologySpreadConstraints.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ $.Values.global.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
{{ include "open-foundry.selectorLabels" (dict "root" $ "serviceName" $serviceName) | nindent 14 }}
{{- end }}
{{- if gt (len $nodeSelector) 0 }}
      nodeSelector:
{{ toYaml $nodeSelector | indent 8 }}
{{- end }}
{{- with $service.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with $service.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: platform-profile
          configMap:
            name: {{ include "open-foundry.platformProfileConfigMapName" (dict "root" $) }}
      containers:
        - name: {{ $serviceName }}
          image: "{{ include "open-foundry.image" (dict "root" $ "repository" $service.image.repository "tag" $service.image.tag) }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $service.port }}
{{- if $.Values.global.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ $.Values.global.existingSecret }}
{{- end }}
          env:
            - name: OPENFOUNDRY_DEPLOYMENT_CLOUD
              value: {{ $.Values.global.deploymentFabric.cloud | quote }}
            - name: OPENFOUNDRY_DEPLOYMENT_ENVIRONMENT
              value: {{ $.Values.global.deploymentFabric.environment | quote }}
            - name: OPENFOUNDRY_DEPLOYMENT_REGION
              value: {{ $.Values.global.deploymentFabric.region | quote }}
            - name: OPENFOUNDRY_DEPLOYMENT_CELL
              value: {{ $.Values.global.deploymentFabric.cell | quote }}
            - name: OPENFOUNDRY_ACTIVE_CLOUD_PROVIDER
              value: {{ $.Values.global.deploymentFabric.multiCloud.activeProvider | quote }}
            - name: OPENFOUNDRY_AIRGAPPED
              value: {{ ternary "true" "false" $.Values.global.deploymentFabric.airGap.enabled | quote }}
            - name: OPENFOUNDRY_RELEASE_BUNDLE
              value: {{ $.Values.global.deploymentFabric.airGap.releaseBundle | quote }}
            - name: OPENFOUNDRY_ALLOWED_GEO_COUNTRIES
              value: {{ join "," $.Values.global.deploymentFabric.geoRestrictions.allowedCountries | quote }}
            - name: OPENFOUNDRY_RESIDENCY_LABEL
              value: {{ $.Values.global.deploymentFabric.geoRestrictions.residencyLabel | quote }}
            - name: OPENFOUNDRY_APOLLO_ENABLED
              value: {{ ternary "true" "false" $.Values.apollo.enabled | quote }}
            - name: OPENFOUNDRY_APOLLO_ACTION_MODE
              value: {{ $.Values.apollo.actionMode | quote }}
            - name: OPENFOUNDRY_PLATFORM_PROFILE_PATH
              value: "/etc/openfoundry/platform-profile/deployment-fabric.yaml"
{{- range $envKey, $envValue := $service.env }}
            - name: {{ $envKey }}
              value: {{ $envValue | quote }}
{{- end }}
{{- if eq $serviceName "identity-federation-service" }}
            - name: PUBLIC_WEB_ORIGIN
              value: {{ $.Values.global.publicWebOrigin | quote }}
{{- end }}
{{- if eq $serviceName "gateway" }}
            - name: AUTH_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "identity-federation-service" "port" 50112) | quote }}
            - name: DATASET_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "data-asset-catalog-service" "port" 50079) | quote }}
            - name: QUERY_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "sql-bi-gateway-service" "port" 50133) | quote }}
            - name: PIPELINE_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "pipeline-authoring-service" "port" 50080) | quote }}
            - name: REPORT_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "document-reporting-service" "port" 50102) | quote }}
            - name: GEOSPATIAL_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "geospatial-intelligence-service" "port" 50068) | quote }}
            - name: NEXUS_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "federation-product-exchange-service" "port" 50120) | quote }}
{{- end }}
{{- if eq $serviceName "pipeline-authoring-service" }}
            - name: DATASET_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "data-asset-catalog-service" "port" 50079) | quote }}
{{- end }}
{{- if eq $serviceName "document-reporting-service" }}
            - name: DATASET_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "data-asset-catalog-service" "port" 50079) | quote }}
            - name: GEOSPATIAL_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "geospatial-intelligence-service" "port" 50068) | quote }}
{{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: platform-profile
              mountPath: /etc/openfoundry/platform-profile
              readOnly: true
          securityContext:
{{ toYaml (default $.Values.global.containerSecurityContext $service.containerSecurityContext) | indent 12 }}
{{- if $.Values.global.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ $.Values.global.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ $.Values.global.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.global.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ $.Values.global.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ $.Values.global.probes.readiness.failureThreshold }}
{{- end }}
{{- if $.Values.global.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ $.Values.global.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ $.Values.global.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.global.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ $.Values.global.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ $.Values.global.probes.liveness.failureThreshold }}
{{- end }}
          resources:
{{ toYaml $service.resources | indent 12 }}
---
{{- end }}
{{- end }}
