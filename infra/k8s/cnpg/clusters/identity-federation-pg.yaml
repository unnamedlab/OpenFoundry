---
# CloudNativePG `Cluster` for the identity-federation-service bounded
# context (auth, sessions, scoped credentials, control-panel admin).
#
# Wave 1 pilot for T13 (per-bounded-context CNPG wiring). The naming,
# storage class, S3 backup convention and Secret layout follow the
# pattern documented in `infra/k8s/cnpg/clusters/README.md`. Defaults
# mirror `infra/k8s/cnpg/templates/cluster.yaml`.
#
# Consumed by `infra/k8s/helm/open-foundry/values.yaml` via the
# `services.identity-federation-service.env.DATABASE_URL` entry, which
# resolves to `identity-federation-pg-rw.openfoundry.svc.cluster.local`.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: identity-federation-pg
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: identity-federation-pg
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: openfoundry
    openfoundry.io/managed-by: cnpg
    openfoundry.io/bounded-context: identity-federation
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised

  # At least one synchronous standby acks every commit; primary loss
  # cannot lose data as long as one in-sync replica survives. Mirrors
  # the "no silent data loss" stance from the Kafka cluster
  # (`min.insync.replicas=2`, `unclean.leader.election.enable=false`).
  minSyncReplicas: 1
  maxSyncReplicas: 1

  postgresql:
    parameters:
      synchronous_commit: "on"
      wal_level: "logical"
      max_wal_size: "2GB"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: identity_federation
      owner: identity_federation
      secret:
        name: identity-federation-pg-app

  storage:
    # Auth/session catalog — small but write-heavy; 20Gi leaves
    # plenty of headroom while keeping snapshot/backup time low.
    size: 20Gi
    storageClass: ceph-rbd

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Spread instances across zones so a zonal outage cannot take down
  # the quorum (matches the Kafka topologySpreadConstraints).
  affinity:
    topologyKey: topology.kubernetes.io/zone
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred

  monitoring:
    enablePodMonitor: true

  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://openfoundry-pg-backups/identity-federation-pg
      # Cluster-local Ceph RGW (rook-ceph). Same endpoint already used
      # by the Iceberg/Lakekeeper stack — see
      # `infra/k8s/rook/objectstore.yaml`.
      endpointURL: http://rook-ceph-rgw-openfoundry.rook-ceph.svc:80
      s3Credentials:
        accessKeyId:
          name: identity-federation-pg-backup
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: identity-federation-pg-backup
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 2
---
# Bootstrap credentials for the CNPG Cluster. The `password` value
# below is a placeholder; in every real environment it MUST be
# overwritten by External Secrets / Vault before the manifest is
# applied. Mirrors the convention used by `apicurio-pg-app` in
# `infra/k8s/strimzi/apicurio-registry.yaml`.
apiVersion: v1
kind: Secret
metadata:
  name: identity-federation-pg-app
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: identity-federation-pg
    openfoundry.io/managed-by: cnpg
type: kubernetes.io/basic-auth
stringData:
  username: identity_federation
  password: change-me
---
# Object-store credentials for barman-cloud backups. Replace with
# values projected from External Secrets / Vault before applying.
apiVersion: v1
kind: Secret
metadata:
  name: identity-federation-pg-backup
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: identity-federation-pg
    openfoundry.io/managed-by: cnpg
type: Opaque
stringData:
  ACCESS_KEY_ID: change-me
  ACCESS_SECRET_KEY: change-me
