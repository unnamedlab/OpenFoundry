[package]
name = "marketplace-service"
description = "Plugin and template marketplace"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.reqwest]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true
features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"]

[dependencies.storage-abstraction]
workspace = true

[dependencies.tokio]
workspace = true
features = ["full"]

[dependencies.tower-http]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.prometheus]
workspace = true

[dependencies.tonic]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[lib]
path = "src/lib.rs"

# P5 — integration tests boot a Postgres testcontainer + apply the
# marketplace migration set. The Docker-gated tests live in
# `tests/dataset_product_round_trip.rs`.
[dev-dependencies.testcontainers]
workspace = true

[dev-dependencies.testing]
workspace = true

[dev-dependencies.tower]
workspace = true

[dev-dependencies.http-body-util]
version = "0.1"

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.sqlx]
workspace = true
features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"]

[dev-dependencies.tempfile]
version = "3"

[dev-dependencies.serde_json]
workspace = true

[dev-dependencies.uuid]
workspace = true

[[bin]]
path = "src/main.rs"
name = "marketplace-service"
required-features = []
