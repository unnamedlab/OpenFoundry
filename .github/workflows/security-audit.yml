name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  push:
    branches: [main]
    paths: ["Cargo.lock"]

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
