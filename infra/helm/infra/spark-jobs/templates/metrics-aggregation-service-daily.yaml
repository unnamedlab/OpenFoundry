---
# S5.4.a — nightly Spark job. Reads Mimir TSDB blocks from
# `s3://openfoundry-metrics-long/blocks/`, aggregates per-service
# per-day metrics (request rate, latency P50/P95/P99, error rate,
# resource use) and APPENDS to the Iceberg table
# `of_metrics_long.service_metrics_daily` (partition `day(at)`).
#
# Idempotency: each run rewrites only the previous UTC day's
# partition (`--day=YYYY-MM-DD`). A second invocation for the same
# day is a no-op (Iceberg merge-on-read on `(service, day)`).
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: metrics-aggregation-service-daily
  namespace: openfoundry-spark
  labels:
    openfoundry.io/component: metrics-long
spec:
  type: Scala
  mode: cluster
  image: apache/spark:3.5.3
  mainClass: org.openfoundry.spark.metrics.ServiceMetricsDailyJob
  mainApplicationFile: "s3a://openfoundry-spark-jars/metrics-aggregation-0.1.0.jar"
  arguments:
    - "--mimir-bucket=openfoundry-metrics-long"
    - "--mimir-prefix=blocks/"
    - "--target-namespace=of_metrics_long"
    - "--target-table=service_metrics_daily"
    - "--catalog=lakekeeper"
    - "--catalog-uri=http://lakekeeper.lakekeeper.svc:8181"
    # Day to materialise; the cron wrapper substitutes the previous
    # UTC day. Re-running is idempotent (merge-on-read).
    - "--day=$(date -u -d 'yesterday' +%F)"
  sparkVersion: "3.5.3"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 2
    onFailureRetryInterval: 120
  driver:
    cores: 1
    memory: "4g"
    serviceAccount: spark-jobs-non-audit
  executor:
    cores: 2
    instances: 6
    memory: "6g"
  sparkConf:
    spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    spark.sql.catalog.lakekeeper: "org.apache.iceberg.spark.SparkCatalog"
    spark.sql.catalog.lakekeeper.type: "rest"
    spark.sql.catalog.lakekeeper.uri: "http://lakekeeper.lakekeeper.svc:8181"
    spark.hadoop.fs.s3a.endpoint: "http://rook-ceph-rgw-openfoundry-store.rook-ceph.svc:80"
    spark.hadoop.fs.s3a.path.style.access: "true"
