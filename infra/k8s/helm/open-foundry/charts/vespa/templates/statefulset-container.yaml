{{- if .Values.enabled -}}
{{- $svc := include "vespa.container.fullname" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $svc }}
  labels:
{{ include "vespa.labels" . | indent 4 }}
    app.kubernetes.io/component: vespa-container
spec:
  # The container nodes are stateless, but they must keep the per-pod
  # DNS identity that `hosts.xml` references — hence StatefulSet
  # rather than Deployment.
  serviceName: {{ $svc }}
  replicas: {{ .Values.container.replicas }}
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
{{ include "vespa.container.selectorLabels" . | indent 6 }}
  template:
    metadata:
      labels:
{{ include "vespa.container.selectorLabels" . | indent 8 }}
{{- with .Values.podLabels }}
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.podAnnotations }}
      annotations:
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ include "vespa.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
      {{- end }}
{{- if .Values.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpreadConstraints.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ .Values.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
{{ include "vespa.container.selectorLabels" . | indent 14 }}
{{- end }}
{{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
{{- if eq .Values.podAntiAffinity.type "required" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
{{ include "vespa.container.selectorLabels" . | indent 18 }}
{{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
{{ include "vespa.container.selectorLabels" . | indent 20 }}
{{- end }}
{{- else if .Values.affinity }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
      initContainers:
        - name: wait-configservers
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | indent 12 }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -eu
              for host in $(echo "$VESPA_CONFIGSERVERS" | tr ',' ' '); do
                echo "waiting for ${host}:19071 …"
                until curl -fsS "http://${host}:19071/state/v1/health" >/dev/null 2>&1; do
                  sleep 5
                done
              done
              echo "all configservers reachable"
          env:
            - name: VESPA_CONFIGSERVERS
              value: {{ include "vespa.configservers" . | quote }}
      containers:
        - name: vespa
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | indent 12 }}
          command: ["/bin/bash", "-c"]
          args:
            - >
              export VESPA_CONFIGSERVERS="$(VESPA_CONFIGSERVERS)" &&
              /opt/vespa/bin/vespa-start-services &&
              tail --pid=$$ -F /opt/vespa/logs/vespa/vespa.log
          env:
            - name: VESPA_CONFIGSERVERS
              value: {{ include "vespa.configservers" . | quote }}
            - name: VESPA_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
{{- with .Values.extraEnv }}
{{ toYaml . | indent 12 }}
{{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /state/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /state/v1/health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
{{ toYaml .Values.container.resources | indent 12 }}
          volumeMounts:
            - name: var
              mountPath: /opt/vespa/var
            - name: logs
              mountPath: /opt/vespa/logs
      volumes:
        - name: var
          emptyDir: {}
        - name: logs
          emptyDir: {}
{{- end }}
