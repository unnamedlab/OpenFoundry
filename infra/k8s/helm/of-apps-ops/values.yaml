release: of-apps-ops

image:
  registry: ghcr.io/openfoundry
  tag: "0.1.0"

migrations:
  pg-schemas:
    enabled: true
    dsnSecret: { name: pg-schemas-app, key: dsn }
  pg-policy:
    enabled: true
    dsnSecret: { name: pg-policy-app, key: dsn }
  lakekeeper:
    enabled: true
    dsnSecret: { name: lakekeeper-app, key: dsn }

services:
  application-composition-service:      { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  notebook-runtime-service:             { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "200m", memory: "512Mi" }, limits: { cpu: "1",    memory: "1Gi"   } } }
  ontology-exploratory-analysis-service: { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "200m", memory: "512Mi" }, limits: { cpu: "1",    memory: "1Gi"   } } }
  solution-design-service:              { replicas: 1, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  workflow-automation-service:          { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  notification-alerting-service:        { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  audit-compliance-service:             { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  audit-sink:                           { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  telemetry-governance-service:         { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  federation-product-exchange-service:  { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  code-repository-review-service:       { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  sdk-generation-service:               { replicas: 1, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  entity-resolution-service:            { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "200m", memory: "512Mi" }, limits: { cpu: "1",    memory: "1Gi"   } } }
