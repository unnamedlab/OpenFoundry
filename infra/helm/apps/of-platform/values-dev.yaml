global:
  deploymentFabric:
    environment: dev

services:
  edge-gateway-service:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  identity-federation-service:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80

temporal:
  address: temporal-frontend.temporal.svc.cluster.local:7233
  namespace: openfoundry-dev

temporalWorkers:
  defaults:
    replicas: 1
    logLevel: debug
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 75
      targetMemoryUtilizationPercentage: 85
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 250m
        memory: 256Mi
  serviceMonitor:
    enabled: false
