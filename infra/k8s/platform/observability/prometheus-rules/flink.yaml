# Prometheus alerting rules for Apache Flink (FlinkDeployment).
#
# Source repo:  infra/k8s/platform/manifests/flink/, infra/k8s/platform/manifests/flink/maintenance/
# Scrape:       Flink exposes Prometheus metrics via the
#               PrometheusReporter (taskmanager + jobmanager). The
#               flink-kubernetes-operator publishes additional
#               operator-level metrics.
# Validation:   `promtool check rules infra/k8s/platform/observability/prometheus-rules/flink.yaml`
#
# SLI rationale (upstream-sourced thresholds):
#   * Job uptime: Flink exposes `flink_jobmanager_job_uptime` per job.
#     A drop to 0 with no corresponding planned redeploy means the job
#     died. Documented in the Flink monitoring guide.
#   * Checkpoint failure rate: any non-trivial fraction of failed
#     checkpoints means exactly-once guarantees are at risk. The
#     Flink ops guide treats sustained > 0 failures as a warning.
#   * Savepoint age: T15 maintenance jobs (expire-snapshots,
#     rewrite-data-files) read the latest savepoint to resume. A stale
#     savepoint > 24h means the maintenance job will fall further
#     behind on every run.
#     See infra/k8s/platform/manifests/flink/maintenance/.
groups:
  - name: flink.availability
    rules:
      - alert: FlinkJobManagerDown
        expr: up{job=~"flink.*",flink_role="jobmanager"} == 0
        for: 2m
        labels:
          severity: critical
          component: flink
        annotations:
          summary: "Flink JobManager {{ $labels.instance }} is down"
          description: |
            JobManager unreachable for 2m. New jobs cannot be submitted
            and HA failover may be in progress.

      - alert: FlinkJobNotRunning
        # Flink exposes flink_jobmanager_job_uptime in ms. A value <= 0
        # for an existing job means the job is in FAILED / CANCELED.
        expr: flink_jobmanager_job_uptime <= 0
        for: 5m
        labels:
          severity: critical
          component: flink
        annotations:
          summary: "Flink job {{ $labels.job_name }} not running"
          description: |
            Job `{{ $labels.job_name }}` reports uptime <= 0 for 5m.
            Check job status and JobManager logs.

  - name: flink.checkpoints
    rules:
      - alert: FlinkCheckpointFailures
        # Flink ops guide: any sustained checkpoint failures degrade
        # exactly-once guarantees. We require 3 failed checkpoints over
        # 30m before paging to ride out single transient failures.
        expr: |
          increase(flink_jobmanager_job_numberOfFailedCheckpoints[30m]) > 3
        for: 5m
        labels:
          severity: warning
          component: flink
        annotations:
          summary: "Flink job {{ $labels.job_name }} has > 3 failed checkpoints in 30m"
          description: |
            `{{ $value }}` checkpoint failures for job
            `{{ $labels.job_name }}` over 30m. Exactly-once delivery is
            at risk; check state backend (RocksDB / S3) health.

      - alert: FlinkLastCheckpointStale
        # No completed checkpoint in 1h => state may not be recoverable
        # to a recent point. Tighter than savepoint age because
        # checkpoints normally happen every few minutes.
        expr: |
          time() - flink_jobmanager_job_lastCheckpointRestoreTimestamp / 1000 > 3600
        for: 10m
        labels:
          severity: warning
          component: flink
        annotations:
          summary: "Flink job {{ $labels.job_name }}: no recent checkpoint"
          description: |
            Last checkpoint for job `{{ $labels.job_name }}` is older
            than 1h. Recovery to a recent state is no longer possible.

  - name: flink.maintenance
    rules:
      - alert: FlinkSavepointAgeHigh
        # T15 maintenance jobs (infra/k8s/platform/manifests/flink/maintenance/) rely on
        # a fresh savepoint to resume work. A savepoint older than 24h
        # means we cannot safely upgrade Flink in place without losing
        # progress on the maintenance pipeline.
        expr: |
          (time() - flink_jobmanager_job_lastSavepointTimestamp / 1000) > 86400
        for: 1h
        labels:
          severity: warning
          component: flink
          maintenance: t15
        annotations:
          summary: "Flink job {{ $labels.job_name }}: latest savepoint > 24h old"
          description: |
            Latest savepoint for `{{ $labels.job_name }}` is older
            than 24h. T15 maintenance jobs (expire-snapshots,
            rewrite-data-files) need a fresh savepoint to resume
            cleanly. Trigger a manual savepoint or fix the periodic
            savepoint schedule.
