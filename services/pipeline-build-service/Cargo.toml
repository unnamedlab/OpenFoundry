[package]
name = "pipeline-build-service"
description = "Pipeline execution and run orchestration"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies]
cron = "0.12"
wasmtime = "24"
async-trait = { workspace = true }
prometheus = { workspace = true }
once_cell = "1"
sha2 = { workspace = true }
# P4 — live logs SSE/WS plumbing
tokio-stream = { version = "0.1", features = ["sync"] }
async-stream = "0.3"

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.axum-extra]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.bytes]
workspace = true

[dependencies.cassandra-kernel]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.datafusion]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.outbox]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.pyo3]
workspace = true
features = ["abi3-py311"]

[dependencies.query-engine]
workspace = true

[dependencies.reqwest]
workspace = true
features = ["multipart"]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.storage-abstraction]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tonic]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[[bin]]
path = "src/main.rs"
name = "pipeline-build-service"
required-features = []

# Pure-domain library surface — re-exposes `domain::job_graph`,
# `domain::branch_resolution`, `domain::run_guarantees` so the
# `tests/` integration files can exercise the resolver without the
# whole Axum stack. Binary-side handlers stay private to `src/main.rs`.
[lib]
path = "src/lib.rs"
name = "pipeline_build_service"
required-features = []

# Integration tests for the lifecycle (D1.1.5 P2). Gated behind
# `#[ignore]` so default `cargo test` stays Docker-free; surface them
# with `cargo test -p pipeline-build-service --include-ignored`.
[dev-dependencies]
testcontainers = { workspace = true }
wiremock = { workspace = true }
tempfile = "3"

[dev-dependencies.testing]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.async-trait]
workspace = true

[dev-dependencies.serde_json]
workspace = true

[dev-dependencies.uuid]
workspace = true

[dev-dependencies.chrono]
workspace = true

[dev-dependencies.sqlx]
workspace = true
features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"]
