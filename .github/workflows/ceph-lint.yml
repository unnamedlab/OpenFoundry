name: CI — Rook-Ceph topology lint

on:
  push:
    branches: [main]
    paths:
      - "infra/k8s/rook/**"
      - "tools/ceph-lint/**"
      - ".github/workflows/ceph-lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/k8s/rook/**"
      - "tools/ceph-lint/**"
      - ".github/workflows/ceph-lint.yml"

jobs:
  topology-contract:
    name: Rook-Ceph topology contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install --no-cache-dir pyyaml==6.0.2
      - name: Lint Rook-Ceph manifests
        run: python3 tools/ceph-lint/check_topology.py
