name: Proto — Lint, OpenAPI & SDK

on:
  push:
    branches: [main]
    paths:
      - "proto/**"
      - "tools/of-cli/**"
      - "apps/web/public/generated/openapi/**"
      - "sdks/typescript/openfoundry-sdk/**"
      - "sdks/python/openfoundry-sdk/**"
      - "sdks/java/openfoundry-sdk/**"
      - "apps/web/package.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/proto-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "proto/**"
      - "tools/of-cli/**"
      - "apps/web/public/generated/openapi/**"
      - "sdks/typescript/openfoundry-sdk/**"
      - "sdks/python/openfoundry-sdk/**"
      - "sdks/java/openfoundry-sdk/**"
      - "apps/web/package.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/proto-check.yml"

jobs:
  lint:
    name: Buf Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          input: proto

  openapi:
    name: OpenAPI Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build OpenAPI from proto contracts
        run: go run ./tools/of-cli docs generate-openapi --proto-dir proto --output /tmp/of-cli-openapi.json
      - name: Validate committed OpenAPI is parseable JSON 3.x
        run: |
          python3 - <<'PY'
          import json
          doc = json.load(open("apps/web/public/generated/openapi/openfoundry.json"))
          version = doc.get("openapi", "")
          assert version.startswith("3."), f"unexpected openapi version: {version!r}"
          assert "paths" in doc, "missing 'paths' top-level key"
          PY

  sdk-typescript:
    name: TypeScript SDK Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web exec tsc -p ../../sdks/typescript/openfoundry-sdk/tsconfig.json --noEmit

  sdk-python:
    name: Python SDK Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m compileall sdks/python/openfoundry-sdk

  sdk-java:
    name: Java SDK Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: find sdks/java/openfoundry-sdk/src/main/java -name '*.java' -print0 | xargs -0 javac --release 17 -d /tmp/java-out
