version: v2
# Generates Go code from the canonical .proto files in ../proto.
# Output lives under libs/proto-gen and is committed so fresh checkouts compile.
# Regenerate via `make gen-proto` (or `make gen`).
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/openfoundry/openfoundry-go/libs/proto-gen
inputs:
  - directory: ../proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: libs/proto-gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: libs/proto-gen
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
