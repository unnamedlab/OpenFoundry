---
# S6.1.b — `pg-lakekeeper` dedicated CNPG cluster.
#
# Backs the Lakekeeper Iceberg REST catalog (`infra/k8s/lakekeeper/`).
# Single-tenant — Lakekeeper owns the entire database; no schema
# multi-tenancy. Sized small (50Gi) because the Iceberg catalog stores
# only metadata pointers (snapshots, manifests, table locations); table
# data lives in Ceph RGW S3.
#
# Connectivity used by Lakekeeper deployment:
#   * pg-lakekeeper-rw.openfoundry.svc.cluster.local:5432/lakekeeper
#   * Pooler not used by Lakekeeper (REST catalog opens a small fixed
#     pool); the Pooler CRD is therefore omitted for this cluster.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-lakekeeper
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: pg-lakekeeper
    app.kubernetes.io/component: postgres
    openfoundry.io/managed-by: cnpg
    openfoundry.io/cluster-role: lakekeeper-catalog
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised

  minSyncReplicas: 1
  maxSyncReplicas: 1

  postgresql:
    parameters:
      synchronous_commit: "on"
      wal_level: "replica"
      max_wal_size: "2GB"
      shared_buffers: "512MB"
      max_connections: "200"

  bootstrap:
    initdb:
      database: lakekeeper
      owner: lakekeeper
      secret:
        name: pg-lakekeeper-app

  storage:
    size: 50Gi
    storageClass: ceph-rbd

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

  affinity:
    topologyKey: topology.kubernetes.io/zone
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred

  monitoring:
    enablePodMonitor: true

  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://openfoundry-pg-backups/pg-lakekeeper"
      endpointURL: "http://rook-ceph-rgw-openfoundry-store.rook-ceph.svc:80"
      s3Credentials:
        accessKeyId:
          name: pg-lakekeeper-backup
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-lakekeeper-backup
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 2
