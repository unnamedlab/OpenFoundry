global:
  deploymentFabric:
    environment: staging
  kafka:
    bootstrap: openfoundry-kafka-bootstrap.kafka.svc:9092

services:
  audit-sink:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
