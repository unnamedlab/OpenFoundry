[package]
name = "virtual-table-service"
description = "Virtual table catalog, registration, capability matrix and update detection"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies]
csv = "1.3"
sha2 = "0.10"
prometheus = { workspace = true }

[dependencies.async-trait]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.tonic]
workspace = true

[dependencies.prost]
workspace = true

[dependencies.prost-types]
workspace = true

[build-dependencies.tonic-build]
workspace = true

[build-dependencies.protoc-bin-vendored]
workspace = true

[features]
default = []
# Enables the live Kafka I/O path (rdkafka via librdkafka) in
# `connectors::kafka`. Default off keeps CI light and the catalog-backed
# behaviour available; production builds turn it on through the Dockerfile.
kafka-rdkafka = ["event-bus-control/kafka-rdkafka"]
# Provider-specific live SDK paths. Default off; the in-tree connector
# modules contain the orchestration logic and a deterministic
# in-process stub so unit/integration tests can exercise the contract
# without a live SDK. P2.next swaps the stub bodies for real SDK calls
# behind these features.
provider-databricks = []
provider-iceberg = []

[dependencies.reqwest]
workspace = true
features = ["multipart"]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.storage-abstraction]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tower-http]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.url]
workspace = true

[dependencies.uuid]
workspace = true

[[bin]]
path = "src/main.rs"
name = "virtual-table-service"
required-features = []

[lib]
path = "src/lib.rs"
name = "virtual_table_service"
required-features = []
crate-type = ["lib"]

[dev-dependencies.tokio]
workspace = true

[dev-dependencies.serde_json]
workspace = true

[dev-dependencies.uuid]
workspace = true
