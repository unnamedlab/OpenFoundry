[package]
name = "approvals-service"
description = "Human-in-the-loop approval queue and approval decisions"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-data]
workspace = true

[dependencies.idempotency]
workspace = true
features = ["postgres"]

[dependencies.outbox]
workspace = true

[dependencies.prometheus]
workspace = true

[dependencies.reqwest]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.state-machine]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.async-trait]
workspace = true

[lib]
path = "src/lib.rs"
name = "approvals_service"

[[bin]]
path = "src/main.rs"
name = "approvals-service"
required-features = []

# FASE 7 / Tarea 7.4 — `approvals-timeout-sweep` runs once and
# exits, deployed as a Kubernetes `CronJob` (default schedule
# every 5 min). Drives the `pending → expired` transition for
# every row past its `expires_at` deadline and publishes
# `approval.expired.v1` via the same outbox the synchronous
# handlers use.
[[bin]]
path = "src/bin/approvals_timeout_sweep.rs"
name = "approvals-timeout-sweep"
