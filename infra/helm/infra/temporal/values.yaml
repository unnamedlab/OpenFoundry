# Default Temporal values. Profile overlays in values-{dev,prod}.yaml are
# layered on top via helmfile. The `temporal:` key matches the upstream
# chart's name (a dependency of this wrapper).
temporal: {}

# ServiceMonitor + PrometheusRule under templates/files/. Disabled until
# Prometheus Operator CRDs are present.
observability:
  enabled: false

# Pre-create Cassandra keyspaces via a Job (prod path; depends on
# TLS secret, fixed RF=3). Dev creates the keyspaces ad-hoc in the
# task script below.
cassandraKeyspacesJob:
  enabled: false
