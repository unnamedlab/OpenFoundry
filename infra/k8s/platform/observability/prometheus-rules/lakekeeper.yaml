# Prometheus alerting rules for Lakekeeper (Iceberg REST catalog).
#
# Source repo:  infra/k8s/platform/manifests/lakekeeper/
# Scrape:       Lakekeeper exposes Prometheus metrics on its `/metrics`
#               endpoint (axum + tower-http metrics middleware).
# Validation:   `promtool check rules infra/k8s/platform/observability/prometheus-rules/lakekeeper.yaml`
#
# SLI rationale (upstream-sourced thresholds):
#   * 5xx rate: standard RED-method SLI. Threshold (1% of total requests
#     over 5m) is the "Google SRE: Site Reliability Workbook" default
#     for write-path catalog services.
#   * Request latency p99: Lakekeeper sits in the metadata path; the
#     project's docs recommend p99 < 500ms for catalog reads (commit
#     and snapshot operations are slower and excluded).
#   * DB connection saturation: Lakekeeper uses a sqlx pool against
#     CloudNativePG. Saturating the pool causes catalog requests to
#     queue, which in turn breaks the Iceberg scan SLO (ADR-0012 2.2).
groups:
  - name: lakekeeper.availability
    rules:
      - alert: LakekeeperDown
        expr: up{job=~"lakekeeper.*"} == 0
        for: 2m
        labels:
          severity: critical
          component: lakekeeper
        annotations:
          summary: "Lakekeeper instance {{ $labels.instance }} is down"
          description: |
            Iceberg REST catalog unreachable; DataFusion (sql-warehousing-service)
            and the Flight SQL gateway writers will fail commits. See infra/k8s/platform/manifests/lakekeeper/.

  - name: lakekeeper.errors
    rules:
      - alert: Lakekeeper5xxRateHigh
        # SRE Workbook: alert when error budget burn exceeds 1% of
        # total requests over a 5m window for a stateful API.
        expr: |
          (
            sum(rate(http_requests_total{job=~"lakekeeper.*",status=~"5.."}[5m]))
              /
            clamp_min(sum(rate(http_requests_total{job=~"lakekeeper.*"}[5m])), 1)
          ) > 0.01
        for: 10m
        labels:
          severity: warning
          component: lakekeeper
        annotations:
          summary: "Lakekeeper 5xx error rate > 1% for 10m"
          description: |
            5xx error ratio is `{{ $value | humanizePercentage }}`
            over 5m for 10m. Catalog clients will start to retry-storm.

  - name: lakekeeper.latency
    rules:
      - alert: LakekeeperRequestLatencyP99High
        # Project guidance: p99 < 500ms for catalog reads.
        expr: |
          histogram_quantile(
            0.99,
            sum by (le, route) (
              rate(http_request_duration_seconds_bucket{job=~"lakekeeper.*"}[5m])
            )
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          component: lakekeeper
        annotations:
          summary: "Lakekeeper request p99 > 500ms on route {{ $labels.route }}"
          description: |
            p99 latency = `{{ $value }}s` for 10m. Iceberg scan SLO
            (ADR-0012 2.2) cannot be met if catalog calls dominate
            the scan time.

  - name: lakekeeper.db
    rules:
      - alert: LakekeeperDbPoolSaturated
        # sqlx exposes pool size + idle. Saturation = idle ~= 0 while
        # acquired connections are at the pool max.
        expr: |
          (
            sqlx_pool_connections_idle{job=~"lakekeeper.*"} == 0
          )
            and
          (
            sqlx_pool_connections_acquired{job=~"lakekeeper.*"}
              >=
            sqlx_pool_connections_max{job=~"lakekeeper.*"} * 0.95
          )
        for: 5m
        labels:
          severity: warning
          component: lakekeeper
        annotations:
          summary: "Lakekeeper DB pool >= 95% saturated on {{ $labels.instance }}"
          description: |
            All sqlx pool connections are in use and none idle for 5m.
            Catalog requests are queueing; expect Iceberg commits to
            slow down. Consider raising the pool size or investigating
            slow PostgreSQL queries.
