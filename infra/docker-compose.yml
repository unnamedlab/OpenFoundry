x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-app-common: &app-common
  <<: *common
  profiles: ["app"]

# Cumulative rollout profiles:
# foundation -> data -> knowledge -> intelligence -> experience -> edge
# Each later profile includes all earlier application services.
x-profiles-foundation: &profiles-foundation ["app", "foundation", "data", "knowledge", "intelligence", "experience", "edge"]
x-profiles-data: &profiles-data ["app", "data", "knowledge", "intelligence", "experience", "edge"]
x-profiles-knowledge: &profiles-knowledge ["app", "knowledge", "intelligence", "experience", "edge"]
x-profiles-intelligence: &profiles-intelligence ["app", "intelligence", "experience", "edge"]
x-profiles-experience: &profiles-experience ["app", "experience", "edge"]
x-profiles-edge: &profiles-edge ["app", "edge"]

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    <<: *common
    image: ${OPENFOUNDRY_POSTGRES_IMAGE:-postgres:16-alpine}
    ports:
      - "${OPENFOUNDRY_POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: openfoundry
      POSTGRES_PASSWORD: openfoundry
      POSTGRES_DB: openfoundry
      # Comma-separated extra databases created by ./init-db/01-create-databases.sh.
      # Override (extend) in `docker-compose.dev.yml` for full per-service split.
      POSTGRES_MULTIPLE_DATABASES: ${OPENFOUNDRY_POSTGRES_EXTRA_DATABASES:-openfoundry_iceberg_catalog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfoundry"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Valkey (OSS Redis-compatible store, BSD-3) ─────────────
  valkey:
    <<: *common
    image: ${OPENFOUNDRY_VALKEY_IMAGE:-valkey/valkey:8-alpine}
    ports:
      - "${OPENFOUNDRY_REDIS_HOST_PORT:-6379}:6379"
    command: valkey-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NATS (JetStream) ───────────────────────────────────────
  nats:
    <<: *common
    image: ${OPENFOUNDRY_NATS_IMAGE:-nats:2-alpine}
    ports:
      - "${OPENFOUNDRY_NATS_HOST_PORT:-4222}:4222"
      - "${OPENFOUNDRY_NATS_MONITOR_HOST_PORT:-8222}:8222"
    command: --jetstream --store_dir /data --http_port 8222
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible) ──────────────────────────────────
  minio:
    <<: *common
    image: ${OPENFOUNDRY_MINIO_IMAGE:-minio/minio:latest}
    ports:
      - "${OPENFOUNDRY_MINIO_API_HOST_PORT:-9000}:9000"
      - "${OPENFOUNDRY_MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: ${OPENFOUNDRY_MINIO_MC_IMAGE:-minio/mc:latest}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/openfoundry &&
      mc mb --ignore-existing local/openfoundry-datasets &&
      mc mb --ignore-existing local/openfoundry-notebooks &&
      mc mb --ignore-existing local/openfoundry-artifacts
      "

  # ── Meilisearch ────────────────────────────────────────────
  meilisearch:
    <<: *common
    image: ${OPENFOUNDRY_MEILISEARCH_IMAGE:-getmeili/meilisearch:v1.11}
    ports:
      - "${OPENFOUNDRY_MEILISEARCH_HOST_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant se retira por restricción de licencia OSS; sustituto futuro: Vespa
  # (Apache-2.0). Por ahora pgvector cubre el caso embebido.

  # ── Iceberg REST Catalog (Apache Polaris, Apache-2.0) ──────
  # Provides a vendor-neutral Iceberg REST Catalog backed by the existing
  # PostgreSQL instance (database `openfoundry_iceberg_catalog`). The
  # bootstrap admin tool runs once to initialise the realm schema and
  # root credentials before the server starts.
  iceberg-catalog-bootstrap:
    <<: *common
    image: ${OPENFOUNDRY_POLARIS_ADMIN_IMAGE:-apache/polaris-admin-tool:1.4.0}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: ${OPENFOUNDRY_POSTGRES_USER:-openfoundry}
      QUARKUS_DATASOURCE_PASSWORD: ${OPENFOUNDRY_POSTGRES_PASSWORD:-openfoundry}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${OPENFOUNDRY_ICEBERG_CATALOG_DB:-openfoundry_iceberg_catalog}
    command:
      - bootstrap
      - --realm=${OPENFOUNDRY_ICEBERG_CATALOG_REALM:-openfoundry}
      - --credential=${OPENFOUNDRY_ICEBERG_CATALOG_REALM:-openfoundry},${OPENFOUNDRY_ICEBERG_CATALOG_CLIENT_ID:-root},${OPENFOUNDRY_ICEBERG_CATALOG_CLIENT_SECRET:-s3cr3t}

  iceberg-catalog:
    <<: *common
    image: ${OPENFOUNDRY_POLARIS_IMAGE:-apache/polaris:1.4.0}
    ports:
      - "${OPENFOUNDRY_ICEBERG_CATALOG_HOST_PORT:-8181}:8181"
      - "${OPENFOUNDRY_ICEBERG_CATALOG_MGMT_HOST_PORT:-8182}:8182"
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      POLARIS_REALM_CONTEXT_REALMS: ${OPENFOUNDRY_ICEBERG_CATALOG_REALM:-openfoundry}
      POLARIS_REALM_CONTEXT_DEFAULT_REALM: ${OPENFOUNDRY_ICEBERG_CATALOG_REALM:-openfoundry}
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: ${OPENFOUNDRY_POSTGRES_USER:-openfoundry}
      QUARKUS_DATASOURCE_PASSWORD: ${OPENFOUNDRY_POSTGRES_PASSWORD:-openfoundry}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${OPENFOUNDRY_ICEBERG_CATALOG_DB:-openfoundry_iceberg_catalog}
      QUARKUS_HTTP_PORT: "8181"
      QUARKUS_MANAGEMENT_PORT: "8182"
    depends_on:
      postgres:
        condition: service_healthy
      iceberg-catalog-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8182/q/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

