[package]
name = "audit-compliance-service"
description = "Immutable audit log, collector, search, compliance reporting, and administrative traceability"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.audit-trail]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.regex]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tonic]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

# ── Optional dependencies for the `it-debezium` end-to-end smoke test
# (`tests/outbox_e2e.rs`). Cargo cannot make `[dev-dependencies]`
# optional, so we declare them as optional regular dependencies and
# pull them in only when the feature is on. `cargo build` of the
# service binary in the default profile pays no librdkafka CMake cost.
[dependencies.outbox]
workspace = true
optional = true

[dependencies.rdkafka]
version = "0.36"
default-features = false
features = ["cmake-build", "ssl", "sasl", "tokio"]
optional = true

[dependencies.testcontainers]
workspace = true
optional = true

[features]
default = []
# Opt-in flag for the outbox → Debezium → Kafka backbone smoke test
# (S2.4). Off by default so plain `cargo test -p audit-compliance-service`
# stays Docker- and network-free. See `tests/outbox_e2e.rs` for the
# environment variables it expects.
it-debezium = ["dep:outbox", "dep:rdkafka", "dep:testcontainers"]

[[bin]]
path = "src/main.rs"
name = "audit-compliance-service"
required-features = []
