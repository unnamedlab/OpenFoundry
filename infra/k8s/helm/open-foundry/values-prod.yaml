global:
  existingSecret: open-foundry-prod-env
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: 32m
    hosts:
      - host: openfoundry.example.com
        paths:
          - path: /
    tls:
      - secretName: open-foundry-prod-tls
        hosts:
          - openfoundry.example.com

services:
  gateway:
    replicas: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 12
  identity-federation-service:
    replicas: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 8
  data-asset-catalog-service:
    replicas: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 10
  sql-bi-gateway-service:
    env:
      DISTRIBUTED_QUERY_WORKERS: "8"
    autoscaling:
      minReplicas: 4
      maxReplicas: 20
      keda:
        enabled: true
  pipeline-authoring-service:
    autoscaling:
      minReplicas: 3
      maxReplicas: 16
  report-service:
    replicas: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 10
  nexus-service:
    replicas: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 8
  geospatial-intelligence-service:
    replicas: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 10
