[package]
name = "ontology-actions-service"
description = "Ontology actions and operational writeback service"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
prometheus = { workspace = true }

[dependencies.tower]
workspace = true

[dependencies.tower-http]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.axum-extra]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.pyo3]
workspace = true
features = ["abi3-py311"]

[dependencies.reqwest]
workspace = true

[dependencies.semver]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tonic]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[[bin]]
path = "src/main.rs"
name = "ontology-actions-service"
required-features = []

[dependencies.ontology-kernel]
workspace = true

# S1.4.a / S1.4.e — production wiring of `Arc<dyn ObjectStore>` and the
# transactional outbox helper. The kernel re-exports `domain::writeback`
# which is the only call site that still needs `sqlx` from this binary.
[dependencies.cassandra-kernel]
workspace = true
features = ["repos"]

[dependencies.storage-abstraction]
workspace = true

[dependencies.search-abstraction]
workspace = true
features = ["vespa", "opensearch"]

# Smoke test: spins up Postgres via testcontainers, applies migrations and
# verifies the public surface of `build_router`. See `tests/health.rs`.
[dev-dependencies]
testcontainers = { workspace = true }

[dev-dependencies.outbox]
workspace = true

[dev-dependencies.cassandra-kernel]
workspace = true
features = ["repos"]

[dev-dependencies.storage-abstraction]
workspace = true

[dev-dependencies.futures]
workspace = true

[dev-dependencies.tracing-subscriber]
workspace = true

[dev-dependencies.scylla]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.tower]
workspace = true

[dev-dependencies.http-body-util]
version = "0.1"

[dev-dependencies.serde_json]
workspace = true

[dev-dependencies.sqlx]
workspace = true
features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"]

[dev-dependencies.uuid]
workspace = true
features = ["v4", "v5", "v7", "serde"]

[dev-dependencies.chrono]
workspace = true
