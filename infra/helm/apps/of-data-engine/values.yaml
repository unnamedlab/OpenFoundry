release: of-data-engine

serviceAccount:
  create: true
  name: ""
  annotations: {}

image:
  registry: ghcr.io/openfoundry
  tag: "0.1.0"

global:
  imagePullPolicy: IfNotPresent
  imageRegistry: ""
  imagePullSecrets: []
  existingSecret: open-foundry-env
  publicWebOrigin: https://openfoundry.example.com
  labels:
    app.kubernetes.io/part-of: openfoundry
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    readOnlyRootFilesystem: false
  terminationGracePeriodSeconds: 30
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  networkPolicy:
    enabled: true
    allowSameNamespaceTraffic: true
    additionalEgressCidrs: []
  platformProfile:
    enabled: true
    configMapName: openfoundry-platform-profile
  probes:
    readiness:
      enabled: true
      path: /healthz
      initialDelaySeconds: 8
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    liveness:
      enabled: true
      path: /healthz
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
  deploymentFabric:
    cloud: kubernetes
    environment: shared
    cell: core
    region: global
    multiCloud:
      enabled: false
      activeProvider: ""
      workloadIdentity:
        awsRoleArn: ""
        gcpServiceAccount: ""
        azureClientId: ""
      providers: []
    airGap:
      enabled: false
      privateRegistry: ""
      releaseBundle: ""
      disablePublicEgress: false
      mirrorRegistries: []
      allowedEgressCidrs: []
    geoRestrictions:
      enabled: false
      allowedCountries: []
      allowedIngressCidrs: []
      allowedEgressCidrs: []
      ingressAnnotations: {}
      requiredNodeLabels: {}
      residencyLabel: ""
  cassandra:
    localDc: dc1
  kafka:
    bootstrap: ""
    topicPrefix: ""

migrations:
  pg-schemas:
    enabled: true
    dsnSecret:
      name: pg-schemas-app
      key: dsn
  pg-runtime-config:
    enabled: true
    dsnSecret:
      name: pg-runtime-config-app
      key: dsn

services:
  connector-management-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    env:
      INGESTION_REPLICATION_GRPC_URL: http://ingestion-replication-service:8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  ingestion-replication-service:
    replicas: 3
    ports:
      - name: http
        containerPort: 8080
      - name: cdc-metadata
        containerPort: 50122
        servicePort: 50122
    env:
      CDC_METADATA_HOST: 0.0.0.0
      CDC_METADATA_PORT: "50122"
    envSecrets:
      CDC_METADATA_DATABASE_URL:
        secretName: cdc-metadata-pg-app
        key: uri
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  dataset-versioning-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  # ADR-0041 — Foundry Iceberg REST Catalog [Beta]. Coexists with
  # Lakekeeper (ADR-0008): Lakekeeper still owns the external warehouse
  # surface (audit-sink, ai-sink, lineage-service, dataset-versioning-service,
  # event-streaming-service all keep ICEBERG_CATALOG_URL → lakekeeper).
  # This service exposes the spec under `/iceberg/v1/*` plus the
  # Foundry-internal admin endpoints under `/api/v1/iceberg-tables/*`
  # consumed by `apps/web`. Migrations (`migrations/20260504*.sql`) are
  # applied by the binary on boot via `sqlx::migrate!` against
  # pg-schemas, mirroring the dataset-versioning-service pattern.
  iceberg-catalog-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8197
    env:
      ICEBERG_CATALOG_HOST: 0.0.0.0
      ICEBERG_CATALOG_PORT: "8197"
      ICEBERG_CATALOG_WAREHOUSE_URI: s3://openfoundry-iceberg
      IDENTITY_FEDERATION_URL: http://identity-federation-service:8080
      # S8 / ADR-0030 (B16): oauth-integration-service merged → identity-federation-service.
      OAUTH_INTEGRATION_URL: http://identity-federation-service:8080
    envSecrets:
      DATABASE_URL:
        secretName: pg-schemas-app
        key: dsn
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  media-sets-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    env:
      STORAGE_BUCKET: openfoundry-media
      STORAGE_ROOT: /tmp/openfoundry-media
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  # ADR-0042 / ADR-0039 — sibling runtime to `media-sets-service`:
  # executes the typed image/audio/video/document/spreadsheet access
  # patterns, bills compute-seconds, emits the
  # `media_set.access_pattern_invoked` audit envelope.
  media-transform-runtime-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    env:
      # Binary defaults to 50173; align with the chart-wide containerPort=8080
      # so probes hitting `http` resolve correctly.
      MEDIA_TRANSFORM_PORT: "8080"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  lineage-service:
    replicas: 2
    ports:
      - name: metrics
        containerPort: 9090
        servicePort: 9090
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
      prometheus.io/path: /metrics
    serviceAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
      prometheus.io/path: /metrics
    probes:
      readiness:
        path: /healthz
        port: metrics
      liveness:
        path: /healthz
        port: metrics
    env:
      LINEAGE_RUNTIME_MODE: kafka_to_iceberg
      ICEBERG_CATALOG_URL: http://lakekeeper.lakekeeper.svc:8181
      ICEBERG_WAREHOUSE: openfoundry-iceberg
      METRICS_ADDR: 0.0.0.0:9090
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  pipeline-build-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    # Python transforms use the co-process sidecar binary bundled in the
    # production image. Operators can override these values per environment
    # if the image path or execution budget changes.
    # TODO(pipeline-build): expose a readiness endpoint that verifies
    # Postgres plus the Python sidecar binary; /healthz is process-only.
    env:
      DATASET_SERVICE_URL: http://dataset-versioning-service:8080
      ONTOLOGY_DEFINITION_SERVICE_URL: http://ontology-definition-service:8080
      OBJECT_DATABASE_SERVICE_URL: http://object-database-service:8080
      WORKFLOW_SERVICE_URL: http://workflow-automation-service:8080
      AI_SERVICE_URL: http://agent-runtime-service:8080
      FOUNDRY_ICEBERG_CATALOG_URL: http://iceberg-catalog-service:8197
      PYTHON_SIDECAR_BINARY: /opt/pyruntime/bin/openfoundry-pyruntime
      PYTHON_SIDECAR_TIMEOUT_SECONDS: "60"
      SPARK_NAMESPACE: openfoundry-spark
      PIPELINE_RUNNER_IMAGE: ghcr.io/openfoundry/pipeline-runner:0.1.0
    spark:
      namespace: openfoundry-spark
      rbac:
        create: true
    envSecrets:
      DATABASE_URL:
        secretName: pipeline-build-db-dsn
        key: writer_url
      JWT_SECRET:
        secretName: openfoundry-jwt
        key: jwt_secret
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  # Compute Modules CRUD + project placement + function/pipeline mode
  # selection + container image / runtime config + function invocations.
  # S8 / ADR-0030 successor to the retired `compute-modules-control-plane-service`
  # and `compute-modules-runtime-service` scaffolds.
  compute-module-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    envSecrets:
      DATABASE_URL:
        secretName: compute-module-db-dsn
        key: writer_url
      OF_JWT__SECRET:
        secretName: openfoundry-jwt
        key: jwt_secret
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  sql-bi-gateway-service:
    replicas: 2
    ports:
      # HTTP side router (healthz + saved queries + warehouse/tabular REST).
      - name: http
        containerPort: 50134
        servicePort: 8080
      # Apache Arrow Flight SQL gRPC primary surface — BI clients
      # (Tableau, Superset, JDBC notebooks) connect here.
      - name: flight-sql
        containerPort: 50133
        servicePort: 50133
      # Postgres wire v3 listener for libpq-speaking BI tools.
      - name: postgres-wire
        containerPort: 5433
        servicePort: 5433
    probes:
      readiness:
        path: /healthz
        port: http
      liveness:
        path: /healthz
        port: http
    env:
      HOST: "0.0.0.0"
      PORT: "50133"
      HEALTHZ_PORT: "50134"
      POSTGRES_WIRE_PORT: "5433"
      DISTRIBUTED_QUERY_WORKERS: "4"
      TRINO_FLIGHT_SQL_URL: http://trino-flight-sql-proxy.trino.svc:50133
      ICEBERG_CATALOG_URL: http://iceberg-catalog-service:8197
      ALLOW_ANONYMOUS: "false"
      LOG_FORMAT: json
    envSecrets:
      DATABASE_URL:
        secretName: pg-runtime-config-app
        key: DATABASE_URL
      JWT_SECRET:
        secretName: openfoundry-jwt
        key: jwt_secret
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 12
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      keda:
        enabled: true
        pollingInterval: 15
        cooldownPeriod: 90
        triggers:
          - type: prometheus
            metadata:
              serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
              metricName: query_inflight_requests
              query: sum(openfoundry_query_inflight_requests)
              threshold: "40"

  # ── Data-engine services completed (S8.6 — full coverage) ───────────
  # NOTE — S8 / ADR-0030: `sql-warehousing-service`, `tabular-analysis-service`
  # and `analytical-logic-service` are merged into `sql-bi-gateway-service`
  # above; their schemas are migrated by `sql-bi-gateway-migrations.yaml`
  # and their HTTP/Flight SQL surfaces are served by the gateway pods.
  # Tabular-analysis lived under the ops chart previously and is removed
  # from `infra/helm/apps/of-apps-ops/values.yaml`.
  # S8 / ADR-0030 — `data-asset-catalog-service` and
  # `dataset-quality-service` merged → `dataset-versioning-service`.
  # The catalog (preview, upload, schema validate, dataset_model)
  # and quality (lint, profiler, scoring, health) HTTP surfaces now
  # live in dataset-versioning-service. Phase 1 absorbed the code as
  # a library (`dataset_versioning_service::{data_asset_catalog,
  # dataset_quality}::*`); the consolidated binary is wired in a
  # follow-up.

  # S8 / ADR-0030 (B15) — `lineage-deletion-service` merged →
  # `audit-compliance-service` (lives in `of-platform`). No
  # Deployment renders here.

  # S8 / ADR-0030 — `pipeline-authoring-service` and
  # `pipeline-schedule-service` merged → `pipeline-build-service`.
  # The authoring (job specs, expressions, media nodes, parameterized
  # views) and scheduling (cron triggers, build dispatcher, run store)
  # surfaces are now part of the consolidated pipeline-build runtime.
  # The `compute-modules-control-plane-service` and
  # `compute-modules-runtime-service` scaffolds were also retired in
  # the same commit (their migrations preserved on `pg-pipeline`).

  sql-warehousing-service:
    # S8 / ADR-0030: retired — merged into `sql-bi-gateway-service` above.
    # Schemas (`warehouse_jobs`, `warehouse_transformations`,
    # `warehouse_storage_artifacts`) are migrated by the gateway's
    # pre-install Job (`templates/sql-bi-gateway-migrations.yaml`).
    enabled: false

  # S8 / ADR-0030 (B17) — `virtual-table-service` merged →
  # `connector-management-service`. No standalone Deployment here.

  # S8 / ADR-0030 (B20) — `time-series-data-service` merged →
  # `ontology-exploratory-analysis-service` (lives in `of-ontology`).
  # No Deployment renders here.

  # S8 / ADR-0030 — `event-streaming-service` merged →
  # `ingestion-replication-service`. The streaming control plane
  # (REST + gRPC) is now hosted by ingestion-replication-service.
  # No separate Deployment renders here.

  # S8 / ADR-0030 — `global-branch-service` merged →
  # `code-repository-review-service` (lives in `of-apps-ops`, not this release).
  # S8 / ADR-0030 (B15) — `retention-policy-service` merged →
  # `audit-compliance-service` (lives in `of-platform`). No
  # Deployment renders here.

  # S8 / ADR-0030 (B14) — `checkpoints-purpose-service` merged →
  # `authorization-policy-service` (lives in `of-platform`, not this
  # release). No Deployment renders here.

  analytical-logic-service:
    # S8 / ADR-0030: retired — reusable expressions are now an internal
    # library (`libs/analytical-logic`) consumed by `sql-bi-gateway-service`
    # in-process, with no duplicated HTTP routes. The
    # `analytical_expressions` schema is migrated by the gateway's
    # pre-install Job (`templates/sql-bi-gateway-migrations.yaml`).
    enabled: false
