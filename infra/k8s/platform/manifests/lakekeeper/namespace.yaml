---
# Namespace that holds the Lakekeeper Iceberg REST Catalog deployment.
#
# Lakekeeper (Apache-2.0, https://github.com/lakekeeper/lakekeeper) is the
# Iceberg REST Catalog selected by OpenFoundry — see ADR-0008 and the
# `libs/storage-abstraction` README. It is stateless and delegates metadata
# persistence to a CloudNativePG `Cluster` and table data to the Ceph RGW
# object store (bucket `openfoundry-iceberg`, see infra/k8s/platform/manifests/rook/bucket.yaml).
#
# The CNPG `Cluster` (`lakekeeper-pg`) is owned by Task 12 and is NOT created
# by these manifests; only the Lakekeeper workload, its Service and the
# placeholder Secrets it consumes live in this namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: lakekeeper
  labels:
    app.kubernetes.io/name: lakekeeper
    app.kubernetes.io/part-of: open-foundry
    openfoundry.io/component: iceberg-rest-catalog
