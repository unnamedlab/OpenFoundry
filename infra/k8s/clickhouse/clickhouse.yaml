---
# ClickHouseInstallation -- analytics cluster for sub-second BI dashboards.
# Operated by the Altinity clickhouse-operator (Apache-2.0).
#
# Topology:
#   * 1 cluster ("openfoundry"), shards=2, replicas=3  -> 6 server pods.
#     Three replicas per shard give us a *real* per-shard quorum: with
#     `insert_quorum=2` (majority of 3) writes survive the loss of one
#     replica without sacrificing consistency, which is impossible with
#     only 2 replicas (any quorum requires both, so it is not
#     fault-tolerant). See ./README.md for the design rationale.
#   * Replication via ReplicatedMergeTree backed by ClickHouse Keeper
#     (no ZooKeeper). Default database engine is Atomic and the cluster
#     macros are wired so plain `CREATE TABLE ... ENGINE = ReplicatedMergeTree`
#     works without per-statement zookeeper paths.
#   * Image: clickhouse/clickhouse-server (official, Apache-2.0). We avoid
#     the Bitnami image because of its restricted-distribution policy.
#   * Persistent storage per pod (data + log).
#
# Companion CR: ./keeper.yaml (ClickHouseKeeperInstallation, replicas=3).
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: openfoundry
  namespace: clickhouse
spec:
  defaults:
    templates:
      podTemplate: clickhouse-pod
      dataVolumeClaimTemplate: clickhouse-data
      logVolumeClaimTemplate: clickhouse-log
      serviceTemplate: clickhouse-svc
  configuration:
    users:
      # Default user is locked down: no network access, no password.
      default/networks/ip:
        - "127.0.0.1/32"
      default/profile: default
      # Application user used by Trino, dashboards and ingestion jobs.
      # The password is provided by the secret `clickhouse-users` (key
      # `openfoundry-password`); see runbook §2.3 for how to seed it.
      openfoundry/password_sha256_hex_secret_ref:
        name: clickhouse-users
        key: openfoundry-password-sha256
      openfoundry/profile: default
      openfoundry/quota: default
      openfoundry/networks/ip:
        - "0.0.0.0/0"
      openfoundry/access_management: "0"
    profiles:
      default/max_memory_usage: "10000000000"
      default/use_uncompressed_cache: "0"
      default/load_balancing: random
      default/distributed_product_mode: local
    quotas:
      default/interval/duration: "3600"
      default/interval/queries: "0"
      default/interval/errors: "0"
      default/interval/result_rows: "0"
      default/interval/read_rows: "0"
      default/interval/execution_time: "0"
    settings:
      # Bind to all interfaces (operator already injects listen_host).
      prometheus/endpoint: /metrics
      prometheus/port: "9363"
      prometheus/metrics: "true"
      prometheus/events: "true"
      prometheus/asynchronous_metrics: "true"
    files:
      # Tell ClickHouse to use a remote Keeper ensemble. The operator
      # injects the host list automatically when `zookeeper.nodes` is
      # provided below; this file ensures backups, system tables, and the
      # Atomic engine all use the keeper as the metadata store.
      keeper.xml: |
        <clickhouse>
          <keeper_path>/clickhouse/openfoundry</keeper_path>
        </clickhouse>
    # Use the in-namespace ClickHouse Keeper service exposed by the
    # ClickHouseKeeperInstallation `openfoundry` (see keeper.yaml).
    zookeeper:
      nodes:
        - host: keeper-openfoundry.clickhouse.svc.cluster.local
          port: 2181
      session_timeout_ms: 30000
      operation_timeout_ms: 10000
      root: /clickhouse/openfoundry
    clusters:
      - name: openfoundry
        layout:
          shardsCount: 2
          replicasCount: 3
        templates:
          podTemplate: clickhouse-pod
          dataVolumeClaimTemplate: clickhouse-data
          logVolumeClaimTemplate: clickhouse-log
  templates:
    serviceTemplates:
      - name: clickhouse-svc
        generateName: clickhouse-{chi}
        spec:
          ports:
            - name: http
              port: 8123
            - name: tcp
              port: 9000
            - name: metrics
              port: 9363
          type: ClusterIP
    podTemplates:
      - name: clickhouse-pod
        spec:
          affinity:
            podAntiAffinity:
              # One ClickHouse pod per node within the cluster so that
              # the replicas of a shard never share a host.
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        clickhouse.altinity.com/chi: openfoundry
                    topologyKey: kubernetes.io/hostname
          containers:
            - name: clickhouse
              image: clickhouse/clickhouse-server:24.8.4.13
              imagePullPolicy: IfNotPresent
              ports:
                - name: http
                  containerPort: 8123
                - name: tcp
                  containerPort: 9000
                - name: interserver
                  containerPort: 9009
                - name: metrics
                  containerPort: 9363
              resources:
                requests:
                  cpu: "2"
                  memory: 8Gi
                limits:
                  cpu: "4"
                  memory: 16Gi
    volumeClaimTemplates:
      - name: clickhouse-data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 200Gi
      - name: clickhouse-log
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 25Gi
