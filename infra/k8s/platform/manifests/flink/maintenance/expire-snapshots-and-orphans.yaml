---
# =============================================================================
# FlinkDeployment: Iceberg `expire_snapshots` + `remove_orphan_files`
#
# Periodic maintenance job that:
#
#   * Expires snapshots older than the per-tier retention window
#       - hot  tier: 7 days   (`ICEBERG_RETENTION_HOT_HOURS`,  default 168 h)
#       - gold tier: 90 days  (`ICEBERG_RETENTION_GOLD_HOURS`, default 2160 h)
#     Tier is selected by the `ICEBERG_TIER` env var (`hot` or `gold`); the
#     k8s CronJob ships two variants (see infra/k8s/platform/manifests/flink/README.md §3 and
#     §4 — snapshot retention policy).
#
#   * Removes orphan files (data + metadata) that are no longer referenced
#     by any snapshot. Uses Iceberg's `Actions.deleteOrphanFiles(table)`
#     with a 3-day age threshold so we never race with in-flight writers.
#
# Mode:        application / batch (the job exits when all selected tables
#              have been processed — k8s CronJob re-creates this resource
#              on the documented schedule, see infra/k8s/platform/manifests/flink/README.md §3).
# Source:      Iceberg REST catalog served by Lakekeeper
#              (http://lakekeeper.lakekeeper.svc:8181 — see
#              `infra/k8s/platform/manifests/lakekeeper/values.yaml` and
#              `infra/k8s/helm/profiles/values-prod.yaml`).
# Targets:     Tables in the namespaces listed in `ICEBERG_NAMESPACES`.
# Sink:        Same warehouse as CDC: s3://openfoundry-iceberg/warehouse
#              (Ceph RGW — see `infra/runbooks/ceph.md` §3).
#
# HA, checkpoints and S3 wiring mirror `flinkdeployment-cdc-iceberg.yaml`:
#   * jobManager.replicas: 2
#   * high-availability.type: kubernetes
#   * checkpoints/savepoints under s3://openfoundry-iceberg/flink/...
# =============================================================================
apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: iceberg-expire-snapshots-and-orphans
  namespace: flink
  labels:
    app.kubernetes.io/name: iceberg-expire-snapshots-and-orphans
    app.kubernetes.io/part-of: openfoundry
    app.kubernetes.io/component: iceberg-maintenance
    openfoundry.io/maintenance-job: expire-snapshots-and-orphans
spec:
  image: ghcr.io/unnamedlab/openfoundry/flink-iceberg-maintenance:1.19.1-0.1.0
  flinkVersion: v1_19
  mode: native
  serviceAccount: flink

  flinkConfiguration:
    # --- Task slots / parallelism ------------------------------------------
    taskmanager.numberOfTaskSlots: "2"
    parallelism.default: "4"

    # --- High availability (required for jobManager.replicas > 1) ----------
    high-availability.type: kubernetes
    high-availability.storageDir: s3://openfoundry-iceberg/flink/ha/iceberg-expire-snapshots-and-orphans

    # --- Checkpoints & savepoints (Ceph RGW S3) ----------------------------
    state.backend.type: rocksdb
    state.backend.incremental: "true"
    state.checkpoints.dir: s3://openfoundry-iceberg/flink/checkpoints/iceberg-expire-snapshots-and-orphans
    state.savepoints.dir: s3://openfoundry-iceberg/flink/savepoints/iceberg-expire-snapshots-and-orphans
    execution.checkpointing.interval: "60000"
    execution.checkpointing.min-pause: "30000"
    execution.checkpointing.timeout: "600000"
    execution.checkpointing.max-concurrent-checkpoints: "1"
    execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION

    # --- Batch execution (expiration is a finite job) ----------------------
    execution.runtime-mode: BATCH

    # --- S3 / Ceph RGW (path-style required for RGW) -----------------------
    s3.endpoint: http://rook-ceph-rgw-openfoundry.rook-ceph.svc:80
    s3.path.style.access: "true"

    # --- Restart strategy ---------------------------------------------------
    restart-strategy: exponential-delay
    restart-strategy.exponential-delay.initial-backoff: 10 s
    restart-strategy.exponential-delay.max-backoff: 2 min
    restart-strategy.exponential-delay.backoff-multiplier: "2.0"
    restart-strategy.exponential-delay.reset-backoff-threshold: 10 min

    # --- Metrics ------------------------------------------------------------
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prom.port: "9249"

  jobManager:
    replicas: 2
    resource:
      memory: 2048m
      cpu: 1
    podTemplate:
      spec:
        containers:
          - name: flink-main-container
            envFrom:
              - secretRef:
                  name: flink-s3-credentials
            env:
              # Comma-separated list of Iceberg namespaces to process.
              - name: ICEBERG_NAMESPACES
                value: "openfoundry_cdc"
              - name: ICEBERG_CATALOG_URI
                value: "http://lakekeeper.lakekeeper.svc:8181"
              - name: ICEBERG_WAREHOUSE
                value: "s3://openfoundry-iceberg/warehouse"
              # Tier selector; the CronJob overrides this per schedule.
              # Allowed values: "hot" (7 d) or "gold" (90 d).
              - name: ICEBERG_TIER
                value: "hot"  # tier-override
              # Per-tier retention windows expressed in hours so they can be
              # tuned without rebuilding the image.
              - name: ICEBERG_RETENTION_HOT_HOURS
                value: "168"   # 7 d
              - name: ICEBERG_RETENTION_GOLD_HOURS
                value: "2160"  # 90 d
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                component: jobmanager
                app: iceberg-expire-snapshots-and-orphans

  taskManager:
    resource:
      memory: 4096m
      cpu: 2
    podTemplate:
      spec:
        containers:
          - name: flink-main-container
            envFrom:
              - secretRef:
                  name: flink-s3-credentials
            env:
              - name: ICEBERG_NAMESPACES
                value: "openfoundry_cdc"
              - name: ICEBERG_CATALOG_URI
                value: "http://lakekeeper.lakekeeper.svc:8181"
              - name: ICEBERG_WAREHOUSE
                value: "s3://openfoundry-iceberg/warehouse"
              - name: ICEBERG_TIER
                value: "hot"  # tier-override
              - name: ICEBERG_RETENTION_HOT_HOURS
                value: "168"
              - name: ICEBERG_RETENTION_GOLD_HOURS
                value: "2160"

  podTemplate:
    apiVersion: v1
    kind: Pod
    metadata:
      labels:
        app: iceberg-expire-snapshots-and-orphans
        app.kubernetes.io/part-of: openfoundry
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 9999
        fsGroup: 9999
      containers:
        - name: flink-main-container
          ports:
            - name: metrics
              containerPort: 9249

  job:
    # Built and published by the OpenFoundry release pipeline. The JAR bundles
    # a driver that runs, for every namespace in $ICEBERG_NAMESPACES:
    #   1. Actions.expireSnapshots(table).expireOlderThan(now - retention)
    #   2. Actions.deleteOrphanFiles(table).olderThan(now - 3 d)
    jarURI: local:///opt/flink/usrlib/iceberg-maintenance.jar
    entryClass: io.openfoundry.flink.iceberg.maintenance.ExpireSnapshotsAndOrphansJob
    args:
      - "--catalog=rest"
      - "--catalog.uri=http://lakekeeper.lakekeeper.svc:8181"
      - "--catalog.warehouse=s3://openfoundry-iceberg/warehouse"
      - "--namespaces.env=ICEBERG_NAMESPACES"
      # --- expireSnapshots --------------------------------------------------
      # Tier resolved at runtime from $ICEBERG_TIER ->
      #   hot  -> $ICEBERG_RETENTION_HOT_HOURS  (7 d)
      #   gold -> $ICEBERG_RETENTION_GOLD_HOURS (90 d)
      - "--expire.tier.env=ICEBERG_TIER"
      - "--expire.retention-hours.hot.env=ICEBERG_RETENTION_HOT_HOURS"
      - "--expire.retention-hours.gold.env=ICEBERG_RETENTION_GOLD_HOURS"
      - "--expire.retain-last=5"
      # --- removeOrphanFiles ------------------------------------------------
      # Older-than guard prevents racing with in-flight writers.
      - "--orphans.older-than-hours=72"
      - "--orphans.dry-run=false"
    parallelism: 4
    upgradeMode: stateless
    state: running
