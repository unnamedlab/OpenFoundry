# Pre-create the Temporal keyspaces with the same replication shape as
# the rest of the OpenFoundry application keyspaces (NetworkTopology
# {dc1:3, dc2:3, dc3:3}). The Temporal Helm chart's schema-tool Job
# can create the schema (`setup-schema`) but expects the keyspace to
# exist; this Job fills the gap and is idempotent.
#
# Run order: AFTER the Cassandra cluster is `Ready` and BEFORE the
# Helm chart is installed. See infra/k8s/platform/manifests/temporal/README.md.

apiVersion: batch/v1
kind: Job
metadata:
  name: temporal-cassandra-keyspaces
  namespace: temporal
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-cassandra-keyspaces
        app.kubernetes.io/part-of: temporal
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: cqlsh
          image: cassandra:5.0.2
          imagePullPolicy: IfNotPresent
          env:
            - name: CASSANDRA_HOST
              value: of-cass-prod-dc1-service.cassandra.svc.cluster.local
            - name: CQLSH_USER
              valueFrom:
                secretKeyRef: { name: temporal-cassandra-credentials, key: username }
            - name: CQLSH_PASSWORD
              valueFrom:
                secretKeyRef: { name: temporal-cassandra-credentials, key: password }
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              cqlsh "$CASSANDRA_HOST" 9042 \
                --ssl \
                --cqlversion=3.4.7 \
                -u "$CQLSH_USER" -p "$CQLSH_PASSWORD" \
                -e "
              CREATE KEYSPACE IF NOT EXISTS temporal_persistence
                WITH replication = {'class':'NetworkTopologyStrategy',
                                    'dc1':3, 'dc2':3, 'dc3':3}
                AND durable_writes = true;
              CREATE KEYSPACE IF NOT EXISTS temporal_visibility
                WITH replication = {'class':'NetworkTopologyStrategy',
                                    'dc1':3, 'dc2':3, 'dc3':3}
                AND durable_writes = true;
              "
          volumeMounts:
            - name: cqlshrc
              mountPath: /root/.cassandra
              readOnly: true
      volumes:
        - name: cqlshrc
          secret:
            secretName: temporal-cassandra-client-tls
            items:
              - { key: ca.crt,  path: ca.crt }
              - { key: tls.crt, path: tls.crt }
              - { key: tls.key, path: tls.key }
