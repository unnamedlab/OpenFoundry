[package]
name = "data-asset-catalog-service"
description = "Dataset catalog, metadata, previews, uploads, and filesystem views"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies]
csv = "1.3"
async-trait = "0.1"
anyhow = "1"
urlencoding = "2"

[dependencies.moka]
workspace = true

[dependencies.arrow]
version = "53"

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true
features = ["multipart"]

[dependencies.axum-extra]
workspace = true

[dependencies.bytes]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.datafusion]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.query-engine]
workspace = true

[dependencies.regex]
workspace = true

[dependencies.reqwest]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.storage-abstraction]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tower-http]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.prometheus]
workspace = true

[dependencies.once_cell]
version = "1"

[[bin]]
path = "src/main.rs"
name = "data-asset-catalog-service"
required-features = []

# T7 — integration / smoke tests (testcontainers-driven; gated behind
# `#[ignore]` so default `cargo test` stays Docker-free).
[dev-dependencies]
testcontainers = { workspace = true }
wiremock = { workspace = true }
tempfile = "3"

[dev-dependencies.testing]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.tower]
workspace = true

[dev-dependencies.http-body-util]
version = "0.1"

[dev-dependencies.serde_json]
workspace = true

[dev-dependencies.sqlx]
workspace = true
features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"]

[dev-dependencies.uuid]
workspace = true

[dev-dependencies.chrono]
workspace = true

[dev-dependencies.reqwest]
workspace = true

[dev-dependencies.auth-middleware]
workspace = true

[dev-dependencies.core-models]
workspace = true
