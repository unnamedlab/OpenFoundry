---
# S4.1.c — Debezium Postgres source connector for `pg-policy.outbox.events`.
#
# Lands paused (`pause-reconciliation: "true"`) and stays paused
# until the gates in `infra/helm/infra/debezium/templates/README.md` are met:
#   1. Every mutation handler in `docs/architecture/runbooks/outbox-handler-audit.md`
#      has been wired to `outbox::enqueue`.
#   2. `pg-policy` CNPG cluster has `wal_level=logical` (S6.1.b).
#   3. Apicurio schemas for the 4 versioned topics are registered.
#   4. Chaos test (`chaos-test.md`) signed off.
#
# Unpause:
#   kubectl annotate kafkaconnector/outbox-pg-policy -n kafka \
#     strimzi.io/pause-reconciliation="false" --overwrite
apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: outbox-pg-policy
  namespace: kafka
  labels:
    strimzi.io/cluster: debezium
    openfoundry.io/source: pg-policy
  annotations:
    # Paused on first reconcile. See header comment.
    strimzi.io/pause-reconciliation: "true"
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 1
  config:
    # ---- Source identity ----------------------------------------
    # `database.server.name` must be stable across restarts; it is
    # the prefix of every internal metric and of the historical
    # offset entry.
    database.server.name: pg-policy
    topic.prefix: pg-policy
    plugin.name: pgoutput
    slot.name: debezium_outbox_pg_policy
    publication.name: debezium_outbox_pg_policy_pub
    publication.autocreate.mode: filtered
    # ---- Postgres connection ------------------------------------
    database.hostname: pg-policy-rw.pg-policy.svc
    database.port: "5432"
    database.user: ${secrets:kafka/pg-policy-debezium:username}
    database.password: ${secrets:kafka/pg-policy-debezium:password}
    database.dbname: openfoundry
    # ---- Scope: outbox.events only ------------------------------
    schema.include.list: outbox
    table.include.list: outbox.events
    # ---- Snapshot semantics -------------------------------------
    # `never` is correct because `outbox::enqueue` already deletes
    # the row in the same tx; on a connector reset we resume from
    # the last committed slot offset and pick up live WAL changes.
    snapshot.mode: never
    # ---- EventRouter SMT ----------------------------------------
    transforms: outbox
    transforms.outbox.type: io.debezium.transforms.outbox.EventRouter
    # `topic` column on `outbox.events` carries the routing key.
    transforms.outbox.route.by.field: topic
    # The full topic name lives in the column, so the replacement
    # is just the routed value.
    transforms.outbox.route.topic.replacement: ${routedByValue}
    # Aggregate identity on the Kafka record key.
    transforms.outbox.table.field.event.id: event_id
    transforms.outbox.table.field.event.key: aggregate_id
    transforms.outbox.table.field.event.payload: payload
    transforms.outbox.table.field.event.payload.id: event_id
    transforms.outbox.table.fields.additional.placement: "headers:header"
    # Application transaction is INSERT+DELETE in the same tx; we
    # don't want Connect to also emit a tombstone.
    tombstones.on.delete: "false"
    # ---- Heartbeat to bound replication-slot lag ----------------
    # If the publication has no traffic for `heartbeat.interval.ms`
    # Debezium emits a heartbeat — keeps the slot moving forward
    # so it does not pin WAL forever during quiet windows.
    heartbeat.interval.ms: "30000"
    heartbeat.action.query: |
      INSERT INTO outbox.heartbeat (id, last_seen_at)
      VALUES ('debezium-outbox', NOW())
      ON CONFLICT (id) DO UPDATE SET last_seen_at = EXCLUDED.last_seen_at
    # ---- Producer overrides for this connector ------------------
    producer.override.acks: all
    producer.override.enable.idempotence: "true"
    producer.override.compression.type: zstd
    producer.override.max.in.flight.requests.per.connection: "5"
    producer.override.retries: "2147483647"
    # ---- Decimal / numeric handling ----------------------------
    decimal.handling.mode: string
    time.precision.mode: connect
    # ---- DLQ ---------------------------------------------------
    errors.tolerance: all
    errors.deadletterqueue.topic.name: __dlq.outbox-pg-policy.v1
    errors.deadletterqueue.topic.replication.factor: "3"
    errors.deadletterqueue.context.headers.enable: "true"
    errors.log.enable: "true"
    errors.log.include.messages: "false"
