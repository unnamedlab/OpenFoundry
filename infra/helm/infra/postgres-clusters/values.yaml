# Values for the four consolidated CNPG Cluster CRs.
#
# Defaults are prod-shaped (3 instances, sync replicas, ceph-rbd storage,
# Barman → Ceph S3 backups). Each cluster also exposes a `dev` toggle
# elsewhere (e.g. profiles/values-dev.yaml) so that:
#   - local lima clusters provision a single instance with local-path PVC
#   - backups + sync replicas are skipped
#   - Postgres tuning fits a 1 GiB pod
#
# Each top-level key (pgSchemas, pgPolicy, pgRuntimeConfig, pgLakekeeper)
# follows the same shape; values override the chart template defaults.
#
# `regionB.enabled` controls whether the cross-region read replica
# clusters are rendered (off in dev/single-region).

regionB:
  enabled: false

pgPolicy:
  enabled: true
  instances: 3
  syncReplicas: 1
  walLevel: logical
  storageClass: ceph-rbd
  storageSize: 200Gi
  walStorageSize: 50Gi
  enableSuperuserAccess: false
  backupEnabled: true
  resources:
    requests: { cpu: "2", memory: 8Gi }
    limits:   { cpu: "8", memory: 32Gi }
  postgresql:
    sharedBuffers: 2GB
    maxWalSize: 8GB
    workMem: 32MB
    effectiveCacheSize: 8GB
    maxConnections: "400"
    maxReplicationSlots: "8"
    maxWalSenders: "10"

pgSchemas:
  enabled: true
  instances: 3
  syncReplicas: 1
  walLevel: replica
  storageClass: ceph-rbd
  storageSize: 100Gi
  walStorageSize: 30Gi
  enableSuperuserAccess: false
  backupEnabled: true
  resources:
    requests: { cpu: "2", memory: 8Gi }
    limits:   { cpu: "8", memory: 32Gi }
  postgresql:
    sharedBuffers: 1GB
    maxWalSize: 4GB
    workMem: 32MB
    effectiveCacheSize: 4GB
    maxConnections: "400"
    maxReplicationSlots: "4"
    maxWalSenders: "6"

pgRuntimeConfig:
  enabled: true
  instances: 3
  syncReplicas: 1
  walLevel: replica
  storageClass: ceph-rbd
  storageSize: 100Gi
  walStorageSize: 30Gi
  enableSuperuserAccess: false
  backupEnabled: true
  resources:
    requests: { cpu: "2", memory: 8Gi }
    limits:   { cpu: "8", memory: 32Gi }
  postgresql:
    sharedBuffers: 1GB
    maxWalSize: 4GB
    workMem: 32MB
    effectiveCacheSize: 4GB
    maxConnections: "400"
    maxReplicationSlots: "4"
    maxWalSenders: "6"

pgLakekeeper:
  enabled: true
  instances: 3
  syncReplicas: 1
  walLevel: replica
  storageClass: ceph-rbd
  storageSize: 50Gi
  walStorageSize: 20Gi
  enableSuperuserAccess: false
  backupEnabled: true
  resources:
    requests: { cpu: "1", memory: 2Gi }
    limits:   { cpu: "4", memory: 8Gi }
  postgresql:
    sharedBuffers: 512MB
    maxWalSize: 2GB
    workMem: 16MB
    effectiveCacheSize: 2GB
    maxConnections: "200"

dsnSecrets:
  # Auto-generate <bc>-db-dsn Secrets for each bounded context.
  # In dev: enabled=true uses the literal placeholder password.
  # In prod: should be replaced by External Secrets Operator syncing from Vault.
  enabled: true
  password: "PLACEHOLDER_ROTATE_VIA_EXTERNAL_SECRETS"
  namespace: openfoundry
  # bc names are SNAKE_CASE (Postgres identifiers). Must match the
  # bcs TEXT[] arrays in the bootstrap-SQL ConfigMaps under
  # templates/clusters/. Single source of truth for the dev environment.
  bcs:
    pg-schemas:
      - data_asset_catalog
      - dataset_versioning
      - lineage
      - cdc_metadata
      - model_catalog
      - model_adapter
      - model_lifecycle
      - connector_management
      - tenancy_organizations
      - federation_product_exchange
      - marketplace
      - nexus
      - sdk_generation
      - solution_design
      - code_repository_review
      - document_reporting
      - analytical_logic
      - event_streaming
      - ingestion_replication
      - ai_application_generation
      - document_intelligence
      - mcp_orchestration
      - scenario_simulation
    pg-policy:
      - identity_federation
      - oauth_integration
      - network_boundary
      - cipher
      - security_governance
      - sds
      - audit_compliance
      - retention_policy
      - lineage_deletion
      - checkpoints_purpose
      - telemetry_governance
      - code_security_scanning
    pg-runtime-config:
      - agent_runtime
      - notebook_runtime
      - managed_workspace
      - custom_endpoints
      - developer_console
