name: CI — Frontend

on:
  push:
    branches: [main]
    paths: ["apps/web/**", "package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml"]
  pull_request:
    branches: [main]
    paths: ["apps/web/**", "package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml"]

jobs:
  build:
    name: Lint, Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @open-foundry/web lint
      - run: pnpm --filter @open-foundry/web check
      - run: pnpm --filter @open-foundry/web build

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @open-foundry/web test:unit

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @open-foundry/web exec playwright install --with-deps chromium
      - run: pnpm --filter @open-foundry/web test:e2e
