# Defaults shipped inside the container image.
# Override per-environment via CONFIG_FILE or OF_* env vars.

service:
  name: report-service
  version: 0.1.0

server:
  addr: ":8080"
  shutdown_timeout: 15s

jwt:
  # In production the secret comes from a Kubernetes Secret mounted
  # as OF_JWT__SECRET, never from this file.
  secret: ""
  issuer: "https://auth.openfoundry.local"
  audience: "openfoundry"

telemetry:
  otlp_endpoint: "localhost:4317"
  log_format: "plain"

database:
  # Honours DATABASE_URL when this stays empty; OF_DATABASE__URL can
  # override per environment.
  url: ""

report:
  # Production must use Postgres. Set OF_REPORT_ALLOW_MEMORY_STORE=true
  # only for isolated local development or unit tests.
  allow_memory_store: false

environment: ""
milestone: "S8.6"
