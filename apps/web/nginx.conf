server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every unknown route falls through to index.html so
    # react-router-dom can resolve client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for hashed Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
