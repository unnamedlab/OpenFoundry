nameOverride: ""
namespaceOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

global:
  imagePullPolicy: IfNotPresent
  imageRegistry: ""
  imagePullSecrets: []
  existingSecret: open-foundry-env
  publicWebOrigin: https://openfoundry.example.com
  labels:
    app.kubernetes.io/part-of: openfoundry
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    readOnlyRootFilesystem: false
  terminationGracePeriodSeconds: 30
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
  probes:
    readiness:
      enabled: true
      path: /health
      initialDelaySeconds: 8
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    liveness:
      enabled: true
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  networkPolicy:
    enabled: true
    allowSameNamespaceTraffic: true
    additionalEgressCidrs: []
  deploymentFabric:
    cloud: kubernetes
    environment: shared
    cell: core
    region: global
    multiCloud:
      enabled: false
      activeProvider: ""
      workloadIdentity:
        awsRoleArn: ""
        gcpServiceAccount: ""
        azureClientId: ""
      providers: []
    airGap:
      enabled: false
      privateRegistry: ""
      releaseBundle: ""
      disablePublicEgress: false
      mirrorRegistries: []
      allowedEgressCidrs: []
    geoRestrictions:
      enabled: false
      allowedCountries: []
      allowedIngressCidrs: []
      allowedEgressCidrs: []
      ingressAnnotations: {}
      requiredNodeLabels: {}
      residencyLabel: ""

# Object store backend used by libs/storage-abstraction (S3-compatible).
# - dev   : RustFS (Apache-2.0, single-binary S3 server) ── default
# - prod  : Ceph RGW operated by Rook (see infra/k8s/rook + values-prod.yaml)
# - other : any S3-compatible endpoint (R2, Wasabi, AWS S3, GCS HMAC, ...)
#
# These values are surfaced as the OBJECT_STORE_* env vars consumed by every
# service through the existing global secret (`global.existingSecret`).
# Switching backends is a config-only change; the storage-abstraction crate
# keeps speaking S3.
objectStore:
  backend: rustfs
  endpoint: http://rustfs:9000
  region: us-east-1
  forcePathStyle: true
  # Keys are expected to live in the env secret referenced by
  # `global.existingSecret` under the OBJECT_STORE_ACCESS_KEY /
  # OBJECT_STORE_SECRET_KEY entries. The keys below are only used when the
  # secret entries are absent (rendered as defaults for documentation).
  accessKeySecretKey: OBJECT_STORE_ACCESS_KEY
  secretKeySecretKey: OBJECT_STORE_SECRET_KEY
  buckets:
    datasets: openfoundry-datasets
    models: openfoundry-models
    iceberg: openfoundry-iceberg

apollo:
  enabled: false
  schedule: "*/15 * * * *"
  actionMode: observe
  image:
    repository: curlimages/curl
    tag: "8.8.0"
  gatewayUrl: ""
  readinessPath: /api/v1/control-panel/upgrade-readiness
  fleetsPath: /api/v1/marketplace/devops/fleets
  reconcileFleetIds: []
  promoteWebhookPath: ""
  tokenSecretName: open-foundry-apollo
  tokenSecretKey: token
  env: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

services:
  gateway:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/gateway
      tag: latest
    port: 8080
    replicas: 2
    env:
      RUST_LOG: info
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 75
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []

  identity-federation-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/identity-federation-service
      tag: latest
    port: 50112
    replicas: 2
    env:
      RUST_LOG: info
    # Postgres DSN routed through the consolidated CNPG `pg-policy`
    # cluster (S6.1.b) — schema `identity_federation`, role
    # `svc_identity_federation`. The `<bc>-db-dsn` Secret is sync-ed by
    # External Secrets Operator from Vault and contains pre-built URLs
    # with the right `search_path` query option and Pooler/replica host;
    # see ADR-0010 and `infra/k8s/cnpg/poolers/README.md`.
    envSecrets:
      DATABASE_URL:
        secretName: identity-federation-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: identity-federation-db-dsn
        key: reader_url
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 75
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []

  data-asset-catalog-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/data-asset-catalog-service
      tag: latest
    port: 50079
    replicas: 2
    env:
      RUST_LOG: info
    # Postgres DSN routed through the consolidated CNPG `pg-schemas`
    # cluster (S6.1.b) — schema `data_asset_catalog`, role
    # `svc_data_asset_catalog`. See `identity-federation-service`
    # above for the `<bc>-db-dsn` Secret convention.
    envSecrets:
      DATABASE_URL:
        secretName: data-asset-catalog-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: data-asset-catalog-db-dsn
        key: reader_url
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 3Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []

  sql-bi-gateway-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/sql-bi-gateway-service
      tag: latest
    port: 50133
    replicas: 2
    env:
      RUST_LOG: info
      DISTRIBUTED_QUERY_WORKERS: "4"
    # Postgres DSN routed through the consolidated CNPG `pg-runtime-config`
    # cluster (S6.1.b) — schema `sql_bi_gateway`, role `svc_sql_bi_gateway`.
    # See `identity-federation-service` for the `<bc>-db-dsn` convention.
    envSecrets:
      DATABASE_URL:
        secretName: sql-bi-gateway-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: sql-bi-gateway-db-dsn
        key: reader_url
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "4"
        memory: 8Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 12
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      keda:
        enabled: true
        pollingInterval: 15
        cooldownPeriod: 90
        triggers:
          - type: prometheus
            metadata:
              serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
              metricName: query_inflight_requests
              query: sum(openfoundry_query_inflight_requests)
              threshold: "40"

  report-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/report-service
      tag: latest
    port: 50064
    replicas: 2
    env:
      RUST_LOG: info
    # Postgres DSN routed through the consolidated CNPG `pg-runtime-config`
    # cluster (S6.1.b) — schema `report`, role `svc_report`.
    # See `identity-federation-service` for the `<bc>-db-dsn` convention.
    envSecrets:
      DATABASE_URL:
        secretName: report-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: report-db-dsn
        key: reader_url
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 75
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []

  nexus-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/nexus-service
      tag: latest
    port: 50067
    replicas: 2
    env:
      RUST_LOG: info
    # Postgres DSN routed through the consolidated CNPG `pg-schemas`
    # cluster (S6.1.b) — schema `nexus`, role `svc_nexus`.
    # See `identity-federation-service` for the `<bc>-db-dsn` convention.
    envSecrets:
      DATABASE_URL:
        secretName: nexus-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: nexus-db-dsn
        key: reader_url
    resources:
      requests:
        cpu: 250m
        memory: 384Mi
      limits:
        cpu: "2"
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 75
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []

  geospatial-intelligence-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/geospatial-intelligence-service
      tag: latest
    port: 50068
    replicas: 2
    env:
      RUST_LOG: info
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 65
      targetMemoryUtilizationPercentage: 75
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []

# ── Iceberg REST Catalog endpoint (Lakekeeper) ────────────────
# In-cluster URL of the Lakekeeper Service deployed by the manifests
# under `infra/k8s/lakekeeper/` (Apache-2.0; see
# infra/k8s/lakekeeper/README.md for the apply order, dependencies and
# placeholder Secrets). Services that open Iceberg tables through
# `libs/storage-abstraction` are expected to consume this URL (see the
# `libs/storage-abstraction/README.md` cluster example). Override
# per-environment in values-{dev,staging,prod}.yaml.
icebergRestCatalog:
  url: "http://lakekeeper.lakekeeper.svc:8181"

# ── Vespa hybrid search ───────────────────────────────────────
# Subchart: charts/vespa. Enable to deploy Vespa.ai (3 configservers,
# 2 stateless container nodes, 3 content nodes with redundancy=2) plus
# the application package versioned in `infra/k8s/vespa/app/`.  See
# charts/vespa/values.yaml for the full set of overridable values
# (replica counts, RBD storage class + sizes, JVM heap, metrics, ...).
vespa:
  enabled: false
