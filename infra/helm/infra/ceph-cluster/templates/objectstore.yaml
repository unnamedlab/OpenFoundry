---
# CephObjectStore for OpenFoundry production.
#
# Exposes an S3-compatible RGW endpoint at:
#   http://rook-ceph-rgw-openfoundry.rook-ceph.svc:80
#
# Pool design:
#   * metadataPool: 3-way replicated (small, latency-sensitive, indexes/omap)
#   * dataPool:     erasure coded 8+3 (large objects: datasets, models,
#                   iceberg parquet). Tolerates loss of 3 chunks; raw->usable
#                   ratio ≈ 1.375x (vs 3x for replicated).
#   * gateway.instances=3 → three RGW pods behind the Service for HA + load
#                   balancing. Co-locate with at least 3 distinct nodes.
apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: openfoundry
  namespace: rook-ceph
spec:
  metadataPool:
    failureDomain: host
    replicated:
      size: 3
      requireSafeReplicaSize: true
    parameters:
      compression_mode: none
  dataPool:
    failureDomain: host
    erasureCoded:
      dataChunks: 8
      codingChunks: 3
    parameters:
      bulk: "true"
      compression_mode: aggressive
  preservePoolsOnDelete: true
  gateway:
    port: 80
    securePort: 0
    instances: 3
    placement:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: rook-ceph-rgw
              topologyKey: kubernetes.io/hostname
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    priorityClassName: system-cluster-critical
  healthCheck:
    bucket:
      disabled: false
      interval: 60s
    livenessProbe:
      disabled: false
    readinessProbe:
      disabled: false
---
# StorageClass backed by the CephObjectStore above. ObjectBucketClaims that
# reference this class will provision buckets in the `openfoundry` store via
# the bucket provisioner shipped with Rook.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-bucket
provisioner: rook-ceph.ceph.rook.io/bucket
reclaimPolicy: Retain
parameters:
  objectStoreName: openfoundry
  objectStoreNamespace: rook-ceph
---
# CephObjectStore dedicated to Iceberg table data.
#
# Pool design:
#   * metadataPool: 3-way replicated on the default device class (indexes,
#                   omap, multipart upload state — latency-sensitive).
#   * dataPool:     erasure coded k=4, m=2 (Iceberg parquet/manifest files).
#                   Tolerates loss of 2 chunks; raw->usable ratio = 1.5x.
#                   The pool name observed in Ceph is
#                   `rgw-data.rgw.buckets.data`; we refer to the *logical*
#                   data pool as "rgw-data" throughout the docs.
#   * failureDomain: zone. The brief asks for `rack` when nodes expose a
#                   rack topology label, otherwise `zone`. The OpenFoundry
#                   cluster only labels nodes with `topology.kubernetes.io/
#                   zone` (see infra/helm/infra/kafka-cluster/templates/kafka-cluster.yaml:67), so
#                   the documented fallback applies.
#   * gateway.instances=3 → three RGW pods behind the Service for HA.
apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: rgw-data
  namespace: rook-ceph
spec:
  metadataPool:
    failureDomain: zone
    replicated:
      size: 3
      requireSafeReplicaSize: true
    parameters:
      compression_mode: none
  dataPool:
    failureDomain: zone
    erasureCoded:
      dataChunks: 4
      codingChunks: 2
    parameters:
      bulk: "true"
      compression_mode: aggressive
  preservePoolsOnDelete: true
  gateway:
    port: 80
    securePort: 0
    instances: 3
    placement:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: rook-ceph-rgw
              topologyKey: kubernetes.io/hostname
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    priorityClassName: system-cluster-critical
  healthCheck:
    bucket:
      disabled: false
      interval: 60s
    livenessProbe:
      disabled: false
    readinessProbe:
      disabled: false
---
# StorageClass backed by the rgw-data CephObjectStore. New ObjectBucketClaims
# (e.g. for Iceberg) should reference this class. The legacy `ceph-bucket`
# class continues to point at the `openfoundry` store so that existing OBCs
# (datasets/models/iceberg) keep their buckets — migration is a separate,
# documented runbook (no destructive changes here).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-bucket-rgw-data
provisioner: rook-ceph.ceph.rook.io/bucket
reclaimPolicy: Retain
parameters:
  objectStoreName: rgw-data
  objectStoreNamespace: rook-ceph
