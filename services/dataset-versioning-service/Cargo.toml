[package]
name = "dataset-versioning-service"
description = "Dataset versioning, transactions, and branching"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true
features = ["multipart"]

[dependencies.bytes]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.reqwest]
workspace = true

[dependencies.storage-abstraction]
workspace = true
features = ["readers"]

[dependencies.thiserror]
workspace = true

[dependencies.tower-http]
workspace = true

[dependencies.prometheus]
workspace = true

[dependencies.once_cell]
version = "1"

# T6.x — arrow-schema is used by `models::schema::DatasetSchema::to_arrow_schema`
# to surface a runtime-typed Arrow schema. We pin to 53 to match the rest of the
# arrow toolchain in the workspace (see Cargo.toml [patch.crates-io]).
[dependencies.arrow-schema]
version = "53"

# Schema content-hash idempotency uses MD5 to stay byte-compatible with
# the SQL trigger in `migrations/20260503000001_schema_per_view.sql`,
# which uses Postgres `md5()`.
[dependencies.md-5]
version = "0.10"

# P6 — API conformance helpers in `handlers::conformance`.
# Cursor pagination uses base64; ETag/`If-None-Match` uses SHA-256.
[dependencies.base64]
workspace = true

[dependencies.sha2]
workspace = true

# P4 — outbox publishes branch-lifecycle domain events (created,
# reparented, deleted, archived, restored, markings.updated,
# retention.updated) on the `foundry.branch.events.v1` topic.
[dependencies.outbox]
workspace = true

# T7 — integration / smoke tests (testcontainers-driven; gated behind
# `#[ignore]` so default `cargo test` stays Docker-free).
[dev-dependencies]
testcontainers = { workspace = true }
wiremock = { workspace = true }
tempfile = "3"

[dev-dependencies.testing]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.tower]
workspace = true

[dev-dependencies.http-body-util]
version = "0.1"

[dev-dependencies.serde_json]
workspace = true

[dev-dependencies.sqlx]
workspace = true
features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"]

[dev-dependencies.uuid]
workspace = true

[dev-dependencies.chrono]
workspace = true

[dev-dependencies.reqwest]
workspace = true

[dev-dependencies.auth-middleware]
workspace = true

# P2 — preview integration tests build small Avro fixtures inline via
# apache-avro (mirroring the `dataset_versioning_service::storage::preview`
# Avro path) and exercise the storage backend directly.
[dev-dependencies.apache-avro]
workspace = true

[dev-dependencies.bytes]
workspace = true

[dev-dependencies.url]
workspace = true

[dev-dependencies.storage-abstraction]
workspace = true
features = ["readers"]

[[bin]]
path = "src/main.rs"
name = "dataset-versioning-service"
required-features = []
