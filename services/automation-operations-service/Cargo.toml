[package]
name = "automation-operations-service"
description = "Automations operational control plane: queues, retries, dependencies and per-object execution"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-data]
workspace = true

[dependencies.idempotency]
workspace = true
features = ["postgres"]

[dependencies.outbox]
workspace = true

[dependencies.prometheus]
workspace = true

[dependencies.reqwest]
workspace = true

[dependencies.saga]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.temporal-client]
workspace = true
features = ["grpc"]

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.async-trait]
workspace = true

[dev-dependencies.testcontainers]
workspace = true

[features]
default = []
# Tarea 6.4 — chaos / integration tests against a Postgres
# testcontainer (Docker required). Off by default so plain
# `cargo test -p automation-operations-service` stays a no-IO
# unit run; CI / nightly enables it explicitly.
it-postgres = []

[lib]
path = "src/lib.rs"
name = "automation_operations_service"

[[bin]]
path = "src/main.rs"
name = "automation-operations-service"
required-features = []
