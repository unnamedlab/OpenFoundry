[package]
name = "iceberg-catalog-service"
description = "Iceberg REST Catalog [Beta] — implements the Apache Iceberg REST Catalog spec on top of OpenFoundry's storage and identity stack"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.audit-trail]
workspace = true

[dependencies.authz-cedar]
workspace = true

[dependencies.cedar-policy]
version = "4"

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.bytes]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.jsonschema]
workspace = true

[dependencies.jsonwebtoken]
workspace = true

[dependencies.observability]
workspace = true

[dependencies.prometheus]
workspace = true

[dependencies.rand]
workspace = true

[dependencies.reqwest]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sha2]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tower]
workspace = true

[dependencies.tower-http]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.url]
workspace = true

# Optional Iceberg writers/readers — share the same iceberg-rust based
# integration that `dataset-versioning-service` exercises. The catalog
# itself owns the metadata persistence path (Postgres + object storage),
# but delegates Parquet-write / scan to this layer.
[dependencies.storage-abstraction]
workspace = true
features = ["iceberg"]

[dependencies.once_cell]
version = "1"

[dependencies.argon2]
workspace = true

[dev-dependencies]
testcontainers = { workspace = true }
wiremock = { workspace = true }
tempfile = "3"

[dev-dependencies.testing]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.tower]
workspace = true

[dev-dependencies.http-body-util]
version = "0.1"

[dev-dependencies.serde_json]
workspace = true

[dev-dependencies.sqlx]
workspace = true
features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"]

[dev-dependencies.uuid]
workspace = true

[dev-dependencies.chrono]
workspace = true

[dev-dependencies.reqwest]
workspace = true

[lib]
path = "src/lib.rs"
name = "iceberg_catalog_service"

[[bin]]
path = "src/main.rs"
name = "iceberg-catalog-service"
required-features = []
