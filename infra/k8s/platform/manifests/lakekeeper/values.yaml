---
# Helm values for the official Lakekeeper chart.
#
# Chart coordinates (verify before each upgrade):
#   repository: https://lakekeeper.github.io/lakekeeper-charts/
#   chart:      lakekeeper
#   license:    Apache-2.0 (https://github.com/lakekeeper/lakekeeper-charts)
#
# Install (after the prerequisites in README.md are in place):
#   helm repo add lakekeeper https://lakekeeper.github.io/lakekeeper-charts/
#   helm upgrade --install lakekeeper lakekeeper/lakekeeper \
#     -n lakekeeper --create-namespace \
#     -f infra/k8s/platform/manifests/lakekeeper/values.yaml
#
# Scope
# -----
# This file ONLY parametrises the Lakekeeper workload. The metadata Postgres
# (a CloudNativePG `Cluster` named `lakekeeper-pg`) is owned by Task 12 and
# is NOT defined here — Lakekeeper only references it by name through
# `externalDatabase.*`. The Ceph RGW endpoint, bucket and credentials are
# also referenced by name (Secret + ConfigMap created out-of-band, see
# infra/k8s/platform/manifests/rook/bucket.yaml and infra/runbooks/ceph.md).
#
# Pin the chart-level fullname so the catalog Service ends up with a stable,
# DNS-friendly name that matches the URL hard-coded in:
#   * infra/k8s/helm/profiles/values-prod.yaml  (icebergRestCatalog.url)
#   * libs/storage-abstraction/README.md       (cluster example)
fullnameOverride: "lakekeeper"

lakekeeper:
  # 100% OSS deployment — the `core` edition is Apache-2.0. The `plus`
  # edition requires a commercial license and is intentionally not used.
  edition: "core"

catalog:
  image:
    # Pin to a known-good upstream image at deploy time; bump in a dedicated
    # PR. Defaults from the chart are quay.io/lakekeeper/catalog:vX.Y.Z.
    repository: quay.io/lakekeeper/catalog
    tag: "v0.12.0"
    pullPolicy: IfNotPresent

  # 3 stateless replicas behind a single ClusterIP Service. Lakekeeper's
  # catalog process keeps no on-disk state — all state lives in CNPG —
  # so replicas are freely interchangeable and rolling upgrades are safe.
  replicas: 3

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Spread the 3 replicas across nodes / zones so that a single-node or
  # single-AZ failure cannot take the catalog down.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: lakekeeper
          app.kubernetes.io/component: catalog

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  livenessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5

  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5

  # Lakekeeper accepts every server option as an environment variable
  # prefixed with `LAKEKEEPER__`. The S3 backend block below tells the
  # catalog where the warehouse data files live and how to talk to the
  # Ceph RGW gateway. Per-warehouse access keys are NOT set here; they are
  # injected from the Secret declared in `catalog.extraEnv` so they can be
  # rotated without redeploying the chart.
  config:
    # OIDC: the issuer URL is consumed by the chart at the top-level
    # `auth.oauth2.providerUri` key (see below). It is repeated here purely
    # for visibility — Lakekeeper itself reads `LAKEKEEPER__OPENID_*` env
    # vars rendered by the chart.
    LAKEKEEPER__BASE_URI: "http://lakekeeper.lakekeeper.svc:8181"

    # ── S3 backend (Ceph RGW operated by Rook) ───────────────────────────
    # The bucket is owned by infra/k8s/platform/manifests/rook/bucket.yaml (ObjectBucketClaim
    # `openfoundry-iceberg`). The endpoint resolves inside the cluster to
    # the Rook RGW Service exposed by infra/k8s/platform/manifests/rook/objectstore.yaml
    # (`rook-ceph-rgw-rgw-data` in `rook-ceph` namespace, port 80).
    LAKEKEEPER__S3_ENDPOINT: "http://rook-ceph-rgw-rgw-data.rook-ceph.svc:80"
    LAKEKEEPER__S3_REGION: "us-east-1"
    LAKEKEEPER__S3_PATH_STYLE_ACCESS: "true"
    LAKEKEEPER__S3_BUCKET: "openfoundry-iceberg"

  # ── S3 credentials (Ceph RGW) ──────────────────────────────────────────
  # Credentials are injected from the placeholder Secret `lakekeeper-s3`
  # which MUST be created out-of-band in this namespace with keys
  # `AWS_ACCESS_KEY_ID` and `AWS_SECRET_ACCESS_KEY` (or the equivalent
  # entries harvested from the OBC's generated Secret — see
  # infra/k8s/platform/manifests/rook/bucket.yaml and infra/runbooks/ceph.md).
  #
  # Until the Secret exists, Lakekeeper will refuse to mint signed URLs for
  # warehouse data. This is the documented bootstrap order in README.md.
  extraEnv:
    - name: LAKEKEEPER__S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: lakekeeper-s3
          key: AWS_ACCESS_KEY_ID
          optional: true
    - name: LAKEKEEPER__S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: lakekeeper-s3
          key: AWS_SECRET_ACCESS_KEY
          optional: true

  service:
    type: ClusterIP
    externalPort: 8181

# Disable the bundled `groundhog2k/postgres` subchart — production uses the
# CloudNativePG cluster `lakekeeper-pg` declared in Task 12.
postgresql:
  enabled: false

# ── External Postgres = CNPG cluster `lakekeeper-pg` ─────────────────────
# CloudNativePG creates a `<cluster>-app` Secret with `username`/`password`
# entries and exposes a `<cluster>-rw` Service for read/write traffic and a
# `<cluster>-r` Service for read-only replicas. We point Lakekeeper's writer
# at `-rw` and its readers at `-r`. The CNPG `Cluster` itself is NOT created
# here — it is owned by Task 12.
externalDatabase:
  type: postgres
  host_read: "lakekeeper-pg-r.lakekeeper.svc.cluster.local"
  host_write: "lakekeeper-pg-rw.lakekeeper.svc.cluster.local"
  port: 5432
  database: "lakekeeper"
  # Username/password are sourced from the CNPG-generated Secret so that
  # rotation by the operator propagates without a Helm upgrade.
  userSecret: "lakekeeper-pg-app"
  userSecretKey: "username"
  passwordSecret: "lakekeeper-pg-app"
  passwordSecretKey: "password"

# ── Authentication: OIDC via identity-federation-service ─────────────────
# The issuer URL points at the in-cluster Service of
# `identity-federation-service` (see infra/k8s/helm/of-platform/values.yaml,
# `services.identity-federation-service`). Replace the `realms/openfoundry`
# suffix with whatever realm path the federation service publishes its
# `.well-known/openid-configuration` under.
#
# `audience` and `ui.clientID` are placeholders — set them to the Client ID
# registered for Lakekeeper inside identity-federation-service.
auth:
  oauth2:
    # yamllint disable-line rule:line-length
    providerUri: "http://identity-federation-service.default.svc.cluster.local:50112/realms/openfoundry"
    audience: "lakekeeper"
    ui:
      clientID: "lakekeeper-ui"
      scopes: "openid profile email"
  k8s:
    enabled: false

# Use the bundled Postgres-backed secret store (encrypts per-warehouse
# credentials inside the same CNPG cluster). The encryption key is taken
# from a placeholder Secret created out-of-band; see README.md.
secretBackend:
  type: "Postgres"
  postgres:
    encryptionKeySecret: "lakekeeper-encryption-key"
    encryptionKeySecretKey: "encryptionKey"

# Allow-all authorisation for now — fine-grained access is enforced upstream
# by identity-federation-service / the gateway. Switching to OpenFGA is a
# separate, non-reversible bootstrap operation tracked in the runbook.
authz:
  backend: "allowall"

internalOpenFGA: false

# helm install --wait friendliness: let migration jobs block install.
helmWait: true
