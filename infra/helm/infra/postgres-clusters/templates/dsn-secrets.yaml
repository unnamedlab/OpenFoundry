{{- /*
Auto-generated <bc>-db-dsn Secrets for each bounded context declared in
the bootstrap-SQL ConfigMaps. In dev (no External Secrets Operator), the
role password is the literal placeholder string written by the bootstrap
SQL — the placeholder IS the actual password until ESO/Vault rotates it.

Per `infra/helm/docs/DATABASE_URL.md` the writer should hit the Pooler
(transaction mode + search_path), but the dev clusters lack the
`cnpg_pooler_pgbouncer` auth-query role required by PgBouncer. Until
the pooler bootstrap is fixed (CNPG `enableSuperuserAccess` or a
managed `authQuerySecret`), the writer URL points at the primary `-rw`
service directly. Set `dsnSecrets.usePooler=true` to switch back.

  writer_url → <cluster>-rw OR <cluster>-pooler-rw   (search_path)
  reader_url → <cluster>-ro                           (read replica, search_path)
*/}}
{{- if .Values.dsnSecrets.enabled }}
{{- $password := default "PLACEHOLDER_ROTATE_VIA_EXTERNAL_SECRETS" .Values.dsnSecrets.password }}
{{- $namespace := default "openfoundry" .Values.dsnSecrets.namespace }}
{{- $writerHost := ternary "pooler-rw" "rw" (default false .Values.dsnSecrets.usePooler) }}
{{- range $cluster, $bcs := .Values.dsnSecrets.bcs }}
{{- range $bcs }}
{{- $bc := . }}
{{- $bcKebab := replace "_" "-" $bc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $bcKebab }}-db-dsn
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/managed-by: postgres-clusters
    app.kubernetes.io/component: dsn-secret
    openfoundry.io/cluster: {{ $cluster }}
    openfoundry.io/bc: {{ $bc }}
type: Opaque
stringData:
  writer_url: postgresql://svc_{{ $bc }}:{{ $password }}@{{ $cluster }}-{{ $writerHost }}.{{ $namespace }}.svc.cluster.local:5432/app?sslmode=require&options=-c%20search_path%3D{{ $bc }}
  reader_url: postgresql://svc_{{ $bc }}:{{ $password }}@{{ $cluster }}-ro.{{ $namespace }}.svc.cluster.local:5432/app?sslmode=require&options=-c%20search_path%3D{{ $bc }}
{{- end }}
{{- end }}
{{- end }}
