# Values for the upstream Apicurio Registry Helm chart.
#
#   helm repo add apicurio https://apicurio.github.io/apicurio-registry/charts/
#   helm install -n apicurio apicurio-registry \
#     apicurio/apicurio-registry \
#     -f values-apicurio-registry.yaml
#
# Persistence is delegated to PostgreSQL via CloudNativePG — see
# `apicurio-registry.yaml` for the `Cluster` CR. The `-rw` service exposes
# the current primary and is what the registry connects to.

image:
  repository: quay.io/apicurio/apicurio-registry
  # The chart pins a tag matching its appVersion; override here only to
  # roll forward independently of the chart upgrade cadence.
  pullPolicy: IfNotPresent

# HA: 3 replicas, anti-affinity, PDB minAvailable=2. The registry is
# stateless once Postgres is the source of truth.
replicaCount: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 2

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: apicurio-registry

# Persistence backend. The chart maps these to the
# `APICURIO_STORAGE_KIND` / `APICURIO_STORAGE_SQL_KIND` env vars and
# composes the JDBC URL from the connection settings below.
registry:
  storage:
    kind: sql
    sql:
      kind: postgresql
      # Hostname of the CNPG read-write service. CNPG creates
      # `<cluster>-rw` automatically.
      host: apicurio-pg-rw.apicurio.svc
      port: 5432
      database: apicurio
      # Credentials are read from the Secret created by CNPG bootstrap
      # (`apicurio-pg-app`), which contains the keys `username` /
      # `password`.
      existingSecret: apicurio-pg-app
      existingSecretUsernameKey: username
      existingSecretPasswordKey: password

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

# Pod-level hardening
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: false

# Labels propagated to pods so the CiliumNetworkPolicy in
# `network-policies.yaml` selects them correctly.
podLabels:
  app.kubernetes.io/name: apicurio-registry
