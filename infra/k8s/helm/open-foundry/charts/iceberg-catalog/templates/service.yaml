{{- if .Values.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iceberg-catalog.fullname" . }}
  labels:
{{ include "iceberg-catalog.labels" . | indent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: catalog
      port: {{ .Values.service.catalogPort }}
      targetPort: catalog
      protocol: TCP
    - name: management
      port: {{ .Values.service.managementPort }}
      targetPort: management
      protocol: TCP
  selector:
{{ include "iceberg-catalog.selectorLabels" . | indent 4 }}
{{- end }}
