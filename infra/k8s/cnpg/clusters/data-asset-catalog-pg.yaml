---
# CloudNativePG `Cluster` for the data-asset-catalog-service bounded
# context (datasets, branches, dataset views, quality + lakehouse
# prefix metadata).
#
# Wave 1 pilot for T13 (per-bounded-context CNPG wiring). The naming,
# storage class, S3 backup convention and Secret layout follow the
# pattern documented in `infra/k8s/cnpg/clusters/README.md`. Defaults
# mirror `infra/k8s/cnpg/templates/cluster.yaml`.
#
# Consumed by `infra/k8s/helm/open-foundry/values.yaml` via the
# `services.data-asset-catalog-service.env.DATABASE_URL` entry, which
# resolves to `data-asset-catalog-pg-rw.openfoundry.svc.cluster.local`.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: data-asset-catalog-pg
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: data-asset-catalog-pg
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: openfoundry
    openfoundry.io/managed-by: cnpg
    openfoundry.io/bounded-context: data-asset-catalog
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised

  # See identity-federation-pg.yaml for the durability rationale.
  minSyncReplicas: 1
  maxSyncReplicas: 1

  postgresql:
    parameters:
      synchronous_commit: "on"
      wal_level: "logical"
      max_wal_size: "2GB"
      shared_buffers: "512MB"

  bootstrap:
    initdb:
      database: data_asset_catalog
      owner: data_asset_catalog
      secret:
        name: data-asset-catalog-pg-app

  storage:
    # Catalog grows with ingest (dataset rows, branches, views,
    # transactions) — start at the template default of 50Gi and bump
    # via overlay when the ceph-rbd PVC reaches >70% utilisation.
    size: 50Gi
    storageClass: ceph-rbd

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  affinity:
    topologyKey: topology.kubernetes.io/zone
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred

  monitoring:
    enablePodMonitor: true

  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://openfoundry-pg-backups/data-asset-catalog-pg
      endpointURL: http://rook-ceph-rgw-openfoundry.rook-ceph.svc:80
      s3Credentials:
        accessKeyId:
          name: data-asset-catalog-pg-backup
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: data-asset-catalog-pg-backup
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 2
---
apiVersion: v1
kind: Secret
metadata:
  name: data-asset-catalog-pg-app
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: data-asset-catalog-pg
    openfoundry.io/managed-by: cnpg
type: kubernetes.io/basic-auth
stringData:
  username: data_asset_catalog
  password: change-me
---
apiVersion: v1
kind: Secret
metadata:
  name: data-asset-catalog-pg-backup
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: data-asset-catalog-pg
    openfoundry.io/managed-by: cnpg
type: Opaque
stringData:
  ACCESS_KEY_ID: change-me
  ACCESS_SECRET_KEY: change-me
