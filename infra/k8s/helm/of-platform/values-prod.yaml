services:
  edge-gateway-service:
    replicas: 3
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 12
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  identity-federation-service:
    replicas: 3
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80

temporal:
  address: temporal-frontend.temporal.svc.cluster.local:7233
  namespace: openfoundry-prod

temporalWorkers:
  defaults:
    replicas: 3
    logLevel: info
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 12
      targetCPUUtilizationPercentage: 65
      targetMemoryUtilizationPercentage: 75
    pdb:
      enabled: true
      minAvailable: 2
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  serviceMonitor:
    enabled: true
