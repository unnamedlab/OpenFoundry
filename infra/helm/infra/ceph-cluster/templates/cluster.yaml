---
# CephCluster for OpenFoundry production.
#
# Operator chart (rook-ceph) is installed separately; this manifest only
# declares the desired Ceph topology. See infra/terraform/modules/ceph for
# the Helm release that brings up the operator and CRDs.
#
# Topology rationale:
#   * mon.count=5  → tolerates two simultaneous mon failures (quorum=3)
#   * mgr.count=2  → active/standby manager for HA dashboards/PG balancer
#   * dataDirHostPath=/var/lib/rook → on-host state for mon/osd metadata.
#                    Ensure /var/lib/rook lives on a dedicated, persistent
#                    volume on every storage node.
#   * useAllNodes/useAllDevices/discovery → all unclaimed raw block devices
#                    on every node become OSDs automatically. Use
#                    deviceFilter / nodes blocks below to narrow the scope.
apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: openfoundry
  namespace: rook-ceph
spec:
  cephVersion:
    image: quay.io/ceph/ceph:v18.2.4
    allowUnsupported: false
  dataDirHostPath: /var/lib/rook
  skipUpgradeChecks: false
  continueUpgradeAfterChecksEvenIfNotHealthy: false
  waitTimeoutForHealthyOSDInMinutes: 10
  mon:
    count: 5
    allowMultiplePerNode: false
  mgr:
    count: 2
    allowMultiplePerNode: false
    modules:
      - name: pg_autoscaler
        enabled: true
      - name: rook
        enabled: true
  dashboard:
    enabled: true
    ssl: true
  monitoring:
    enabled: true
  network:
    connections:
      encryption:
        enabled: true
      compression:
        enabled: false
      requireMsgr2: true
  crashCollector:
    disable: false
  logCollector:
    enabled: true
    periodicity: daily
    maxLogSize: 500M
  cleanupPolicy:
    confirmation: ""
    sanitizeDisks:
      method: quick
      dataSource: zero
      iteration: 1
    allowUninstallWithVolumes: false
  placement:
    all:
      tolerations:
        - key: storage-node
          operator: Exists
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - storage
    # mon: 5 pods spread across availability zones with maxSkew=1.
    # With 3+ zones the resulting layout is 2-2-1, so the loss of any
    # single zone leaves >= 3 mons alive and quorum (3 of 5) is preserved.
    # `whenUnsatisfiable: DoNotSchedule` is intentional: a Pending mon is
    # strictly preferable to a mon mis-placed against the contract — the
    # ceph-topology lint (tools/ceph-lint) enforces this on every PR.
    # `nodeAffinity`/`tolerations` from `placement.all` still apply; only
    # the spread constraints are added here.
    mon:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: rook-ceph-mon
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app: rook-ceph-mon
    # mgr: active/standby, must not share a zone. `ScheduleAnyway` is used
    # (vs. mon's `DoNotSchedule`) because losing both mgrs does not break
    # I/O — only balancer/dashboard/metrics — so preferring scheduling over
    # a hard placement guarantee is the right trade-off.
    mgr:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: rook-ceph-mgr
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app: rook-ceph-mgr
  resources:
    mon:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    mgr:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    osd:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 8Gi
  removeOSDsIfOutAndSafeToRemove: false
  storage:
    useAllNodes: true
    useAllDevices: true
    # Rook discovers raw block devices on every node and turns them into
    # OSDs. The discover daemonset is enabled at operator level (helm value
    # `enableDiscoveryDaemon=true`, see modules/ceph/main.tf).
    deviceFilter: "^(sd[b-z]|nvme[0-9]+n[0-9]+)$"
    config:
      osdsPerDevice: "1"
      encryptedDevice: "true"
  disruptionManagement:
    managePodBudgets: true
    osdMaintenanceTimeout: 30
    pgHealthCheckTimeout: 0
  healthCheck:
    daemonHealth:
      mon:
        disabled: false
        interval: 45s
      osd:
        disabled: false
        interval: 60s
      status:
        disabled: false
        interval: 60s
    livenessProbe:
      mon:
        disabled: false
      mgr:
        disabled: false
      osd:
        disabled: false
---
# CephBlockPool for latency-sensitive, write-heavy workloads (Kafka log
# segments, Postgres WAL/data). 3-way replication on NVMe-only OSDs with a
# zone-level failure domain so that the loss of a whole AZ keeps the pool
# active+clean (mon.count=5 in the CephCluster above tolerates 2 mon
# failures, matching this design).
#
# Consumed via a StorageClass (provisioned out-of-band; see README) that
# points at `pool: rbd-fast`.
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: rbd-fast
  namespace: rook-ceph
spec:
  failureDomain: zone
  replicated:
    size: 3
    requireSafeReplicaSize: true
  deviceClass: nvme
  parameters:
    compression_mode: none
