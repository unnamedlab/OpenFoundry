# Dev / CI overlay for the Temporal chart wrapper.
# Upstream temporal/temporal 1.2.0 (datastores schema, no embedded subcharts).

temporal:
  server:
    image:
      repository: temporalio/server
      tag: 1.31.0
    replicaCount: 1

    config:
      logLevel: debug

      persistence:
        defaultStore: default
        visibilityStore: visibility
        numHistoryShards: 512
        datastores:
          default:
            cassandra:
              hosts: "of-cass-dev-dc1-service.k8ssandra-operator.svc.cluster.local"
              port: 9042
              keyspace: temporal_persistence
              user: cass-admin
              existingSecret: temporal-cassandra-credentials
              secretKey: password
              replicationFactor: 1
              consistency:
                default:
                  consistency: local_one
                  serialConsistency: local_serial
              createDatabase: false
              manageSchema: false
          visibility:
            cassandra:
              hosts: "of-cass-dev-dc1-service.k8ssandra-operator.svc.cluster.local"
              port: 9042
              keyspace: temporal_visibility
              user: cass-admin
              existingSecret: temporal-cassandra-credentials
              secretKey: password
              replicationFactor: 1
              consistency:
                default:
                  consistency: local_one
                  serialConsistency: local_serial
              createDatabase: false
              manageSchema: false

    frontend: { replicaCount: 1 }
    history:  { replicaCount: 1 }
    matching: { replicaCount: 1 }
    worker:   { replicaCount: 1 }

    metrics:
      serviceMonitor:
        enabled: false

  admintools:
    enabled: false

  schema:
    setup:
      enabled: true
    update:
      enabled: true

  web:
    enabled: true
    image:
      repository: temporalio/ui
      tag: 2.30.1
    replicaCount: 1
    config:
      auth:
        enabled: false
