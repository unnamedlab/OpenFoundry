---
# =============================================================================
# Example FlinkDeployment: CDC -> Iceberg
#
# Reads change events emitted by the OpenFoundry CDC pipeline (see
# `services/cdc-metadata-service`) and writes them as Iceberg tables stored in
# the `openfoundry-iceberg` Ceph RGW bucket. Demonstrates the canonical
# operator settings used in production:
#
#   * mode: native               -> Flink's native Kubernetes integration
#   * flinkVersion: v1_19        -> latest version supported by operator 1.10
#   * jobManager.replicas: 2     -> HA JobManager (requires high-availability)
#   * savepoint storage on Ceph S3 (s3://openfoundry-iceberg/flink/savepoints)
#
# The job JAR is expected to be published as an OCI image at
# `ghcr.io/unnamedlab/openfoundry/flink-cdc-iceberg`. Replace `image` and
# `jarURI` for your build pipeline.
#
# S3 credentials are read from the `flink-s3-credentials` Secret which is
# materialised from the `openfoundry-iceberg` ObjectBucketClaim (see
# infra/runbooks/flink.md §3 and infra/runbooks/ceph.md §3).
# =============================================================================
apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: cdc-iceberg
  namespace: flink
  labels:
    app.kubernetes.io/name: cdc-iceberg
    app.kubernetes.io/part-of: openfoundry
spec:
  image: ghcr.io/unnamedlab/openfoundry/flink-cdc-iceberg:1.19.1-0.1.0
  flinkVersion: v1_19
  mode: native
  serviceAccount: flink

  flinkConfiguration:
    # --- Task slots / parallelism ------------------------------------------
    taskmanager.numberOfTaskSlots: "2"
    parallelism.default: "4"

    # --- High availability (required for jobManager.replicas > 1) ----------
    high-availability.type: kubernetes
    high-availability.storageDir: s3://openfoundry-iceberg/flink/ha/cdc-iceberg

    # --- Checkpoints & savepoints (Ceph RGW S3) ----------------------------
    state.backend.type: rocksdb
    state.backend.incremental: "true"
    state.checkpoints.dir: s3://openfoundry-iceberg/flink/checkpoints/cdc-iceberg
    state.savepoints.dir: s3://openfoundry-iceberg/flink/savepoints/cdc-iceberg
    execution.checkpointing.interval: "60000"        # 60 s
    execution.checkpointing.min-pause: "30000"
    execution.checkpointing.timeout: "600000"
    execution.checkpointing.max-concurrent-checkpoints: "1"
    execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION

    # --- S3 / Ceph RGW (path-style required for RGW) -----------------------
    s3.endpoint: http://rook-ceph-rgw-openfoundry.rook-ceph.svc:80
    s3.path.style.access: "true"
    # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY come from `flink-s3-credentials`
    # via envFrom on the pod template (see below).

    # --- Restart strategy ---------------------------------------------------
    restart-strategy: exponential-delay
    restart-strategy.exponential-delay.initial-backoff: 10 s
    restart-strategy.exponential-delay.max-backoff: 2 min
    restart-strategy.exponential-delay.backoff-multiplier: "2.0"
    restart-strategy.exponential-delay.reset-backoff-threshold: 10 min

    # --- Metrics ------------------------------------------------------------
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prom.port: "9249"

  serviceAccount: flink

  jobManager:
    replicas: 2
    resource:
      memory: 2048m
      cpu: 1
    podTemplate:
      spec:
        containers:
          - name: flink-main-container
            envFrom:
              - secretRef:
                  name: flink-s3-credentials
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                component: jobmanager
                app: cdc-iceberg

  taskManager:
    resource:
      memory: 4096m
      cpu: 2
    podTemplate:
      spec:
        containers:
          - name: flink-main-container
            envFrom:
              - secretRef:
                  name: flink-s3-credentials

  podTemplate:
    apiVersion: v1
    kind: Pod
    metadata:
      labels:
        app: cdc-iceberg
        app.kubernetes.io/part-of: openfoundry
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 9999
        fsGroup: 9999
      containers:
        - name: flink-main-container
          ports:
            - name: metrics
              containerPort: 9249

  job:
    # Built and published by the OpenFoundry release pipeline; the JAR is
    # baked into the operator image at /opt/flink/usrlib/cdc-iceberg.jar.
    jarURI: local:///opt/flink/usrlib/cdc-iceberg.jar
    entryClass: io.openfoundry.flink.cdc.iceberg.CdcIcebergJob
    args:
      - "--source.cdc.bootstrap-servers=redpanda.openfoundry.svc:9092"
      - "--source.cdc.topic-pattern=openfoundry\\..*"
      - "--sink.iceberg.catalog=rest"
      - "--sink.iceberg.uri=http://iceberg-rest.openfoundry.svc:8181"
      - "--sink.iceberg.warehouse=s3://openfoundry-iceberg/warehouse"
      - "--sink.iceberg.namespace=openfoundry_cdc"
    parallelism: 4
    upgradeMode: savepoint
    state: running
