[package]
name = "pipeline-authoring-service"
description = "Pipeline authoring and compilation control plane"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies]
cron = "0.12"
wasmtime = "24"

# JobSpec content-hash idempotency mirrors the dataset-versioning-service
# schema-content-hash convention (MD5 over JSON).
md-5 = "0.10"
prometheus = { workspace = true }
once_cell = "1"

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.axum-extra]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.bytes]
workspace = true

[dependencies.cassandra-kernel]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.pipeline-expression]
path = "../../libs/pipeline-expression"

[dependencies.datafusion]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.pyo3]
workspace = true
features = ["abi3-py311"]

[dependencies.query-engine]
workspace = true

[dependencies.reqwest]
workspace = true
features = ["multipart"]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.storage-abstraction]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tonic]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[[bin]]
path = "src/main.rs"
name = "pipeline-authoring-service"
required-features = []

[lib]
path = "src/lib.rs"
name = "pipeline_authoring_service"
required-features = []
crate-type = ["lib"]

[features]
default = ["pg"]
# `pg` toggles the SQLx-backed CRUD branches in `domain::parameterized`.
# Disabled in pure-logic test builds so the lib can compile without
# touching tokio / sqlx — the bin always enables it.
pg = []

[dev-dependencies.serde_json]
workspace = true

[dev-dependencies.uuid]
workspace = true

# P2 — JobSpec publish-idempotency integration test boots Postgres via
# `testing::containers::boot_postgres`. Gated behind `#[ignore]`.
[dev-dependencies.testing]
workspace = true

[dev-dependencies.testcontainers]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.sqlx]
workspace = true
features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"]
