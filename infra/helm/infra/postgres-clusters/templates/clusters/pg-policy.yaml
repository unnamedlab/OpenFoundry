{{- if .Values.pgPolicy.enabled }}
{{- with .Values.pgPolicy }}
---
# S6.1.b — `pg-policy` consolidated CNPG cluster.
#
# Hosts security/policy/audit/governance schemas. Production deployments
# enable Debezium CDC (`wal_level=logical` + extra slots/senders); dev
# deployments override `walLevel` to `replica` so Postgres skips logical
# decoding overhead until Debezium is wired.
#
# Schemas hosted (12): identity-federation, oauth-integration,
# network-boundary, cipher, security-governance, sds, audit-compliance,
# retention-policy, lineage-deletion, checkpoints-purpose,
# telemetry-governance, code-security-scanning.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-policy
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: pg-policy
    app.kubernetes.io/component: postgres
    openfoundry.io/managed-by: cnpg
    openfoundry.io/cluster-role: policy-audit
    openfoundry.io/cdc-source: {{ eq .walLevel "logical" | quote }}
spec:
  instances: {{ .instances }}
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: {{ .enableSuperuserAccess }}

  minSyncReplicas: {{ .syncReplicas }}
  maxSyncReplicas: {{ .syncReplicas }}

  postgresql:
    parameters:
      synchronous_commit: {{ if gt (int .syncReplicas) 0 }}"on"{{ else }}"local"{{ end }}
      wal_level: {{ .walLevel | quote }}
      max_replication_slots: {{ .postgresql.maxReplicationSlots | quote }}
      max_wal_senders: {{ .postgresql.maxWalSenders | quote }}
      max_wal_size: {{ .postgresql.maxWalSize | quote }}
      shared_buffers: {{ .postgresql.sharedBuffers | quote }}
      work_mem: {{ .postgresql.workMem | quote }}
      effective_cache_size: {{ .postgresql.effectiveCacheSize | quote }}
      max_connections: {{ .postgresql.maxConnections | quote }}

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: pg-policy-app
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: pg-policy-bootstrap-sql
            key: bootstrap.sql

  storage:
    size: {{ .storageSize }}
    storageClass: {{ .storageClass }}

  walStorage:
    size: {{ .walStorageSize }}
    storageClass: {{ .storageClass }}

  resources:
    {{- toYaml .resources | nindent 4 }}

  affinity:
    topologyKey: kubernetes.io/hostname
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred

  monitoring:
    enablePodMonitor: false

  {{- if .backupEnabled }}
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://openfoundry-pg-backups/pg-policy"
      endpointURL: "http://rook-ceph-rgw-openfoundry-store.rook-ceph.svc:80"
      s3Credentials:
        accessKeyId:
          name: pg-policy-backup
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-policy-backup
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 2
  {{- end }}
{{- end }}
{{- end }}
