---
# CloudNativePG `Cluster` for the dataset-versioning-service bounded context.
#
# Wave-N entry following the convention documented in
# `infra/k8s/cnpg/clusters/README.md` and the shape of the pilots
# `identity-federation-pg.yaml` / `data-asset-catalog-pg.yaml`.
# Defaults mirror `infra/k8s/cnpg/templates/cluster.yaml`.
#
# Wired into `infra/k8s/helm/open-foundry/values.yaml` by setting:
#   services.dataset-versioning-service.envSecrets.DATABASE_URL:
#     secretName: dataset-versioning-pg-app
#     key: uri
# CNPG auto-populates the `uri` key on the `<cluster>-app` Secret
# with a fully-formatted DSN, so no credential is committed here.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: dataset-versioning-pg
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: dataset-versioning-pg
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: openfoundry
    openfoundry.io/managed-by: cnpg
    openfoundry.io/bounded-context: dataset-versioning
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised

  # See identity-federation-pg.yaml for the durability rationale
  # (at least one synchronous standby acks every commit).
  minSyncReplicas: 1
  maxSyncReplicas: 1

  postgresql:
    parameters:
      synchronous_commit: "on"
      wal_level: "logical"
      max_wal_size: "2GB"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: dataset_versioning
      owner: dataset_versioning
      secret:
        name: dataset-versioning-pg-app

  storage:
    size: 50Gi
    storageClass: ceph-rbd

  resources:
    requests:
      cpu: 300m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 2Gi

  # Spread instances across zones so a zonal outage cannot take
  # down the quorum (matches the Kafka topologySpreadConstraints).
  affinity:
    topologyKey: topology.kubernetes.io/zone
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred

  monitoring:
    enablePodMonitor: true

  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://openfoundry-pg-backups/dataset-versioning-pg
      # Cluster-local Ceph RGW (rook-ceph). Same endpoint already
      # used by the Iceberg/Lakekeeper stack — see
      # `infra/k8s/rook/objectstore.yaml`.
      endpointURL: http://rook-ceph-rgw-openfoundry.rook-ceph.svc:80
      s3Credentials:
        accessKeyId:
          name: dataset-versioning-pg-backup
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: dataset-versioning-pg-backup
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
