global:
  deploymentFabric:
    environment: prod
  kafka:
    bootstrap: openfoundry-kafka-bootstrap.kafka.svc:9092

temporal:
  address: temporal-frontend.temporal.svc.cluster.local:7233
  namespace: openfoundry-prod

services:
  sql-bi-gateway-service:
    replicas: 4
    env:
      DISTRIBUTED_QUERY_WORKERS: "8"
      RUST_LOG: info
      TRINO_FLIGHT_SQL_URL: http://trino-flight-sql-proxy.trino.svc:50133
    autoscaling:
      enabled: true
      minReplicas: 4
      maxReplicas: 20
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      keda:
        enabled: true
        pollingInterval: 15
        cooldownPeriod: 90
        triggers:
          - type: prometheus
            metadata:
              serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
              metricName: query_inflight_requests
              query: sum(openfoundry_query_inflight_requests)
              threshold: "40"
