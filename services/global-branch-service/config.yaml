# Defaults shipped inside the container image.
# Override per-environment via CONFIG_FILE or OF_* env vars.

service:
  name: global-branch-service
  version: 0.1.0

server:
  # 8080 in cluster, 50110 in local dev (matches edge-gateway
  # DefaultUpstreams.GlobalBranch).
  addr: ":8080"
  shutdown_timeout: 15s

jwt:
  # In production the secret comes from a Kubernetes Secret mounted
  # as OF_JWT__SECRET, never from this file.
  secret: ""
  issuer: "https://auth.openfoundry.local"
  audience: "openfoundry"

telemetry:
  otlp_endpoint: "localhost:4317"
  log_format: "plain"

# Set OF_ENVIRONMENT=production in production deployments.
# Product routes require a real DB unless explicit non-production
# smoke mode is enabled with OF_ALLOW_UNWIRED_PRODUCT_ROUTES=true.
environment: "development"
allow_unwired_product_routes: false
