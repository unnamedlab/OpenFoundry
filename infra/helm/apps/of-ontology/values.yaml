release: of-ontology

serviceAccount:
  create: true
  name: ""
  annotations: {}

image:
  registry: ghcr.io/openfoundry
  tag: "0.1.0"

global:
  imagePullPolicy: IfNotPresent
  imageRegistry: ""
  imagePullSecrets: []
  existingSecret: open-foundry-env
  publicWebOrigin: https://openfoundry.example.com
  labels:
    app.kubernetes.io/part-of: openfoundry
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    readOnlyRootFilesystem: false
  terminationGracePeriodSeconds: 30
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  networkPolicy:
    enabled: true
    allowSameNamespaceTraffic: true
    additionalEgressCidrs: []
  platformProfile:
    enabled: true
    configMapName: openfoundry-platform-profile
  probes:
    readiness:
      enabled: true
      path: /health
      initialDelaySeconds: 8
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    liveness:
      enabled: true
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
  deploymentFabric:
    cloud: kubernetes
    environment: shared
    cell: core
    region: global
    multiCloud:
      enabled: false
      activeProvider: ""
      workloadIdentity:
        awsRoleArn: ""
        gcpServiceAccount: ""
        azureClientId: ""
      providers: []
    airGap:
      enabled: false
      privateRegistry: ""
      releaseBundle: ""
      disablePublicEgress: false
      mirrorRegistries: []
      allowedEgressCidrs: []
    geoRestrictions:
      enabled: false
      allowedCountries: []
      allowedIngressCidrs: []
      allowedEgressCidrs: []
      ingressAnnotations: {}
      requiredNodeLabels: {}
      residencyLabel: ""
  cassandra:
    localDc: dc1
  kafka:
    bootstrap: ""
    topicPrefix: ""

migrations:
  pg-schemas:
    enabled: true
    dsnSecret:
      name: pg-schemas-app
      key: dsn

# FASE 4 / Tarea 4.2 — `reindex_coordinator` schema migration.
# See `templates/reindex-coordinator-migrations.yaml` for the Job
# definition. This is a chart-local migration (not part of the
# `of-migrator` image pipeline) because the schema lives inside
# the existing `pg-runtime-config` cluster and only needs two
# `CREATE TABLE IF NOT EXISTS` statements.
reindexCoordinator:
  migrations:
    enabled: true
    # Secret key holding the DSN for `pg-runtime-config` with at
    # least owner privileges on the `reindex_coordinator` schema
    # (created by `pg-runtime-config-bootstrap-sql.yaml`).
    dsnSecret:
      name: pg-runtime-config-app
      key: DATABASE_URL
    # Lightweight psql image used to apply the migration.
    image: docker.io/bitnami/postgresql:16

search:
  backend: opensearch

vespa:
  enabled: false

services:
  ontology-definition-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  ontology-actions-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  ontology-query-service:
    replicas: 3
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  object-database-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  ontology-indexer:
    replicas: 2
    ports:
      - name: metrics
        containerPort: 9090
        servicePort: 9090
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
      prometheus.io/path: /metrics
    serviceAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
      prometheus.io/path: /metrics
    probes:
      readiness:
        path: /health
        port: metrics
      liveness:
        path: /health
        port: metrics
    env:
      METRICS_ADDR: 0.0.0.0:9090
      SEARCH_BACKEND: opensearch
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  # FASE 4 / Tarea 4.2 — Rust replacement for the legacy Go
  # `workers-go/reindex` Temporal worker (ADR-0021). Owns the
  # operator-driven reindex pipeline:
  #   ontology.reindex.requested.v1
  #     → reindex-coordinator-service (this pod)
  #     → ontology.reindex.v1 (consumed by ontology-indexer)
  #     → ontology.reindex.completed.v1
  # See `services/reindex-coordinator-service/README.md` for the
  # runbook (how to dispatch a reindex, alert routing, restart
  # safety guarantees).
  #
  # Environment contract (supplied by `global.existingSecret`,
  # see `services/reindex-coordinator-service/README.md#configuration`):
  #   DATABASE_URL                — pg-runtime-config DSN with the
  #                                 `reindex_coordinator` schema role.
  #   KAFKA_BOOTSTRAP_SERVERS     — same shape as ontology-indexer.
  #   KAFKA_SASL_USERNAME / _PASSWORD / _MECHANISM /
  #     KAFKA_SECURITY_PROTOCOL   — optional SASL/SCRAM.
  #   CASSANDRA_CONTACT_POINTS    — comma-separated host:port list
  #                                 (CASSANDRA_LOCAL_DC is injected
  #                                 from `global.cassandra.localDc`).
  reindex-coordinator-service:
    replicas: 2
    ports:
      - name: metrics
        containerPort: 9090
        servicePort: 9090
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
      prometheus.io/path: /metrics
    serviceAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
      prometheus.io/path: /metrics
    probes:
      readiness:
        path: /health
        port: metrics
      liveness:
        path: /health
        port: metrics
    env:
      METRICS_ADDR: 0.0.0.0:9090
      CASSANDRA_KEYSPACE: ontology_objects
      OF_OPENLINEAGE_NAMESPACE: openfoundry
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  # ── Ontology services completed (S8.6 — full coverage) ─────────────
  ontology-functions-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  ontology-funnel-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  ontology-security-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  ontology-timeseries-analytics-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  knowledge-index-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
