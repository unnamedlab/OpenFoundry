---
# PodDisruptionBudget for the Trino coordinator.
#
# With `coordinator.replicas: 2` (active + standby via experimental
# coordinator HA), keeping at least 1 coordinator scheduled guarantees the
# cluster can still accept and route queries during voluntary disruptions
# such as node drains, kernel patching, or rolling upgrades of Trino itself.
#
# Workers are intentionally NOT covered by a PDB: they are stateless and
# fungible, and Trino reschedules splits across surviving workers without
# query failure.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: trino-coordinator
  namespace: trino
  labels:
    app.kubernetes.io/name: trino
    app.kubernetes.io/component: coordinator
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trino
      app.kubernetes.io/component: coordinator
