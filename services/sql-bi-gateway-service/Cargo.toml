[package]
name = "sql-bi-gateway-service"
description = "Edge SQL gateway: Apache Arrow Flight SQL server for external BI clients (Tableau, Superset) backed by DataFusion with multi-backend routing (ADR-0014)"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.arrow]
version = "53"

[dependencies.analytical-logic]
workspace = true

[dependencies.arrow-flight]
version = "53"
features = ["flight-sql-experimental"]

[dependencies.async-trait]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.bytes]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.datafusion]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.prost]
workspace = true

[dependencies.query-engine]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tonic]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[dev-dependencies.tokio-stream]
version = "0.1"
features = ["net"]

[lib]
path = "src/lib.rs"
name = "sql_bi_gateway_service"

[[bin]]
path = "src/main.rs"
name = "sql-bi-gateway-service"
required-features = []
