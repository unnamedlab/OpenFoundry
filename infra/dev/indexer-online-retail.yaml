# Phase A of ADR-0045: replaces the previous SparkApplication CR
# (sparkoperator.k8s.io/v1beta2 + Scala IcebergToObjectStoreIndexer)
# with a plain Kubernetes Job running services/iceberg-object-indexer
# (Go, apache/iceberg-go). No Spark Operator dependency.
#
# Same data destination, same row contract, same CLI flags as the Scala
# version — verified against tools/online-retail/seed_object_database.py
# baseline.
#
# Usage:
#   # 1. Make sure object-database-service is running (stub mode or Cassandra):
#   kubectl -n openfoundry get deploy object-database-service
#   # 2. Apply the Job:
#   kubectl apply -f infra/dev/indexer-online-retail.yaml
#   # 3. Watch:
#   kubectl logs -n openfoundry -l job-name=indexer-online-retail-clean -f
#   # 4. Verify object-database got the rows:
#   curl -s "http://localhost:18081/api/v1/ontology/types/678b55fe-db5f-4d3a-bbf2-8cb643af8d32/objects?per_page=5" \
#     | python3 -m json.tool
---
apiVersion: batch/v1
kind: Job
metadata:
  name: indexer-online-retail-clean
  namespace: openfoundry
  labels:
    openfoundry.io/component: iceberg-indexer
    openfoundry.io/source-table: "transactions_clean"
    openfoundry.io/target-type-id: "678b55fe-db5f-4d3a-bbf2-8cb643af8d32"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        openfoundry.io/component: iceberg-indexer
    spec:
      restartPolicy: Never
      containers:
        - name: indexer
          image: registry.registry.svc.cluster.local:5000/openfoundry/iceberg-object-indexer:0.1.0
          imagePullPolicy: Always
          args:
            - "--source-table"
            - "lakekeeper.default.transactions_clean"
            - "--target-tenant"
            - "default"
            - "--target-type-id"
            - "678b55fe-db5f-4d3a-bbf2-8cb643af8d32"
            - "--id-column"
            - "transaction_id"
            - "--object-database-url"
            - "http://object-database-service.openfoundry.svc:8080"
            - "--catalog"
            - "lakekeeper"
            - "--catalog-uri"
            - "http://lakekeeper.lakekeeper.svc:8181/catalog"
            - "--catalog-warehouse"
            - "openfoundry"
            - "--catalog-credential"
            - "lakekeeper:s"
            - "--oauth-token-uri"
            - "http://oidc-stub.lakekeeper.svc.cluster.local:8080/lakekeeper/token"
            - "--oauth-scope"
            - "openid"
            - "--limit"
            - "500"
            - "--log-format"
            - "json"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          # AWS_* env vars are kept for the Iceberg S3 backend: iceberg-go
          # uses the standard aws-sdk-go-v2 chain to resolve credentials and
          # endpoint when the catalog returns S3 file locations.
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: openfoundry-iceberg
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: openfoundry-iceberg
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_S3_FORCE_PATH_STYLE
              value: "true"
            - name: AWS_ENDPOINT_URL_S3
              value: "http://rook-ceph-rgw-openfoundry-store.rook-ceph.svc:80"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
