{{- if .Values.regionB.enabled }}
---
# S7.3 — Kafka cluster in region B (DR target).
#
# Mirrors the topology of the region-A cluster (`../kafka-cluster.yaml`)
# but lives in a separate Kubernetes cluster (`region-b` context). It
# starts empty and is populated by `KafkaMirrorMaker2` (see
# `kafka-mirrormaker2.yaml`) replicating from region A.
#
# Sizing rationale:
#   * Same broker count (3) and JBOD layout — keeps `min.insync.replicas=2`
#     valid on the destination side.
#   * Disk halved (100Gi per volume vs 200Gi in A) because region B holds
#     replicated topics only (no client-driven retention spikes during
#     normal operation). Re-evaluate after the first DR drill (S7.5.b).
#   * Same KRaft annotation, same `unclean.leader.election.enable=false`,
#     same rack awareness on `topology.kubernetes.io/zone` — the cluster
#     is structurally identical so an application failover does not need
#     to learn a new contract.
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka
  namespace: kafka
  labels:
    strimzi.io/cluster: openfoundry-b
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 100Gi
        kraftMetadata: shared
        deleteClaim: false
        class: ceph-rbd
      - id: 1
        type: persistent-claim
        size: 100Gi
        deleteClaim: false
        class: ceph-rbd
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 6Gi
  jvmOptions:
    -Xms: 3072m
    -Xmx: 3072m
  template:
    pod:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              strimzi.io/cluster: openfoundry-b
              strimzi.io/pool-name: kafka
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: openfoundry-b
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.8.0
    metadataVersion: 3.8-IV0
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
      # External listener so MM2 in region A can reach this cluster over
      # the WAN. Use a route/loadbalancer terminated by your edge proxy
      # with mTLS — managed by the platform team, not this manifest.
      - name: external
        port: 9094
        type: loadbalancer
        tls: true
        authentication:
          type: tls
    config:
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      unclean.leader.election.enable: false
      auto.create.topics.enable: false
      log.retention.hours: 168
      num.partitions: 12
      compression.type: producer
      replica.selector.class: >-
        org.apache.kafka.common.replica.RackAwareReplicaSelector
    rack:
      topologyKey: topology.kubernetes.io/zone
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: 100Gi
          kraftMetadata: shared
          deleteClaim: false
          class: ceph-rbd
        - id: 1
          type: persistent-claim
          size: 100Gi
          deleteClaim: false
          class: ceph-rbd
  entityOperator:
    topicOperator: {}
    userOperator: {}
{{- end }}
