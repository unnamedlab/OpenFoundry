nameOverride: ""
namespaceOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

global:
  imagePullPolicy: IfNotPresent
  imageRegistry: ""
  imagePullSecrets: []
  existingSecret: open-foundry-env
  publicWebOrigin: https://openfoundry.example.com
  labels:
    app.kubernetes.io/part-of: openfoundry
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    readOnlyRootFilesystem: false
  terminationGracePeriodSeconds: 30
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
  probes:
    readiness:
      enabled: true
      path: /health
      initialDelaySeconds: 8
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    liveness:
      enabled: true
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  networkPolicy:
    enabled: true
    allowSameNamespaceTraffic: true
    additionalEgressCidrs: []
  deploymentFabric:
    cloud: kubernetes
    environment: shared
    cell: core
    region: global
    multiCloud:
      enabled: false
      activeProvider: ""
      workloadIdentity:
        awsRoleArn: ""
        gcpServiceAccount: ""
        azureClientId: ""
      providers: []
    airGap:
      enabled: false
      privateRegistry: ""
      releaseBundle: ""
      disablePublicEgress: false
      mirrorRegistries: []
      allowedEgressCidrs: []
    geoRestrictions:
      enabled: false
      allowedCountries: []
      allowedIngressCidrs: []
      allowedEgressCidrs: []
      ingressAnnotations: {}
      requiredNodeLabels: {}
      residencyLabel: ""

apollo:
  enabled: false
  schedule: "*/15 * * * *"
  actionMode: observe
  image:
    repository: curlimages/curl
    tag: "8.8.0"
  gatewayUrl: ""
  readinessPath: /api/v1/control-panel/upgrade-readiness
  fleetsPath: /api/v1/marketplace/devops/fleets
  reconcileFleetIds: []
  promoteWebhookPath: ""
  tokenSecretName: open-foundry-apollo
  tokenSecretKey: token
  env: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

services:
  gateway:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/gateway
      tag: latest
    port: 8080
    replicas: 2
    env:
      RUST_LOG: info
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 75
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []

  auth-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/auth-service
      tag: latest
    port: 50051
    replicas: 2
    env:
      RUST_LOG: info
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 75
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []

  dataset-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/dataset-service
      tag: latest
    port: 50053
    replicas: 2
    env:
      RUST_LOG: info
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 3Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []

  query-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/query-service
      tag: latest
    port: 50055
    replicas: 2
    env:
      RUST_LOG: info
      DISTRIBUTED_QUERY_WORKERS: "4"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "4"
        memory: 8Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 12
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      keda:
        enabled: true
        pollingInterval: 15
        cooldownPeriod: 90
        triggers:
          - type: prometheus
            metadata:
              serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
              metricName: query_inflight_requests
              query: sum(openfoundry_query_inflight_requests)
              threshold: "40"

  pipeline-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/pipeline-service
      tag: latest
    port: 50056
    replicas: 2
    env:
      RUST_LOG: info
      DISTRIBUTED_PIPELINE_WORKERS: "4"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "4"
        memory: 6Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 75
      targetMemoryUtilizationPercentage: 80
      keda:
        enabled: true
        pollingInterval: 20
        cooldownPeriod: 120
        triggers:
          - type: prometheus
            metadata:
              serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
              metricName: pipeline_pending_runs
              query: sum(openfoundry_pipeline_pending_runs)
              threshold: "20"

  report-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/report-service
      tag: latest
    port: 50064
    replicas: 2
    env:
      RUST_LOG: info
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 75
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []

  nexus-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/nexus-service
      tag: latest
    port: 50067
    replicas: 2
    env:
      RUST_LOG: info
    resources:
      requests:
        cpu: 250m
        memory: 384Mi
      limits:
        cpu: "2"
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 75
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []

  geospatial-intelligence-service:
    enabled: true
    image:
      repository: ghcr.io/open-foundry/geospatial-intelligence-service
      tag: latest
    port: 50068
    replicas: 2
    env:
      RUST_LOG: info
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 65
      targetMemoryUtilizationPercentage: 75
      keda:
        enabled: false
        pollingInterval: 15
        cooldownPeriod: 120
        triggers: []
