---
# S5.4.a — alerts for the Mimir → S3 → nightly Spark aggregation
# pipeline. Three things must not break silently:
#  1. Mimir ingest (remote-write must drain).
#  2. The nightly Spark job that builds `service_metrics_daily`.
#  3. The Iceberg target table receiving the day's row.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: metrics-long
  namespace: openfoundry
  labels:
    openfoundry.io/component: metrics-long
    role: alert-rules
spec:
  groups:
    - name: metrics-long.rules
      interval: 30s
      rules:
        - alert: MimirRemoteWriteLag
          expr: |
            max by (instance) (
              prometheus_remote_storage_highest_timestamp_in_seconds
              - ignoring(remote_name, url) group_right
                prometheus_remote_storage_queue_highest_sent_timestamp_seconds
            ) > 60
          for: 10m
          labels:
            severity: warning
            component: metrics-long
          annotations:
            summary: "Prometheus remote-write to Mimir is lagging > 60s"
            runbook: "infra/k8s/platform/manifests/observability/mimir/README.md#wiring-with-prometheus"
        - alert: MimirIngesterUnhealthy
          expr: |
            sum(up{job="mimir-monolithic"}) < 2
          for: 5m
          labels:
            severity: critical
            component: metrics-long
          annotations:
            summary: "Less than 2 Mimir ingesters healthy"
            runbook: "infra/k8s/platform/manifests/observability/mimir/README.md"
        - alert: MetricsAggregationJobMissed
          expr: |
            time() - max(spark_application_completion_time_seconds{
              application_name="metrics-aggregation-service-daily",
              status="completed"
            }) > 90000  # 25h — daily job must run at least every 24h
          for: 30m
          labels:
            severity: warning
            component: metrics-long
          annotations:
            summary: "Nightly metrics-long aggregation job has not completed in > 25h"
            runbook: "infra/k8s/platform/manifests/spark-jobs/README.md#metrics-aggregation-service-daily"
