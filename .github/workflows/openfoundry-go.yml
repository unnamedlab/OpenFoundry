name: openfoundry-go CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "services/**"
      - "libs/**"
      - "proto/**"
      - "tools/**"
      - "Makefile"
      - ".golangci.yml"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "sqlc.yaml"
      - ".github/workflows/openfoundry-go.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "services/**"
      - "libs/**"
      - "proto/**"
      - "tools/**"
      - "Makefile"
      - ".golangci.yml"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "sqlc.yaml"
      - ".github/workflows/openfoundry-go.yml"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          args: --timeout 5m

  vet:
    name: vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go vet ./...

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: cache GOMODCACHE and GOCACHE
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-go-build-
      - name: go build (default tags)
        run: go build ./...
      - name: go build (integration tag)
        run: go build -tags=integration ./...

  tidy:
    name: tidy (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: ensure go.mod / go.sum are tidy
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "::error::go.mod / go.sum drift — run 'make tidy' and commit"
            git --no-pager diff -- go.mod go.sum
            exit 1
          fi

  proto:
    name: proto / buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.47.2
      - run: buf lint
      - run: buf generate
      - name: ensure no drift between checked-in & generated proto
        run: |
          status="$(git status --porcelain=v1 --untracked-files=all -- libs/proto-gen)"
          if [ -n "$status" ]; then
            echo "::error::buf generate produced drift — run 'make gen' and commit libs/proto-gen"
            printf '%s\n' "$status"
            git --no-pager diff -- libs/proto-gen
            exit 1
          fi

  sqlc:
    name: sqlc (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.27.0
      - name: sqlc generate
        run: sqlc generate
      - name: ensure no drift between checked-in & generated sqlc code
        run: |
          status="$(git status --porcelain=v1 --untracked-files=all)"
          if [ -n "$status" ]; then
            echo "::error::sqlc generate produced drift — run 'make gen-sqlc' and commit"
            printf '%s\n' "$status"
            git --no-pager diff
            exit 1
          fi

  capabilities:
    name: capabilities (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: ensure stable-capabilities snapshot is up to date
        run: go run ./tools/capabilities-snapshot -check

  test:
    name: test (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  integration:
    name: test (integration)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: run integration suite
        run: go test -race -count=1 -tags=integration ./...
        env:
          # testcontainers-go uses the docker daemon already available
          # on the GitHub-hosted runner.
          TESTCONTAINERS_RYUK_DISABLED: "true"
