[package]
name = "ontology-definition-service"
description = "Ontology schema-of-types service (object/link/action types) — declarative schema persisted in pg-schemas.ontology_schema"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
path = "src/main.rs"
name = "ontology-definition-service"
required-features = []

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.config]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.tower-http]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.chrono]
workspace = true

# S1.6 — declarative schema lives in `pg-schemas.ontology_schema`.
# We keep `sqlx` because the bounded context here is a schema
# registry: object_types, properties, link_types, action_types,
# interfaces, shared_property_types, projects, etc. (handlers in
# `libs/ontology-kernel`). Cassandra is NOT used by this service.
[dependencies.sqlx]
workspace = true

# S1.6.e — emit `ontology.schema.v1` events on definition change.
# The platform bus is NATS JetStream; Debezium bridges to Kafka
# downstream for catalog/indexing/SDK-gen consumers.
[dependencies.event-bus-control]
workspace = true

# Domain models (object_types, link_types, action_types, …) live
# in `libs/ontology-kernel/src/models`. We re-export them through
# the shell's API surface as the kernel handlers migrate.
[dependencies.ontology-kernel]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.serde_json]
workspace = true
