[package]
name = "code-repository-review-service"
description = "Code repository hosting and review: repos, commits, files, diff, search, CI, MRs, comments, Git integrations, plus cross-plane global branching and code-security scan/finding stores"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.event-bus-data]
workspace = true

[dependencies.outbox]
workspace = true

[dependencies.reqwest]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tonic]
workspace = true

[dependencies.tower-http]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[[bin]]
path = "src/main.rs"
name = "code-repository-review-service"
required-features = []

[lib]
path = "src/lib.rs"
name = "code_repository_review_service"
required-features = []
crate-type = ["lib"]

[dev-dependencies]
testcontainers = { workspace = true }

[dev-dependencies.testing]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.sqlx]
workspace = true
features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"]

[dev-dependencies.serde_json]
workspace = true

[dev-dependencies.uuid]
workspace = true

[dev-dependencies.chrono]
workspace = true

[dev-dependencies.tower]
workspace = true

[dev-dependencies.http-body-util]
version = "0.1"

[dev-dependencies.auth-middleware]
workspace = true
