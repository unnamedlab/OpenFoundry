{{- if .Values.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "iceberg-catalog.fullname" . }}-bootstrap
  labels:
{{ include "iceberg-catalog.labels" . | indent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
{{ include "iceberg-catalog.selectorLabels" . | indent 8 }}
        app.kubernetes.io/component: iceberg-catalog-bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "iceberg-catalog.serviceAccountName" . }}
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: bootstrap
          image: "{{ .Values.adminTool.repository }}:{{ .Values.adminTool.tag }}"
          imagePullPolicy: {{ .Values.adminTool.pullPolicy }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | indent 12 }}
          args:
            - bootstrap
            - --realm=$(POLARIS_REALM)
            - --credential=$(POLARIS_REALM),$(POLARIS_ROOT_CLIENT_ID),$(POLARIS_ROOT_CLIENT_SECRET)
          env:
            - name: POLARIS_PERSISTENCE_TYPE
              value: {{ .Values.persistence.type | quote }}
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: postgresql
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: {{ include "iceberg-catalog.jdbcUrl" . | quote }}
            - name: QUARKUS_DATASOURCE_USERNAME
              value: {{ .Values.postgres.username | quote }}
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "iceberg-catalog.postgresSecretName" . }}
                  key: {{ .Values.postgres.passwordSecretKey }}
            - name: POLARIS_REALM
              value: {{ .Values.realm.name | quote }}
            - name: POLARIS_ROOT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "iceberg-catalog.realmSecretName" . }}
                  key: client-id
            - name: POLARIS_ROOT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "iceberg-catalog.realmSecretName" . }}
                  key: client-secret
{{- end }}
