name: CI — Go workers

on:
  push:
    branches: [main]
    paths:
      - "workers-go/**"
      - "proto/**"
      - ".github/workflows/go-workers.yml"
  pull_request:
    branches: [main]
    paths:
      - "workers-go/**"
      - "proto/**"
      - ".github/workflows/go-workers.yml"

jobs:
  go-workers-build:
    name: Build & test Temporal workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          # Cache key keyed off every module's go.sum so a tidy in
          # one worker doesn't bust the cache for the others.
          cache-dependency-path: |
            workers-go/approvals/go.sum
            workers-go/automation-ops/go.sum

      - name: Verify go.work is in sync
        working-directory: workers-go
        run: |
          go env GOTOOLCHAIN
          # `go work sync` must be a no-op in CI; if it changes
          # anything the contributor forgot to commit the result.
          go work sync
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::go work sync produced changes; commit them locally."
            git diff
            exit 1
          fi

      - name: go vet
        working-directory: workers-go
        run: go vet ./...

      - name: Build all workers
        working-directory: workers-go
        run: go build ./...

      - name: Run unit tests
        working-directory: workers-go
        run: go test -race -count=1 ./...

  go-workers-docker:
    name: Build worker Docker images
    runs-on: ubuntu-latest
    needs: go-workers-build
    strategy:
      fail-fast: false
      matrix:
        worker:
          - approvals
          - automation-ops
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: workers-go/${{ matrix.worker }}/Dockerfile
          push: false
          tags: openfoundry/${{ matrix.worker }}-worker:ci
          cache-from: type=gha,scope=${{ matrix.worker }}
          cache-to: type=gha,scope=${{ matrix.worker }},mode=max
