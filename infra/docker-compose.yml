x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    <<: *common
    image: ${OPENFOUNDRY_POSTGRES_IMAGE:-postgres:16-alpine}
    ports:
      - "${OPENFOUNDRY_POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: openfoundry
      POSTGRES_PASSWORD: openfoundry
      POSTGRES_DB: openfoundry
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfoundry"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    <<: *common
    image: ${OPENFOUNDRY_REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "${OPENFOUNDRY_REDIS_HOST_PORT:-6379}:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NATS (JetStream) ───────────────────────────────────────
  nats:
    <<: *common
    image: ${OPENFOUNDRY_NATS_IMAGE:-nats:2-alpine}
    ports:
      - "${OPENFOUNDRY_NATS_HOST_PORT:-4222}:4222"
      - "${OPENFOUNDRY_NATS_MONITOR_HOST_PORT:-8222}:8222"
    command: --jetstream --store_dir /data --http_port 8222
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible) ──────────────────────────────────
  minio:
    <<: *common
    image: ${OPENFOUNDRY_MINIO_IMAGE:-minio/minio:latest}
    ports:
      - "${OPENFOUNDRY_MINIO_API_HOST_PORT:-9000}:9000"
      - "${OPENFOUNDRY_MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: ${OPENFOUNDRY_MINIO_MC_IMAGE:-minio/mc:latest}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/openfoundry &&
      mc mb --ignore-existing local/openfoundry-datasets &&
      mc mb --ignore-existing local/openfoundry-notebooks &&
      mc mb --ignore-existing local/openfoundry-artifacts
      "

  # ── Meilisearch ────────────────────────────────────────────
  meilisearch:
    <<: *common
    image: ${OPENFOUNDRY_MEILISEARCH_IMAGE:-getmeili/meilisearch:v1.11}
    ports:
      - "${OPENFOUNDRY_MEILISEARCH_HOST_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Qdrant (Vector DB) ────────────────────────────────────
  qdrant:
    <<: *common
    image: ${OPENFOUNDRY_QDRANT_IMAGE:-qdrant/qdrant:v1.12.5}
    ports:
      - "${OPENFOUNDRY_QDRANT_HTTP_HOST_PORT:-6333}:6333"
      - "${OPENFOUNDRY_QDRANT_GRPC_HOST_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
  meilisearch_data:
  qdrant_data:
