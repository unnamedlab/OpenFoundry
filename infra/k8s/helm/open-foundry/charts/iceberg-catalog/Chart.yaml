apiVersion: v2
name: iceberg-catalog
description: |
  Apache Polaris Iceberg REST Catalog (Apache-2.0) for OpenFoundry.

  Deploys Polaris with HA defaults (3 replicas, PodDisruptionBudget
  minAvailable=2) and a relational-jdbc backend pointing at either an
  external PostgreSQL or a CloudNativePG `Cluster` provisioned by an
  operator running in the cluster.
type: application
version: 0.1.0
appVersion: "1.4.0"
keywords:
  - iceberg
  - catalog
  - polaris
  - openfoundry
sources:
  - https://github.com/apache/polaris
