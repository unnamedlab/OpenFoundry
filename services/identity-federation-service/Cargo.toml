[package]
name = "identity-federation-service"
description = "Identity Federation Service — login, refresh, MFA, SAML/OIDC/OAuth flows, service accounts, and session authentication"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies]
base32 = "0.4"
bergshamra = "0.4.0"
hmac = "0.12"
roxmltree = "0.20"
sha1 = "0.10"
sha2 = "0.10"

[dependencies.anyhow]
workspace = true

[dependencies.argon2]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.authz-cedar]
workspace = true
features = ["axum", "nats"]

[dependencies.async-nats]
workspace = true

[dependencies.cedar-policy]
version = "4"

[dependencies.futures]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.cassandra-kernel]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.event-bus-data]
workspace = true

[dependencies.jsonwebtoken]
workspace = true

[dependencies.p256]
version = "0.13"
features = ["ecdsa"]

[dependencies.prometheus]
workspace = true

[dependencies.rand]
workspace = true

[dependencies.regex]
workspace = true

[dependencies.reqwest]
workspace = true

[dependencies.redis]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tonic]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.url]
workspace = true

[dependencies.uuid]
workspace = true

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.wiremock]
workspace = true

[lib]
path = "src/lib.rs"
name = "identity_federation_service"

[[bin]]
path = "src/main.rs"
name = "identity-federation-service"
required-features = []
