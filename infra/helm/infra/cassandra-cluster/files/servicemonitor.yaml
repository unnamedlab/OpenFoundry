---
# Prometheus scrape configuration for Cassandra.
#
# k8ssandra-operator runs the Metric Collector for Apache Cassandra
# (MCAC) sidecar on every Cassandra pod. MCAC exposes the JMX metric
# universe as Prometheus exposition on port 9103 of the pod itself
# (NOT a Service). A PodMonitor is therefore the right fit: it
# discovers each Cassandra pod individually and preserves
# `pod`, `dc`, `rack`, `cluster` labels.
#
# Reaper exposes its own `/metrics` endpoint via Dropwizard on port
# 8080 path `/healthcheck/metrics`. We add a separate PodMonitor for
# it so dashboards can show repair backlog and segment stats.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cassandra-mcac
  namespace: cassandra
  labels:
    # Picked up by the platform Prometheus instance, which selects
    # PodMonitors with this release label.
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - cassandra
  selector:
    matchLabels:
      cassandra.datastax.com/cluster: of-cass-prod
  podMetricsEndpoints:
    - port: prometheus            # MCAC sidecar port name
      path: /metrics
      interval: 30s
      scrapeTimeout: 25s
      honorLabels: true
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_cassandra_datastax_com_datacenter]
          targetLabel: dc
        - sourceLabels: [__meta_kubernetes_pod_label_cassandra_datastax_com_rack]
          targetLabel: rack
        - sourceLabels: [__meta_kubernetes_pod_label_cassandra_datastax_com_cluster]
          targetLabel: cluster
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cassandra-reaper
  namespace: cassandra
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - cassandra
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: reaper-operator
  podMetricsEndpoints:
    - port: app                    # Reaper admin port
      path: /healthcheck/metrics
      interval: 60s
---
# PrometheusRule: SLO and modelling-rule alerts derived from
# ADR-0020. These watch for the conditions that turn a Cassandra
# cluster into a slow-motion outage: tombstone storms, partition
# bloat, repair lag, hint backlog.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cassandra-slo
  namespace: cassandra
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: cassandra.availability
      interval: 30s
      rules:
        - alert: CassandraNodeDown
          expr: |
            sum by (cluster, dc) (up{job="cassandra-mcac"} == 0) > 0
          for: 5m
          labels:
            severity: page
          annotations:
            summary: "Cassandra node down in {{ $labels.cluster }}/{{ $labels.dc }}"
            runbook_url: "https://github.com/OpenFoundry/openfoundry/blob/main/infra/runbooks/cassandra.md#node-down"
        - alert: CassandraQuorumAtRisk
          # Two nodes down in the same DC means LOCAL_QUORUM (RF=3,
          # CL=2) cannot be served from that DC.
          expr: |
            sum by (cluster, dc) (up{job="cassandra-mcac"} == 0) >= 2
          for: 1m
          labels:
            severity: page
          annotations:
            summary: "LOCAL_QUORUM at risk in {{ $labels.dc }}"

    - name: cassandra.modeling
      interval: 60s
      rules:
        - alert: CassandraLargePartition
          # Modelling rule: partitions > 100 MB are a bug, not a
          # capacity issue. Page early.
          expr: |
            max by (cluster, keyspace, table) (
              mcac_table_max_partition_size_bytes
            ) > 100 * 1024 * 1024
          for: 10m
          labels:
            severity: ticket
          annotations:
            summary: "Large partition in {{ $labels.keyspace }}.{{ $labels.table }}"
            description: "Partition exceeds 100 MB — review modelling per ADR-0020."

        - alert: CassandraTombstoneScans
          expr: |
            rate(mcac_table_tombstone_scanned_histogram_count[5m]) > 1000
          for: 15m
          labels:
            severity: ticket
          annotations:
            summary: "Tombstone-heavy reads in {{ $labels.keyspace }}.{{ $labels.table }}"

        - alert: CassandraReadLatencyP99High
          expr: |
            histogram_quantile(
              0.99,
              sum by (le, cluster, dc) (
                rate(mcac_table_read_latency_seconds_bucket[5m])
              )
            ) > 0.05
          for: 10m
          labels:
            severity: ticket
          annotations:
            summary: "Read p99 > 50 ms in {{ $labels.cluster }}/{{ $labels.dc }}"

        - alert: CassandraPendingCompactions
          expr: |
            max by (cluster, dc, instance) (
              mcac_compaction_pending_tasks
            ) > 100
          for: 30m
          labels:
            severity: ticket
          annotations:
            summary: "Compaction backlog on {{ $labels.instance }}"

        - alert: CassandraHintsBacklog
          expr: |
            max by (cluster, dc, instance) (
              mcac_storage_total_hints_in_progress
            ) > 10000
          for: 15m
          labels:
            severity: ticket
          annotations:
            summary: "Hints backlog on {{ $labels.instance }}"

    - name: cassandra.repair
      interval: 5m
      rules:
        - alert: CassandraRepairOverdue
          # Reaper schedules repairs every 7d. If a keyspace has not
          # been fully repaired in 10d, hints + read repair alone are
          # not enough; escalate.
          expr: |
            (time() - max by (cluster, keyspace) (
              reaper_last_successful_repair_timestamp_seconds
            )) > 10 * 86400
          for: 1h
          labels:
            severity: ticket
          annotations:
            summary: "Reaper repair overdue for {{ $labels.keyspace }}"
