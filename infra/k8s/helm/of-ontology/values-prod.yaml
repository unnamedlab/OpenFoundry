search:
  backend: vespa

vespa:
  enabled: false

services:
  ontology-indexer:
    replicas: 3
    env:
      SEARCH_BACKEND: vespa
      SEARCH_ENDPOINT: http://of-ontology-vespa:8080
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 9
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
