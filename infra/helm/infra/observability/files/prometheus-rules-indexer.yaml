---
# S4.3.e — `ontology-indexer` lag SLO + supporting alerts.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ontology-indexer
  namespace: openfoundry
  labels:
    openfoundry.io/component: ontology-indexer
    role: alert-rules
spec:
  groups:
    - name: ontology-indexer.rules
      rules:
        # SLO: P99 lag (event_created_at → index_applied_at) < 5s.
        - alert: OntologyIndexerLagSLOBurn
          expr: |
            histogram_quantile(
              0.99,
              sum by (le) (rate(ontology_indexer_lag_seconds_bucket[5m]))
            ) > 5
          for: 10m
          labels:
            severity: warning
            component: ontology-indexer
            stream: s4
            slo: indexer-lag-p99-5s
          annotations:
            summary: "ontology-indexer P99 lag > 5s"
            description: |
              The P99 of `ontology_indexer_lag_seconds` over the
              last 5 minutes exceeds the 5-second SLO. Either Kafka
              is backed up, the search backend is rejecting writes
              (Vespa 412 / OpenSearch 409 should be silent
              short-circuits, not errors), or the consumer is CPU
              starved.
            runbook_url: https://github.com/openfoundry/openfoundry/blob/main/services/ontology-indexer/README.md

        - alert: OntologyIndexerLagSLOPageRate
          expr: |
            histogram_quantile(
              0.99,
              sum by (le) (rate(ontology_indexer_lag_seconds_bucket[5m]))
            ) > 30
          for: 5m
          labels:
            severity: critical
            component: ontology-indexer
            stream: s4
          annotations:
            summary: "ontology-indexer P99 lag > 30s — paging"
            description: |
              Indexer is failing the lag SLO by 6×. Search results
              are visibly stale to users. Page on-call.
            runbook_url: https://github.com/openfoundry/openfoundry/blob/main/services/ontology-indexer/README.md

        - alert: OntologyIndexerDecodeErrors
          expr: |
            sum by (topic) (rate(ontology_indexer_records_total{outcome="decode_error"}[5m])) > 0
          for: 10m
          labels:
            severity: warning
            component: ontology-indexer
            stream: s4
          annotations:
            summary: "ontology-indexer decode errors on {{ $labels.topic }}"
            description: |
              Producer-side schema drift suspected. Records are
              malformed JSON or missing required fields. Cross-check
              the Apicurio registered schema against the producer's
              recent deploys.
            runbook_url: https://github.com/openfoundry/openfoundry/blob/main/services/ontology-indexer/README.md
