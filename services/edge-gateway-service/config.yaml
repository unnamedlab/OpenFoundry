# edge-gateway-service — defaults shipped inside the container image.
# Override per-environment via CONFIG_FILE or OF_* env vars.

service:
  name: edge-gateway-service
  version: 0.1.0

server:
  host: "0.0.0.0"
  port: 8080
  shutdown_timeout: 15s

jwt:
  # In production the secret comes from a Kubernetes Secret mounted
  # as OF_JWT__SECRET, never from this file.
  secret: ""
  issuer: ""
  audience: ""

telemetry:
  otlp_endpoint: "localhost:4317"
  log_format: "plain"

# Optional integrations — empty values disable each integration cleanly.
nats_url: ""
redis_url: ""

cors_origins: []

rate_limit:
  anonymous_requests_per_minute: 120
  burst_size: 30
  bucket_ttl_secs: 300
  redis_key_prefix: "openfoundry:ratelimit"

# Upstream URLs default to localhost ports for dev / docker-compose.
# Override per field in production via Helm values.
upstream:
  identity_federation_service_url: "http://identity-federation-service:50112"
  authorization_policy_service_url: "http://authorization-policy-service:50093"
  # ADR-0030 B14: security-governance-service was absorbed into
  # authorization-policy-service. Alias the upstream key so the gateway
  # keeps routing `/api/v1/security-governance` and audit-governance
  # paths to the same binary that hosts the policy engine.
  security_governance_service_url: "http://authorization-policy-service:50093"
  tenancy_organizations_service_url: "http://tenancy-organizations-service:50113"
  connector_management_service_url: "http://localhost:50088"
  ingestion_replication_service_url: "http://localhost:50090"
  dataset_versioning_service_url: "http://localhost:50078"
  iceberg_catalog_service_url: "http://localhost:8197"
  query_service_url: "http://localhost:50133"
  pipeline_build_service_url: "http://localhost:50081"
  lineage_service_url: "http://localhost:50083"
  ontology_definition_service_url: "http://localhost:50103"
  object_database_service_url: "http://localhost:50104"
  ontology_query_service_url: "http://localhost:50105"
  ontology_actions_service_url: "http://localhost:50106"
  workflow_service_url: "http://localhost:50137"
  notebook_service_url: "http://localhost:50134"
  notification_service_url: "http://notification-alerting-service:50114"
  app_builder_service_url: "http://localhost:50063"
  application_composition_service_url: "http://localhost:50140"
  ml_service_url: "http://localhost:50085"
  model_catalog_service_url: "http://localhost:50085"
  model_deployment_service_url: "http://localhost:50086"
  ai_service_url: "http://localhost:50127"
  llm_catalog_service_url: "http://localhost:50095"
  retrieval_context_service_url: "http://localhost:50098"
  ai_evaluation_service_url: "http://localhost:50075"
  geospatial_intelligence_service_url: "http://localhost:50131"
  audit_compliance_service_url: "http://localhost:50115"
  telemetry_governance_service_url: "http://localhost:50153"
  federation_product_exchange_service_url: "http://localhost:50120"
  network_boundary_service_url: "http://localhost:50119"
  # Other upstream URLs use code-side defaults from internal/config/config.go.
