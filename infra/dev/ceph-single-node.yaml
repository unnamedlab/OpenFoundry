# Multi-node CephCluster + CephObjectStore for Lima/k3s development.
# Same Rook-Ceph operator (v1.19.5) and Ceph image (v19.2.1) as production.
# Differences vs infra/helm/infra/ceph-cluster/:
#   * mon.count=1, mgr.count=1, dashboard SSL off, encryption off, monitoring off
#   * OSDs use a 25G loopback file (/dev/loop0) on every Lima node — pre-created
#     by `infra/dev/bootstrap-osd-loopback.sh` (see infra/dev/README.md).
#   * RGW instances=1
#   * dataPool: replicated×1 (production: erasure-coded 8+3)
#
# This file is `kubectl apply`-able (kustomize-style overlay), NOT a helm chart.
# Production deploys via `helm install` of infra/helm/infra/ceph-cluster/.
---
apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: openfoundry
  namespace: rook-ceph
spec:
  cephVersion:
    image: quay.io/ceph/ceph:v19.2.1
    allowUnsupported: true
  dataDirHostPath: /var/lib/rook
  skipUpgradeChecks: false
  continueUpgradeAfterChecksEvenIfNotHealthy: false
  waitTimeoutForHealthyOSDInMinutes: 5
  mon:
    count: 1
    allowMultiplePerNode: true
  mgr:
    count: 1
    allowMultiplePerNode: true
    modules:
      - name: pg_autoscaler
        enabled: true
      - name: rook
        enabled: true
  dashboard:
    enabled: true
    ssl: false
  monitoring:
    enabled: false
  network:
    connections:
      encryption:
        enabled: false
      compression:
        enabled: false
      requireMsgr2: false
  crashCollector:
    disable: true
  logCollector:
    enabled: false
  cleanupPolicy:
    confirmation: ""
    sanitizeDisks:
      method: quick
      dataSource: zero
      iteration: 1
    allowUninstallWithVolumes: false
  resources:
    mon:
      requests: { cpu: "100m", memory: "512Mi" }
      limits:   { cpu: "1",    memory: "2Gi"   }
    mgr:
      requests: { cpu: "100m", memory: "512Mi" }
      limits:   { cpu: "1",    memory: "1Gi"   }
    osd:
      requests: { cpu: "200m", memory: "1Gi"   }
      limits:   { cpu: "2",    memory: "4Gi"   }
  storage:
    useAllNodes: false
    useAllDevices: false
    nodes:
      - name: "lima-k3s-master"
        devices:
          - name: "/dev/loop0"
      - name: "lima-k3s-node1"
        devices:
          - name: "/dev/loop0"
      - name: "lima-k3s-node2"
        devices:
          - name: "/dev/loop0"
  healthCheck:
    daemonHealth:
      mon:
        interval: 45s
      osd:
        interval: 60s
      status:
        interval: 60s
---
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: builtin-mgr
  namespace: rook-ceph
spec:
  name: .mgr
  replicated:
    size: 1
    requireSafeReplicaSize: false
---
apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: openfoundry-store
  namespace: rook-ceph
spec:
  metadataPool:
    failureDomain: osd
    replicated:
      size: 1
      requireSafeReplicaSize: false
  dataPool:
    failureDomain: osd
    replicated:
      size: 1
      requireSafeReplicaSize: false
  preservePoolsOnDelete: false
  gateway:
    port: 80
    securePort: 0
    instances: 1
    resources:
      requests: { cpu: "200m", memory: "512Mi" }
      limits:   { cpu: "1",    memory: "2Gi"   }
  healthCheck:
    startupProbe:
      disabled: false
    readinessProbe:
      disabled: false
---
apiVersion: ceph.rook.io/v1
kind: CephObjectStoreUser
metadata:
  name: openfoundry-iceberg
  namespace: rook-ceph
spec:
  store: openfoundry-store
  displayName: openfoundry-iceberg
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: rook-ceph-bucket
provisioner: rook-ceph.ceph.rook.io/bucket
reclaimPolicy: Delete
parameters:
  objectStoreName: openfoundry-store
  objectStoreNamespace: rook-ceph
  region: us-east-1
---
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: openfoundry-iceberg
  namespace: rook-ceph
spec:
  bucketName: openfoundry-iceberg
  storageClassName: rook-ceph-bucket
