{{- if .Values.pgPolicy.enabled }}
---
# S6.1.c + S6.1.d — bootstrap SQL for `pg-policy`.
# See `pg-schemas-bootstrap-sql.yaml` for the design rationale shared
# by all four consolidated clusters.
#
# Additional concern for this cluster: `wal_level=logical` means rows
# stream out via Debezium. The default REPLICA IDENTITY of new tables
# created by the audit/policy services SHOULD be `FULL` for
# `audit_event` style tables (so updates carry the previous row image).
# Service migrations are responsible for `ALTER TABLE ... REPLICA
# IDENTITY FULL` where needed; this bootstrap only sets up the
# schemas/roles.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-policy-bootstrap-sql
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: pg-policy
    openfoundry.io/managed-by: cnpg
data:
  bootstrap.sql: |
    -- ============================================================
    -- pg-policy — security/policy/audit/governance bounded contexts
    -- (CDC source via Debezium — see cluster manifest comments)
    -- ============================================================
    DO $$
    DECLARE
      bc TEXT;
      bcs TEXT[] := ARRAY[
        'identity_federation',
        'oauth_integration',
        'network_boundary',
        'cipher',
        'security_governance',
        'sds',
        'audit_compliance',
        'retention_policy',
        'lineage_deletion',
        'checkpoints_purpose',
        'telemetry_governance',
        'code_security_scanning'
      ];
    BEGIN
      FOREACH bc IN ARRAY bcs LOOP
        EXECUTE format(
          'CREATE ROLE svc_%I LOGIN REPLICATION PASSWORD %L NOINHERIT',
          bc,
          'PLACEHOLDER_ROTATE_VIA_EXTERNAL_SECRETS'
        );
        EXECUTE format('CREATE SCHEMA IF NOT EXISTS %I AUTHORIZATION svc_%I', bc, bc);
        EXECUTE format('REVOKE ALL ON SCHEMA %I FROM PUBLIC', bc);
        EXECUTE format('GRANT USAGE ON SCHEMA %I TO svc_%I', bc, bc);
        EXECUTE format(
          'ALTER DEFAULT PRIVILEGES FOR ROLE svc_%I IN SCHEMA %I '
          'GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO svc_%I',
          bc, bc, bc
        );
        EXECUTE format(
          'ALTER DEFAULT PRIVILEGES FOR ROLE svc_%I IN SCHEMA %I '
          'GRANT USAGE, SELECT ON SEQUENCES TO svc_%I',
          bc, bc, bc
        );
      END LOOP;
    END$$;

    -- Shared transactional outbox for the policy cluster (ADR-0022).
    -- Every bounded context in pg-policy writes into the same
    -- `outbox.events` table so Debezium only needs one publication /
    -- connector scoped to `outbox.events`.
    CREATE SCHEMA IF NOT EXISTS outbox;
    REVOKE ALL ON SCHEMA outbox FROM PUBLIC;

    CREATE TABLE IF NOT EXISTS outbox.events (
      event_id     UUID PRIMARY KEY,
      aggregate    TEXT NOT NULL,
      aggregate_id TEXT NOT NULL,
      payload      JSONB NOT NULL,
      headers      JSONB NOT NULL DEFAULT '{}'::jsonb,
      topic        TEXT NOT NULL,
      created_at   TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE INDEX IF NOT EXISTS outbox_events_created_at_idx
      ON outbox.events (created_at);

    CREATE TABLE IF NOT EXISTS outbox.heartbeat (
      id           TEXT PRIMARY KEY,
      last_seen_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    -- Keep full row images in the WAL even though producers delete the
    -- outbox row in the same transaction (`libs/outbox::enqueue`).
    ALTER TABLE outbox.events REPLICA IDENTITY FULL;

    DO $$
    DECLARE bc TEXT;
    BEGIN
      FOR bc IN SELECT unnest(ARRAY[
        'identity_federation','oauth_integration','network_boundary','cipher',
        'security_governance','sds','audit_compliance','retention_policy',
        'lineage_deletion','checkpoints_purpose','telemetry_governance',
        'code_security_scanning'
      ]) LOOP
        EXECUTE format('GRANT USAGE ON SCHEMA outbox TO svc_%I', bc);
        EXECUTE format(
          'GRANT INSERT, DELETE ON outbox.events TO svc_%I',
          bc
        );
      END LOOP;
    END$$;

    -- Dedicated Debezium CDC role — read-only on every policy schema,
    -- plus REPLICATION attribute to consume logical slots. The slot
    -- itself is created by the Debezium connector configuration.
    CREATE ROLE debezium_cdc LOGIN REPLICATION PASSWORD 'PLACEHOLDER_ROTATE_VIA_EXTERNAL_SECRETS';
    DO $$
    DECLARE bc TEXT;
    BEGIN
      FOR bc IN SELECT unnest(ARRAY[
        'identity_federation','oauth_integration','network_boundary','cipher',
        'security_governance','sds','audit_compliance','retention_policy',
        'lineage_deletion','checkpoints_purpose','telemetry_governance',
        'code_security_scanning'
      ]) LOOP
        EXECUTE format('GRANT USAGE ON SCHEMA %I TO debezium_cdc', bc);
        EXECUTE format('GRANT SELECT ON ALL TABLES IN SCHEMA %I TO debezium_cdc', bc);
        EXECUTE format(
          'ALTER DEFAULT PRIVILEGES FOR ROLE svc_%I IN SCHEMA %I '
          'GRANT SELECT ON TABLES TO debezium_cdc',
          bc, bc
        );
      END LOOP;
    END$$;
    GRANT USAGE ON SCHEMA outbox TO debezium_cdc;
    GRANT SELECT ON outbox.events TO debezium_cdc;
    GRANT SELECT, INSERT, UPDATE ON outbox.heartbeat TO debezium_cdc;
{{- end }}
