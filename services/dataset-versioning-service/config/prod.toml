host = "0.0.0.0"
port = 50078

# P3 — production backing-fs example. Every key is overridden by the
# OF_BACKING_FS_* env vars at startup so the rendered config never
# carries secrets.
[backing_fs]
driver = "s3"
base_directory = "foundry/datasets"
bucket = "of-prod-data"
region = "eu-west-1"
presign_ttl_seconds = 300
