---
# ObjectBucketClaims for OpenFoundry production buckets.
#
# Each OBC asks the bucket provisioner to create a bucket in the
# `openfoundry` CephObjectStore (see objectstore.yaml). Once bound, the
# provisioner creates two resources in the same namespace:
#
#   * ConfigMap <bucketName>  → keys: BUCKET_HOST, BUCKET_PORT,
#                               BUCKET_NAME, BUCKET_REGION
#   * Secret    <bucketName>  → keys: AWS_ACCESS_KEY_ID,
#                               AWS_SECRET_ACCESS_KEY
#
# The runbook (infra/runbooks/ceph.md) explains how to project these into
# `open-foundry-prod-env` so that all services pick up the credentials via
# OBJECT_STORE_ACCESS_KEY / OBJECT_STORE_SECRET_KEY without code changes.
#
# `bucketName` is set explicitly (instead of `generateBucketName`) so the
# bucket has a stable, predictable identifier across re-creations.
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: openfoundry-datasets
  namespace: openfoundry
spec:
  bucketName: openfoundry-datasets
  storageClassName: ceph-bucket
  additionalConfig:
    maxObjects: "-1"
    maxSize: "-1"
---
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: openfoundry-models
  namespace: openfoundry
spec:
  bucketName: openfoundry-models
  storageClassName: ceph-bucket
  additionalConfig:
    maxObjects: "-1"
    maxSize: "-1"
---
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: openfoundry-iceberg
  namespace: openfoundry
spec:
  bucketName: openfoundry-iceberg
  storageClassName: ceph-bucket
  additionalConfig:
    maxObjects: "-1"
    maxSize: "-1"
