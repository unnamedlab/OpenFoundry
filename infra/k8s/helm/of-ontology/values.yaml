release: of-ontology

image:
  registry: ghcr.io/openfoundry
  tag: "0.1.0"

migrations:
  pg-schemas:
    enabled: true
    dsnSecret: { name: pg-schemas-app, key: dsn }

services:
  ontology-definition-service:  { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  ontology-actions-service:     { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "200m", memory: "512Mi" }, limits: { cpu: "1",    memory: "1Gi"   } } }
  ontology-query-service:       { replicas: 3, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "200m", memory: "512Mi" }, limits: { cpu: "1",    memory: "1Gi"   } } }
  object-database-service:      { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "200m", memory: "512Mi" }, limits: { cpu: "1",    memory: "1Gi"   } } }
  ontology-indexer:             { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
  outbox-relay:                 { replicas: 2, ports: [{ name: http, containerPort: 8080 }], resources: { requests: { cpu: "100m", memory: "256Mi" }, limits: { cpu: "500m", memory: "512Mi" } } }
