global:
  existingSecret: open-foundry-prod-env
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: 32m
    hosts:
      - host: openfoundry.example.com
        paths:
          - path: /
    tls:
      - secretName: open-foundry-prod-tls
        hosts:
          - openfoundry.example.com

# In production the S3 backend is Ceph RGW exposed by Rook (see
# infra/k8s/rook and infra/terraform/modules/ceph). The endpoint targets the
# in-cluster RGW Service created by the CephObjectStore named `openfoundry`
# in the `rook-ceph` namespace. Credentials are not stored here: they are
# materialised by the ObjectBucketClaims defined in infra/k8s/rook/bucket.yaml
# and surfaced into `open-foundry-prod-env` (see runbooks/ceph.md).
objectStore:
  backend: ceph
  endpoint: http://rook-ceph-rgw-openfoundry.rook-ceph.svc:80
  region: us-east-1
  forcePathStyle: true
  accessKeySecretKey: OBJECT_STORE_ACCESS_KEY
  secretKeySecretKey: OBJECT_STORE_SECRET_KEY
  buckets:
    datasets: openfoundry-datasets
    models: openfoundry-models
    iceberg: openfoundry-iceberg

services:
  gateway:
    replicas: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 12
  identity-federation-service:
    replicas: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 8
  data-asset-catalog-service:
    replicas: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 10
  sql-bi-gateway-service:
    env:
      DISTRIBUTED_QUERY_WORKERS: "8"
    autoscaling:
      minReplicas: 4
      maxReplicas: 20
      keda:
        enabled: true
  pipeline-authoring-service:
    autoscaling:
      minReplicas: 3
      maxReplicas: 16
  report-service:
    replicas: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 10
  geospatial-intelligence-service:
    replicas: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 10
