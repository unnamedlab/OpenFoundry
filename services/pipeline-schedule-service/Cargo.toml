[package]
name = "pipeline-schedule-service"
description = "Shared schedule orchestration for pipelines and workflows"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies]
cron = "0.12"
wasmtime = "24"

[dependencies.async-trait]
workspace = true

[dependencies.chrono-tz]
workspace = true

[dependencies.scheduling-cron]
workspace = true

[dependencies.scheduling-linter]
workspace = true

[dependencies.event-bus-data]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.axum-extra]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.bytes]
workspace = true

[dependencies.cassandra-kernel]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.datafusion]
workspace = true

[dependencies.event-bus-control]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.pyo3]
workspace = true
features = ["abi3-py311"]

[dependencies.query-engine]
workspace = true

[dependencies.reqwest]
workspace = true
features = ["multipart"]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.storage-abstraction]
workspace = true

[dependencies.temporal-client]
workspace = true
