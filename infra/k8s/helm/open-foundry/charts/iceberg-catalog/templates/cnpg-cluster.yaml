{{- if and .Values.enabled .Values.postgres.cnpg.enabled -}}
# CloudNativePG Cluster CR. Requires the CloudNativePG operator (Apache-2.0)
# to be installed cluster-wide. The operator reconciles a streaming-replicated
# PostgreSQL cluster and exposes `<name>-rw` / `<name>-ro` services used as
# the JDBC endpoint for Polaris.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "iceberg-catalog.cnpgClusterName" . }}
  labels:
{{ include "iceberg-catalog.labels" . | indent 4 }}
spec:
  instances: {{ .Values.postgres.cnpg.instances }}
  imageName: {{ .Values.postgres.cnpg.imageName | quote }}
  bootstrap:
    initdb:
      database: {{ .Values.postgres.database | quote }}
      owner: {{ .Values.postgres.username | quote }}
      secret:
        name: {{ include "iceberg-catalog.postgresSecretName" . }}
  storage:
    size: {{ .Values.postgres.cnpg.storage.size | quote }}
    {{- with .Values.postgres.cnpg.storage.storageClass }}
    storageClass: {{ . | quote }}
    {{- end }}
  {{- with .Values.postgres.cnpg.resources }}
  resources:
{{ toYaml . | indent 4 }}
  {{- end }}
---
# CloudNativePG expects the bootstrap secret to be a basic-auth Secret
# containing both the username and password fields.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iceberg-catalog.postgresSecretName" . }}
  labels:
{{ include "iceberg-catalog.labels" . | indent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgres.username | quote }}
  {{ .Values.postgres.passwordSecretKey }}: {{ required "postgres.password is required when CNPG is enabled and postgres.existingSecret is empty" .Values.postgres.password | quote }}
{{- end }}
