apiVersion: v1
kind: Namespace
metadata:
  name: temporal
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    # Linkerd mesh membership — mTLS between Temporal services and
    # between Temporal and Cassandra.
    linkerd.io/inject: enabled
---
apiVersion: v1
kind: Secret
metadata:
  name: temporal-cassandra-credentials
  namespace: temporal
  annotations:
    # Populated by external-secrets from Vault path
    # `secret/data/cassandra/temporal-user`. The plain stringData
    # block below is a placeholder for kubectl-only bootstraps.
    external-secrets.io/source: "vault:secret/data/cassandra/temporal-user"
type: Opaque
stringData:
  username: "REPLACE_VIA_EXTERNAL_SECRETS"
  password: "REPLACE_VIA_EXTERNAL_SECRETS"
