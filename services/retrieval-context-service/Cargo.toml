[package]
name = "retrieval-context-service"
description = "Knowledge retrieval and semantic context service"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.reqwest]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.vector-store]
workspace = true

[features]
default = []
# Placeholder reserved for the heavy parser pipelines absorbed from
# document-intelligence-service (S8 / ADR-0030). When wired, modules
# under `src/document_intelligence/` and any rdkafka / parser native
# deps belong behind this feature so default CI compile stays fast.
parsers = []
# Placeholder reserved for the runtime profile (rdkafka / scylla /
# cassandra-kernel). Empty today; declared so future bins that need
# it can be added with `required-features=["runtime"]` per the same
# pattern used in ontology-indexer / reindex-coordinator.
runtime = []

[[bin]]
path = "src/main.rs"
name = "retrieval-context-service"
required-features = []
