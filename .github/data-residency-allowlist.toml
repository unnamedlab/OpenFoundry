# Data residency registry for every live `*/migrations` directory.
# This is the source of truth for:
#   1. migration-dir -> schema -> residency placement
#   2. owned tables per bounded context
#   3. explicit `sqlx::query*` exception files + tables allowed to grow
#      without tripping the CI hot-path gate
version = 1

[registry]
expected_migration_dirs = 56
residency_targets = ["pg-schemas", "pg-policy", "pg-lakekeeper", "pg-runtime-config", "cassandra", "legacy-archive"]
forbidden_hot_tables = ["object_instances", "link_instances", "streaming_events", "dataset_transactions", "lineage_nodes", "refresh_tokens", "scoped_sessions"]

[sqlx_hot_path]
shared_allowed_files = [
  "libs/authz-cedar/src/pg.rs",

]

[[entries]]
component = "libs/outbox"
service = "outbox"
migration_dir = "libs/outbox/migrations"
schema = "outbox"
residency = "pg-policy"
allow_new_sqlx = { files = ["libs/outbox/src/lib.rs"], tables = ["events"] }
tables = ["events"]

