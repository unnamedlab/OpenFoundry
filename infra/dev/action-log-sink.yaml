# action-log-sink — Phase B of ADR-0045.
# Replaces the previous SparkApplication CR (sparkoperator.k8s.io/v1beta2
# + Scala ActionLogStreamSink) with a plain apps/v1 Deployment running
# services/action-log-sink (Go). Same topic, table, schema, and
# at-least-once-with-event_id-dedup contract documented in
# services/action-log-sink/README.md.
#
# Pre-req — first-time creation of the target table (one-shot, e.g.
# via Spark SQL or any Iceberg client that talks Lakekeeper):
#
#   CREATE TABLE IF NOT EXISTS lakekeeper.default.action_log (
#     event_id              STRING,
#     action_type_id        STRING,
#     action_name           STRING,
#     object_type_id        STRING,
#     object_id             STRING,
#     tenant                STRING,
#     actor_sub             STRING,
#     actor_email           STRING,
#     organization_id       STRING,
#     status                STRING,
#     parameters            STRING,
#     previous_state        STRING,
#     new_state             STRING,
#     target_classification STRING,
#     applied_at_ms         BIGINT,
#     kafka_ts              TIMESTAMP
#   )
#   USING iceberg
#   PARTITIONED BY (days(from_unixtime(applied_at_ms / 1000)));
#
# Time-travel example (state of the log at a historical snapshot):
#
#   SELECT * FROM lakekeeper.default.action_log VERSION AS OF <snapshot_id>;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: action-log-sink
  namespace: openfoundry
  labels:
    openfoundry.io/component: audit-stream-sink
    openfoundry.io/topic: "ontology.actions.applied.v1"
spec:
  replicas: 1
  strategy:
    # Rolling with 0 surge prevents two consumers in the same group
    # racing the same partitions during a deploy. The
    # terminationGracePeriodSeconds below gives the outgoing pod time
    # to drain its in-flight batch before the new one comes up.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      openfoundry.io/component: audit-stream-sink
      openfoundry.io/topic: "ontology.actions.applied.v1"
  template:
    metadata:
      labels:
        openfoundry.io/component: audit-stream-sink
        openfoundry.io/topic: "ontology.actions.applied.v1"
    spec:
      # Final flush on SIGTERM has up to (MaxWait + Append RTT) to
      # complete. Default MaxWait is 60s; allow generous headroom.
      terminationGracePeriodSeconds: 90
      containers:
        - name: action-log-sink
          image: registry.registry.svc.cluster.local:5000/openfoundry/action-log-sink:0.1.0
          imagePullPolicy: Always
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "openfoundry-kafka-bootstrap.kafka.svc:9092"
            # Dev cluster uses PLAINTEXT — see openfoundry_dev_k3s memory note.
            - name: KAFKA_SECURITY_PROTOCOL
              value: "PLAINTEXT"
            - name: ICEBERG_CATALOG_URL
              value: "http://iceberg-catalog-service.openfoundry.svc:8080"
            - name: ICEBERG_WAREHOUSE
              value: "openfoundry"
            - name: METRICS_ADDR
              value: "0.0.0.0:9090"
            - name: LOG_FORMAT
              value: "json"
            - name: OTEL_TRACES_EXPORTER
              value: "none"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: action-log-sink
  namespace: openfoundry
  labels:
    openfoundry.io/component: audit-stream-sink
spec:
  selector:
    openfoundry.io/component: audit-stream-sink
    openfoundry.io/topic: "ontology.actions.applied.v1"
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  type: ClusterIP
