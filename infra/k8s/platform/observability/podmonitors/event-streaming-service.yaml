---
# Bloque F1 — Prometheus PodMonitor for event-streaming-service.
#
# The service exposes Prometheus metrics on the admin side router at
# `:${ADMIN_PORT}/metrics` (see `services/event-streaming-service/src/main.rs`).
# Default port is 8080; override via `ADMIN_PORT` and patch
# `spec.podMetricsEndpoints[0].port` to match the container portName.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: event-streaming-service
  namespace: openfoundry-data
  labels:
    app.kubernetes.io/name: event-streaming-service
    app.kubernetes.io/component: streaming
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - openfoundry-data
  selector:
    matchLabels:
      app.kubernetes.io/name: event-streaming-service
  podMetricsEndpoints:
    - port: admin
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          targetLabel: service
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
      metricRelabelings:
        # Keep only the streaming-specific series + router shared series.
        - sourceLabels: [__name__]
          regex: "(streaming_.*|event_router_.*)"
          action: keep
