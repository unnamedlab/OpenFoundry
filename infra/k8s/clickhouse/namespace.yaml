---
# Namespace that holds both the Altinity clickhouse-operator and the
# managed ClickHouse + ClickHouse Keeper installations for OpenFoundry.
#
# The operator (Altinity clickhouse-operator, Apache-2.0) is installed via
# its upstream Helm chart -- see infra/runbooks/clickhouse.md. The CRs in
# this directory describe the desired topology that the operator must
# reconcile.
apiVersion: v1
kind: Namespace
metadata:
  name: clickhouse
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: open-foundry
    openfoundry.io/component: analytics
