# =====================================================================
# 3. online-retail-cust  (customer-metrics)
#    Aggregates cleaned transactions by customer_id with sum(revenue)
#    and count_distinct(invoice). Phase C.3 promoted `aggregate` to
#    `available` so this pipeline runs on the Go runtime end-to-end.
# =====================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-online-retail-cust
  namespace: openfoundry
  labels:
    openfoundry.io/component: pipeline-runner
    openfoundry.io/pipeline-id: online-retail-cust
data:
  plan.json: |
    {
      "pipeline_id": "online-retail-cust",
      "run_id": "001",
      "ops": [
        {
          "id": "src",
          "kind": "read_table",
          "read_table": {"catalog": "lakekeeper", "namespace": "default", "table": "transactions_clean"}
        },
        {
          "id": "agg",
          "kind": "aggregate",
          "inputs": ["src"],
          "aggregate": {
            "group_by": ["customer_id"],
            "aggregations": [
              {"function": "sum",            "source_column": "revenue", "target_column": "total_revenue"},
              {"function": "count_distinct", "source_column": "invoice", "target_column": "num_orders"},
              {"function": "count_distinct", "source_column": "country", "target_column": "num_countries"}
            ]
          }
        },
        {
          "id": "sink",
          "kind": "write_table",
          "inputs": ["agg"],
          "write_table": {"catalog": "lakekeeper", "namespace": "default", "table": "customer_metrics", "mode": "create_or_replace"}
        }
      ]
    }
---
