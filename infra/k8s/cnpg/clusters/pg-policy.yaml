---
# S6.1.b — `pg-policy` consolidated CNPG cluster.
#
# Hosts security/policy/audit/governance schemas. This cluster is the
# **CDC source** consumed by Debezium PostgreSQL connector to publish
# audit and policy change events to Kafka, hence the explicit
# `wal_level=logical` + `max_replication_slots=8` + `max_wal_senders=10`
# (Debezium creates one replication slot per source database; we leave
# headroom for failover and ad-hoc subscribers).
#
# Schemas hosted (12): identity-federation, oauth-integration,
# network-boundary, cipher, security-governance, sds, audit-compliance,
# retention-policy, lineage-deletion, checkpoints-purpose,
# telemetry-governance, code-security-scanning.
#
# Sized larger than `pg-schemas` because audit/event tables grow fast
# and replication slots retain WAL until consumed.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-policy
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: pg-policy
    app.kubernetes.io/component: postgres
    openfoundry.io/managed-by: cnpg
    openfoundry.io/cluster-role: policy-audit
    openfoundry.io/cdc-source: "true"
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised

  minSyncReplicas: 1
  maxSyncReplicas: 1

  postgresql:
    parameters:
      synchronous_commit: "on"
      # Debezium prerequisites — DO NOT lower without coordinating with
      # the audit-compliance and security-governance bounded contexts.
      wal_level: "logical"
      max_replication_slots: "8"
      max_wal_senders: "10"
      max_wal_size: "8GB"
      shared_buffers: "2GB"
      work_mem: "32MB"
      effective_cache_size: "8GB"
      max_connections: "400"

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: pg-policy-app
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: pg-policy-bootstrap-sql
            key: bootstrap.sql

  storage:
    size: 200Gi
    storageClass: ceph-rbd

  walStorage:
    size: 50Gi
    storageClass: ceph-rbd

  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "8"
      memory: 32Gi

  affinity:
    topologyKey: topology.kubernetes.io/zone
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred

  monitoring:
    enablePodMonitor: true

  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://openfoundry-pg-backups/pg-policy"
      endpointURL: "http://rook-ceph-rgw-openfoundry-store.rook-ceph.svc:80"
      s3Credentials:
        accessKeyId:
          name: pg-policy-backup
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-policy-backup
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 2
