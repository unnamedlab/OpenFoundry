global:
  deploymentFabric:
    environment: prod
  kafka:
    bootstrap: openfoundry-kafka-bootstrap.kafka.svc:9092

services:
  audit-sink:
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
