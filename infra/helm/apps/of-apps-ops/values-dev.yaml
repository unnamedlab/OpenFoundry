image:
  registry: registry.registry.svc.cluster.local:5000
  tag: "0.1.0"

global:
  imagePullPolicy: IfNotPresent
  deploymentFabric:
    environment: dev
  autoscaling:
    enabled: false
  resourcesOverride:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  kafka:
    bootstrap: openfoundry-kafka-bootstrap.kafka.svc:9092

services:
  audit-sink:
    replicas: 1
  app-builder-service:
    envSecrets:
      DATABASE_URL:
        secretName: app-builder-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: app-builder-db-dsn
        key: reader_url
  application-composition-service:
    envSecrets:
      DATABASE_URL:
        secretName: application-composition-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: application-composition-db-dsn
        key: reader_url
  audit-compliance-service:
    envSecrets:
      DATABASE_URL:
        secretName: audit-compliance-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: audit-compliance-db-dsn
        key: reader_url
  # S8 / ADR-0030: automation-operations-service merged →
  # workflow-automation-service. Saga + automations now share the
  # workflow-automation DSN (single Postgres pool); no separate
  # automation-operations-db-dsn Secret is needed.
  code-repository-review-service:
    envSecrets:
      DATABASE_URL:
        secretName: code-repository-review-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: code-repository-review-db-dsn
        key: reader_url
  # S8 / ADR-0030 — `code-security-scanning-service` merged →
  # `code-repository-review-service`; the merged service uses the single
  # `code-repository-review-db-dsn` Secret (defined above).
  # S8 / ADR-0030 — `compute-modules-{control-plane,runtime}-service` were
  # never wired and are merged → `pipeline-build-service`; their dev DSN
  # overrides are no longer needed.
  custom-endpoints-service:
    envSecrets:
      DATABASE_URL:
        secretName: custom-endpoints-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: custom-endpoints-db-dsn
        key: reader_url
  developer-console-service:
    envSecrets:
      DATABASE_URL:
        secretName: developer-console-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: developer-console-db-dsn
        key: reader_url
  # S8 / ADR-0030: document-intelligence-service merged into
  # retrieval-context-service (of-ml-aip). The document-intelligence
  # tables now ship under retrieval-context-service' migrations against
  # `pg-schemas`; the retrieval-context DSN gets wired in of-ml-aip's
  # values-dev.yaml when its runtime is implemented.
  # S8 / ADR-0030: document-reporting-service merged → notebook-runtime-service.
  # The notepad domain reuses the notebook-runtime DSN.
  execution-observability-service:
    envSecrets:
      DATABASE_URL:
        secretName: execution-observability-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: execution-observability-db-dsn
        key: reader_url
  federation-product-exchange-service:
    envSecrets:
      DATABASE_URL:
        secretName: federation-product-exchange-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: federation-product-exchange-db-dsn
        key: reader_url
  managed-workspace-service:
    envSecrets:
      DATABASE_URL:
        secretName: managed-workspace-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: managed-workspace-db-dsn
        key: reader_url
  marketplace-service:
    envSecrets:
      DATABASE_URL:
        secretName: marketplace-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: marketplace-db-dsn
        key: reader_url
  monitoring-rules-service:
    envSecrets:
      DATABASE_URL:
        secretName: monitoring-rules-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: monitoring-rules-db-dsn
        key: reader_url
  nexus-service:
    envSecrets:
      DATABASE_URL:
        secretName: nexus-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: nexus-db-dsn
        key: reader_url
  notebook-runtime-service:
    envSecrets:
      DATABASE_URL:
        secretName: notebook-runtime-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: notebook-runtime-db-dsn
        key: reader_url
  notification-alerting-service:
    envSecrets:
      DATABASE_URL:
        secretName: notification-alerting-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: notification-alerting-db-dsn
        key: reader_url
  report-service:
    envSecrets:
      DATABASE_URL:
        secretName: report-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: report-db-dsn
        key: reader_url
  scenario-simulation-service:
    envSecrets:
      DATABASE_URL:
        secretName: scenario-simulation-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: scenario-simulation-db-dsn
        key: reader_url
  sdk-generation-service:
    envSecrets:
      DATABASE_URL:
        secretName: sdk-generation-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: sdk-generation-db-dsn
        key: reader_url
  sds-service:
    envSecrets:
      DATABASE_URL:
        secretName: sds-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: sds-db-dsn
        key: reader_url
  solution-design-service:
    envSecrets:
      DATABASE_URL:
        secretName: solution-design-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: solution-design-db-dsn
        key: reader_url
  # S8 / ADR-0030: spreadsheet-computation-service merged → notebook-runtime-service.
  # The spreadsheet schema reuses the notebook-runtime DSN; the runtime
  # owner today is a stub (scaffold placeholder source).
  tabular-analysis-service:
    envSecrets:
      DATABASE_URL:
        secretName: tabular-analysis-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: tabular-analysis-db-dsn
        key: reader_url
  telemetry-governance-service:
    envSecrets:
      DATABASE_URL:
        secretName: telemetry-governance-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: telemetry-governance-db-dsn
        key: reader_url
  workflow-automation-service:
    envSecrets:
      DATABASE_URL:
        secretName: workflow-automation-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: workflow-automation-db-dsn
        key: reader_url
