[package]
name = "ontology-query-service"
description = "Ontology query, search and semantic retrieval service"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
path = "src/main.rs"
name = "ontology-query-service"
required-features = []

[dependencies]
async-trait = { workspace = true }

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.config]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

# S1.5 wiring — Cassandra read path + caching.
[dependencies.ontology-kernel]
workspace = true

[dependencies.cassandra-kernel]
workspace = true
features = ["repos"]

[dependencies.storage-abstraction]
workspace = true

# S1.5.a — local read cache. The `future` feature enables the
# async API we need (`get_with`, `invalidate`, …).
[dependencies.moka]
workspace = true

# S1.5.b — invalidation bus. The platform's primary control-plane
# bus is NATS JetStream (see `libs/event-bus-control`); Debezium
# bridges the Kafka topic `ontology.write.v1` into the JetStream
# subject of the same name. We subscribe via `async-nats` here
# rather than pulling `librdkafka` into every replica of the
# read service.
[dependencies.async-nats]
workspace = true

[dependencies.tower-http]
workspace = true

[dev-dependencies]
tower = { workspace = true }

[dev-dependencies.tokio]
workspace = true
features = ["macros", "rt-multi-thread"]

[dev-dependencies.http-body-util]
version = "0.1"

[dev-dependencies.serde_json]
workspace = true

[dev-dependencies.uuid]
workspace = true
features = ["v4", "v7", "serde"]

[dev-dependencies.async-trait]
workspace = true
