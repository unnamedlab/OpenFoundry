global:
  deploymentFabric:
    environment: staging

services:
  edge-gateway-service:
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  identity-federation-service:
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80

temporal:
  address: temporal-frontend.temporal.svc.cluster.local:7233
  namespace: openfoundry-staging

temporalWorkers:
  defaults:
    replicas: 2
    logLevel: info
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "500m"
        memory: 512Mi
  serviceMonitor:
    enabled: true
