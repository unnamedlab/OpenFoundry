global:
  existingSecret: open-foundry-dev-env
  replicaOverride: 1
  # Dev cluster (Lima 14 cores / 30 GiB) runs ~46 openfoundry pods. Real
  # steady-state usage per service is 1–5 m CPU / 40–60 MiB RAM (see
  # `kubectl top pods -n openfoundry`), so requests/limits are sized for
  # 5–10× burst headroom rather than the prod-shaped 500m/512Mi that
  # blew the cluster past 800 % CPU and 400 % memory commitment.
  resourcesOverride:
    requests:
      cpu: 30m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 320Mi
  autoscaling:
    enabled: false
  migrations:
    enabled: false
  podDisruptionBudget:
    enabled: false
  networkPolicy:
    enabled: false
  deploymentFabric:
    environment: development

ingress:
  enabled: false

objectStore:
  backend: rustfs
  endpoint: http://rustfs:9000
  region: us-east-1
  forcePathStyle: true
  accessKeySecretKey: OBJECT_STORE_ACCESS_KEY
  secretKeySecretKey: OBJECT_STORE_SECRET_KEY
  buckets:
    datasets: openfoundry-datasets
    models: openfoundry-models
    iceberg: openfoundry-iceberg

icebergRestCatalog:
  url: http://lakekeeper.lakekeeper.svc:8181

trino:
  enabled: false

spark-operator:
  enabled: false

mimir:
  enabled: false
