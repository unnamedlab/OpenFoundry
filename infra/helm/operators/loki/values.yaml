# Values for the upstream grafana/loki Helm chart.
#
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm install -n observability --create-namespace loki \
#     grafana/loki -f infra/helm/operators/loki/values.yaml
#
# License: Loki is AGPL-3.0. We ship it as the central log store for
# the platform; per ADR-0042 the on-prem deployment owns its own
# binaries and there is no SaaS dependency.
#
# Topology rationale:
#   * SimpleScalable is the chart's "production" topology: the read,
#     write and backend paths are separate Deployments/StatefulSets
#     so we can scale ingest, query and the compactor independently.
#     Single binary is a Lima-only override (`values-dev.yaml`).
#   * Object storage backend is S3-compatible, pointed at the in-tree
#     MinIO/Ceph endpoint. Filesystem backend is dev-only and does
#     not survive pod restarts.
#   * Promtail (separate chart) ships the logs in. Loki itself only
#     receives over the gateway and never tails files.

deploymentMode: SimpleScalable

# ── core loki config ────────────────────────────────────────────────
loki:
  auth_enabled: false  # OpenFoundry runs single-tenant; tenancy is
                       # enforced upstream by the edge-gateway
                       # (`services/edge-gateway-service/`) before
                       # logs are ever emitted.

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler:  loki-ruler
      admin:  loki-admin
    s3:
      # S3 endpoint resolved from the in-cluster object store (Ceph
      # RGW in prod, MinIO in dev/staging). Override the access keys
      # via a sealed secret in production, never inline.
      endpoint: http://minio.observability.svc.cluster.local:9000
      region: us-east-1
      s3ForcePathStyle: true
      insecure: true
      accessKeyId: ${LOKI_S3_ACCESS_KEY:-loki}
      secretAccessKey: ${LOKI_S3_SECRET_KEY:-loki12345}

  limits_config:
    retention_period: 720h          # 30d hot retention; cold tier is
                                    # the object store lifecycle policy
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    max_query_parallelism: 32
    split_queries_by_interval: 30m
    max_streams_per_user: 0         # multi-service cardinality is high;
                                    # rely on per-stream label budgeting
                                    # instead of a global cap
    reject_old_samples: true
    reject_old_samples_max_age: 168h

  compactor:
    retention_enabled: true
    delete_request_store: s3

# ── SimpleScalable topology ─────────────────────────────────────────
write:
  replicas: 3
  persistence:
    size: 50Gi
    storageClass: ""    # use cluster default; override per-env
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "2",  memory: 4Gi }

read:
  replicas: 3
  persistence:
    size: 20Gi
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "2",  memory: 4Gi }

backend:
  replicas: 3
  persistence:
    size: 20Gi
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "1",  memory: 2Gi }

# ── gateway (nginx in front of the path components) ────────────────
gateway:
  enabled: true
  replicas: 2
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# ── Disable the embedded MinIO; we already run object storage ──────
minio:
  enabled: false

# ── Disable bundled monitoring; the kube-prometheus-stack picks the
#    ServiceMonitors up via the cluster-wide selector configured in
#    `infra/helm/operators/kube-prometheus-stack/values.yaml`.
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

# ── Disable the test pod (chart default leaves a Job around) ───────
test:
  enabled: false
