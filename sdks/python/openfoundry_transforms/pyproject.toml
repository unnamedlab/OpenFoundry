[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "openfoundry-transforms"
version = "0.1.0"
description = "Foundry-style transforms decorators for OpenFoundry. Mirrors `transforms.api` + `transforms.mediasets` so Code Repositories can author MediaSetInput / MediaSetOutput pipelines against an OpenFoundry stack."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
test = ["pytest>=8"]

[tool.setuptools.packages.find]
include = ["openfoundry_transforms*"]
