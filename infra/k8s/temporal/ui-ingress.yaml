# Temporal UI behind edge-gateway-service with OIDC against
# identity-federation-service. The chart's built-in auth is disabled
# (see values-prod.yaml::web.config.auth.enabled=false); oauth2-proxy
# enforces authn here and forwards a verified upstream identity.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui-oauth2-proxy
  namespace: temporal
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/part-of: temporal
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: oauth2-proxy, app.kubernetes.io/part-of: temporal }
  template:
    metadata:
      labels: { app.kubernetes.io/name: oauth2-proxy, app.kubernetes.io/part-of: temporal }
      annotations: { linkerd.io/inject: enabled }
    spec:
      automountServiceAccountToken: false
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://identity.openfoundry.local/realms/openfoundry
            - --client-id=temporal-ui
            - --redirect-url=https://temporal.openfoundry.local/oauth2/callback
            - --scope=openid email profile
            - --upstream=http://temporal-web.temporal.svc.cluster.local:8080/
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --skip-provider-button=true
            - --reverse-proxy=true
          envFrom:
            - secretRef: { name: temporal-ui-oauth2-secrets }
          ports:
            - { name: http, containerPort: 4180 }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui-oauth2-proxy
  namespace: temporal
spec:
  selector: { app.kubernetes.io/name: oauth2-proxy, app.kubernetes.io/part-of: temporal }
  ports:
    - { name: http, port: 80, targetPort: 4180 }
---
# Edge gateway routes /temporal/* → oauth2-proxy → temporal-web.
# The actual gateway config lives in services/edge-gateway-service;
# this Ingress is the in-cluster fallback for direct access from
# administrators with cluster network connectivity.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: temporal-ui
  namespace: temporal
  annotations:
    cert-manager.io/cluster-issuer: openfoundry-internal
    nginx.ingress.kubernetes.io/proxy-buffer-size: 16k
spec:
  ingressClassName: nginx
  tls:
    - hosts: [temporal.openfoundry.local]
      secretName: temporal-ui-tls
  rules:
    - host: temporal.openfoundry.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: temporal-ui-oauth2-proxy
                port: { name: http }
