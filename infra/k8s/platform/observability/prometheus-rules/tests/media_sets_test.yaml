# Unit tests for the three alerts in ../media-sets.yaml.
#
# Run with:
#   promtool test rules infra/k8s/platform/observability/prometheus-rules/tests/media_sets_test.yaml
#
# Tests cover the cost-overage page (`MediaSetsStorageAboveBudget`),
# the leading-indicator purge anomaly, and the stuck-transaction
# guard. We pin the `for:` window in each scenario so a thresholding
# regression on the alerts file fails CI loudly.
rule_files:
  - ../media-sets.yaml

evaluation_interval: 1m

tests:
  # ---------------------------------------------------------------- storage
  - interval: 1m
    name: storage above budget fires when chargeable bytes exceed 5 TiB
    input_series:
      - series: 'media_storage_bytes{schema="IMAGE", virtual="false"}'
        # 6 TiB held steady for 20 evaluation steps. The alert has
        # `for: 15m` so it is firing by t=15m.
        values: '6597069766656x20'
      # Virtual sets are reference-only and must NOT contribute.
      - series: 'media_storage_bytes{schema="IMAGE", virtual="true"}'
        values: '54975581388800x20'
    alert_rule_test:
      - eval_time: 5m
        alertname: MediaSetsStorageAboveBudget
        # Threshold met but `for: 15m` not yet elapsed.
        exp_alerts: []
      - eval_time: 16m
        alertname: MediaSetsStorageAboveBudget
        exp_alerts:
          - exp_labels:
              severity: warning
              component: media-sets
              schema: IMAGE
            exp_annotations:
              summary: "Live media storage above 5 TiB for schema IMAGE"
              description: |
                Chargeable media storage for schema `IMAGE` has been
                above 5 TiB for 15 minutes. Inspect the per-tenant breakdown in
                the Foundry "Media usage costs and limits" dashboard before
                increasing the cap. Likely cause: a new ingest pipeline
                without retention.

  - interval: 1m
    name: storage stays quiet when only virtual bytes spike
    input_series:
      - series: 'media_storage_bytes{schema="IMAGE", virtual="true"}'
        values: '54975581388800x20'
    alert_rule_test:
      - eval_time: 30m
        alertname: MediaSetsStorageAboveBudget
        exp_alerts: []

  # ---------------------------------------------------------------- transactions
  - interval: 1m
    name: stuck transaction pages at 30m
    input_series:
      - series: 'media_active_transactions{media_set="ri.foundry.main.media_set.stuck"}'
        values: '1x40'
    alert_rule_test:
      - eval_time: 25m
        alertname: MediaSetTransactionStuckOpen
        exp_alerts: []
      - eval_time: 31m
        alertname: MediaSetTransactionStuckOpen
        exp_alerts:
          - exp_labels:
              severity: warning
              component: media-sets
              media_set: ri.foundry.main.media_set.stuck
            exp_annotations:
              summary: "Media set ri.foundry.main.media_set.stuck has a transaction open >30m"
              description: |
                A media-set transaction has been OPEN on
                `ri.foundry.main.media_set.stuck` for 30+ minutes. Likely cause: a
                writer crashed without aborting. Investigate, then call
                `POST /transactions/{rid}/abort` to release the partial
                unique index `uq_media_set_transactions_one_open_per_branch`.

  - interval: 1m
    name: stuck transaction does not fire when gauge is zero
    input_series:
      - series: 'media_active_transactions{media_set="ri.foundry.main.media_set.healthy"}'
        values: '0x40'
    alert_rule_test:
      - eval_time: 35m
        alertname: MediaSetTransactionStuckOpen
        exp_alerts: []
