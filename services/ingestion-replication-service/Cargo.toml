[package]
name = "ingestion-replication-service"
description = "Connector agents, sync scheduling, and ingestion replication runtime"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies]
csv = "1.3"
sha2 = "0.10"
schemars = "0.8"

[dependencies.kube]
version = "0.95"
default-features = false
features = ["client", "derive", "rustls-tls", "runtime"]

[dependencies.k8s-openapi]
version = "0.23"
features = ["v1_30"]

[dependencies.tonic]
workspace = true

[dependencies.prost]
workspace = true

[dependencies.prost-types]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.anyhow]
workspace = true

[build-dependencies.tonic-build]
workspace = true

[dev-dependencies.tower-test]
version = "0.4"

[dev-dependencies.tower]
workspace = true

[dev-dependencies.http]
version = "1"

[dev-dependencies.http-body-util]
version = "0.1"

[dev-dependencies.bytes]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus]
workspace = true

[dependencies.reqwest]
workspace = true
features = ["multipart"]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.storage-abstraction]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.url]
workspace = true

[dependencies.uuid]
workspace = true

[[bin]]
path = "src/main.rs"
name = "ingestion-replication-service"
required-features = []

[lib]
path = "src/lib.rs"
name = "ingestion_replication_service"
required-features = []
crate-type = ["lib"]
