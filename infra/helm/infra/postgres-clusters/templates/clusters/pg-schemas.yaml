{{- if .Values.pgSchemas.enabled }}
{{- with .Values.pgSchemas }}
---
# S6.1.b — `pg-schemas` consolidated CNPG cluster.
#
# Hosts the schemas of catalog/registry/definition/metadata services
# (data assets, datasets, lineage, model registry, ontology defs,
# marketplace, etc.). 23 schemas total — see the bootstrap-SQL ConfigMap
# in `pg-schemas-bootstrap-sql.yaml` for the exhaustive list.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-schemas
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: pg-schemas
    app.kubernetes.io/component: postgres
    openfoundry.io/managed-by: cnpg
    openfoundry.io/cluster-role: schemas
spec:
  instances: {{ .instances }}
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: {{ .enableSuperuserAccess }}

  minSyncReplicas: {{ .syncReplicas }}
  maxSyncReplicas: {{ .syncReplicas }}

  postgresql:
    parameters:
      synchronous_commit: {{ if gt (int .syncReplicas) 0 }}"on"{{ else }}"local"{{ end }}
      wal_level: {{ .walLevel | quote }}
      max_replication_slots: {{ .postgresql.maxReplicationSlots | quote }}
      max_wal_senders: {{ .postgresql.maxWalSenders | quote }}
      max_wal_size: {{ .postgresql.maxWalSize | quote }}
      shared_buffers: {{ .postgresql.sharedBuffers | quote }}
      work_mem: {{ .postgresql.workMem | quote }}
      effective_cache_size: {{ .postgresql.effectiveCacheSize | quote }}
      max_connections: {{ .postgresql.maxConnections | quote }}

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: pg-schemas-app
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: pg-schemas-bootstrap-sql
            key: bootstrap.sql

  storage:
    size: {{ .storageSize }}
    storageClass: {{ .storageClass }}

  walStorage:
    size: {{ .walStorageSize }}
    storageClass: {{ .storageClass }}

  resources:
    {{- toYaml .resources | nindent 4 }}

  affinity:
    topologyKey: kubernetes.io/hostname
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred

  monitoring:
    enablePodMonitor: false

  {{- if .backupEnabled }}
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://openfoundry-pg-backups/pg-schemas"
      endpointURL: "http://rook-ceph-rgw-openfoundry-store.rook-ceph.svc:80"
      s3Credentials:
        accessKeyId:
          name: pg-schemas-backup
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-schemas-backup
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 2
  {{- end }}
{{- end }}
{{- end }}
