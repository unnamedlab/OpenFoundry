# Prometheus alerting rules for ClickHouse + ClickHouse Keeper.
#
# Source repo:  infra/k8s/clickhouse/
# Scrape:       ClickHouse exposes Prometheus metrics on the built-in
#               `/metrics` endpoint (see ClickHouse server `prometheus`
#               config). ClickHouse Keeper exposes its metrics on the
#               same path.
# Validation:   `promtool check rules infra/observability/prometheus-rules/clickhouse.yaml`
#
# SLI rationale (upstream-sourced thresholds):
#   * ReplicasMaxAbsoluteDelay: ClickHouse documents this as the maximum
#     replication delay across replicas, in seconds. Any value > 60s is
#     flagged in the official monitoring docs.
#     https://clickhouse.com/docs/en/operations/monitoring
#   * ReadonlyReplica: number of tables in read-only mode. A non-zero
#     value almost always indicates Keeper / ZooKeeper connectivity loss.
#   * Background pool / parts: BackgroundMergesAndMutationsPoolTask and
#     parts-to-merge backlogs are the canonical merge-saturation signal
#     described in ClickHouse "Best practices for monitoring".
#   * Keeper quorum: KeeperAliveConnections together with the Raft
#     follower count expose quorum loss; ClickHouse-Keeper requires a
#     majority of nodes to be alive.
groups:
  - name: clickhouse.availability
    rules:
      - alert: ClickHouseInstanceDown
        expr: up{job=~"clickhouse.*"} == 0
        for: 2m
        labels:
          severity: critical
          component: clickhouse
        annotations:
          summary: "ClickHouse instance {{ $labels.instance }} is down"
          description: |
            ClickHouse server `{{ $labels.instance }}` has been
            unreachable for 2m. Inspect pod status under
            `infra/k8s/clickhouse/`.

      - alert: ClickHouseReadonlyReplica
        # Read-only mode = the replica cannot reach Keeper. This is the
        # standard "split brain incoming" signal.
        expr: ClickHouseMetrics_ReadonlyReplica > 0
        for: 5m
        labels:
          severity: critical
          component: clickhouse
        annotations:
          summary: "ClickHouse {{ $labels.instance }} has read-only replicas"
          description: |
            `ReadonlyReplica > 0` on `{{ $labels.instance }}` for 5m.
            Likely cause: Keeper unreachable. Check Keeper quorum.

  - name: clickhouse.replication
    rules:
      - alert: ClickHouseReplicaDriftHigh
        # ClickHouse docs: ReplicasMaxAbsoluteDelay is "maximum replica
        # delay in seconds". 60s is the documented warn threshold.
        expr: ClickHouseAsyncMetrics_ReplicasMaxAbsoluteDelay > 60
        for: 10m
        labels:
          severity: warning
          component: clickhouse
        annotations:
          summary: "ClickHouse replica drift > 60s on {{ $labels.instance }}"
          description: |
            ReplicasMaxAbsoluteDelay = `{{ $value }}s` on
            `{{ $labels.instance }}` for 10m. Replication is falling
            behind; expect stale dashboard reads.

      - alert: ClickHouseReplicaDriftCritical
        expr: ClickHouseAsyncMetrics_ReplicasMaxAbsoluteDelay > 600
        for: 5m
        labels:
          severity: critical
          component: clickhouse
        annotations:
          summary: "ClickHouse replica drift > 10m on {{ $labels.instance }}"
          description: |
            Replica is more than 10 minutes behind the leader. SLO 2.4
            (ADR-0012) cannot be met under this drift. Investigate
            Keeper, network, or merge backlog.

  - name: clickhouse.merges
    rules:
      - alert: ClickHousePartsToMergeBacklog
        # The official "monitoring" page lists PartsToMerge as one of the
        # primary saturation metrics. Threshold (300) is the value used
        # in ClickHouse Cloud's reference dashboards as a warn boundary.
        expr: ClickHouseMetrics_PartsToMerge > 300
        for: 15m
        labels:
          severity: warning
          component: clickhouse
        annotations:
          summary: "ClickHouse merges are backlogged on {{ $labels.instance }}"
          description: |
            PartsToMerge = `{{ $value }}` on `{{ $labels.instance }}`
            for 15m. The merge thread pool cannot keep up with insert
            throughput. Risk of `Too many parts` errors.

      - alert: ClickHouseTooManyParts
        # `MergeTreePartsLoaderThreadsActive` saturating + parts > 1000
        # per partition is the documented "Too many parts" precursor.
        expr: ClickHouseMetrics_PartsActive > 1000
        for: 10m
        labels:
          severity: critical
          component: clickhouse
        annotations:
          summary: "ClickHouse {{ $labels.instance }} active parts > 1000"
          description: |
            More than 1000 active parts; INSERTs may start failing
            with "Too many parts". Increase merge concurrency or
            reduce insert frequency.

  - name: clickhouse.keeper
    rules:
      - alert: ClickHouseKeeperDown
        expr: up{job=~"clickhouse-keeper.*"} == 0
        for: 1m
        labels:
          severity: critical
          component: clickhouse-keeper
        annotations:
          summary: "ClickHouse Keeper instance {{ $labels.instance }} is down"
          description: |
            Keeper member down. Check whether quorum is still met.

      - alert: ClickHouseKeeperQuorumLost
        # Quorum requires majority of members. We compare alive vs total.
        # The Keeper deployment under infra/k8s/clickhouse/keeper.yaml
        # uses 3 members, so quorum = 2.
        expr: |
          (count by (job) (up{job=~"clickhouse-keeper.*"} == 1))
            <
          (count by (job) (up{job=~"clickhouse-keeper.*"}) / 2 + 1)
        for: 1m
        labels:
          severity: critical
          component: clickhouse-keeper
        annotations:
          summary: "ClickHouse Keeper quorum lost ({{ $labels.job }})"
          description: |
            Less than a majority of Keeper members are alive. ClickHouse
            cluster will go read-only. This is a page-on-call event.
