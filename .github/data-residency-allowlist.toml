residency = "pg-runtime-config"
allow_new_sqlx = { files = ["services/agent-runtime-service/src/handlers.rs"], tables = ["agent_definitions", "agent_run_steps", "agent_runs"] }
tables = ["ai_providers", "ai_prompt_templates", "ai_knowledge_bases", "ai_knowledge_documents", "ai_tools", "ai_agents", "ai_conversations", "ai_semantic_cache", "ai_llm_usage_events", "agent_definitions", "agent_runs", "agent_run_steps"]

