# Flux HelmRelease for the Temporal chart. If your cluster uses
# Argo CD instead, swap this for an Application manifest pointing to
# the same chart + values.

apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: temporal
  namespace: temporal
spec:
  interval: 24h
  url: https://go.temporal.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal
  namespace: temporal
spec:
  interval: 30m
  chart:
    spec:
      chart: temporal
      version: "~0.46.0"
      sourceRef:
        kind: HelmRepository
        name: temporal
        namespace: temporal
      interval: 12h
  install:
    timeout: 15m
    crds: CreateReplace
  upgrade:
    timeout: 15m
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  rollback:
    timeout: 15m
    cleanupOnFail: true
  valuesFrom:
    - kind: ConfigMap
      name: temporal-values-prod
      valuesKey: values.yaml
  # The actual values live in the ConfigMap below, sourced from
  # values-prod.yaml so renovate can bump them mechanically.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-values-prod
  namespace: temporal
  annotations:
    # Generated from infra/k8s/platform/manifests/temporal/values-prod.yaml by the
    # `infra/scripts/sync-temporal-values.sh` pre-commit hook.
    openfoundry.dev/source: infra/k8s/platform/manifests/temporal/values-prod.yaml
data:
  values.yaml: |
    # Placeholder — the real values live in values-prod.yaml and are
    # synced into this ConfigMap by the pre-commit hook (or by
    # `kubectl create configmap … --from-file=values.yaml=…`).
    server:
      replicaCount: 3
