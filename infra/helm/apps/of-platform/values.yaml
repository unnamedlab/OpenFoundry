        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    pdb:
      enabled: true
      minAvailable: 1

  # ── Platform-wide services completed (S8.6 — full coverage) ──────────
