image:
  registry: registry.registry.svc.cluster.local:5000
  tag: "0.1.0"

global:
  imagePullPolicy: IfNotPresent
  autoscaling:
    enabled: false
  resourcesOverride:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  kafka:
    bootstrap: openfoundry-kafka-bootstrap.kafka.svc:9092

services:
  ai-sink:
    replicas: 1
  agent-runtime-service:
    envSecrets:
      DATABASE_URL:
        secretName: agent-runtime-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: agent-runtime-db-dsn
        key: reader_url
  ai-application-generation-service:
    envSecrets:
      DATABASE_URL:
        secretName: ai-application-generation-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: ai-application-generation-db-dsn
        key: reader_url
  mcp-orchestration-service:
    envSecrets:
      DATABASE_URL:
        secretName: mcp-orchestration-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: mcp-orchestration-db-dsn
        key: reader_url
  model-adapter-service:
    envSecrets:
      DATABASE_URL:
        secretName: model-adapter-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: model-adapter-db-dsn
        key: reader_url
  model-catalog-service:
    envSecrets:
      DATABASE_URL:
        secretName: model-catalog-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: model-catalog-db-dsn
        key: reader_url
  model-lifecycle-service:
    envSecrets:
      DATABASE_URL:
        secretName: model-lifecycle-db-dsn
        key: writer_url
      DATABASE_READ_URL:
        secretName: model-lifecycle-db-dsn
        key: reader_url
