# Spark Operator Helm values (S5.7.a).
#
# Chart: spark-operator/spark-operator (Apache-2.0).
# Repo: https://kubeflow.github.io/spark-operator
# Pin to a chart version that ships Spark 3.5.x base image.

image:
  registry: docker.io
  repository: kubeflow/spark-operator
  tag: "v2.0.2"

spark:
  jobNamespaces:
    - openfoundry-spark
  rbac:
    create: true

webhook:
  enable: true
  port: 9443

controller:
  workers: 10
  rbac:
    create: true
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

prometheus:
  metrics:
    enable: true
    port: 8090
    endpoint: /metrics
  podMonitor:
    create: true
    labels:
      role: alert-rules
