# Dev overrides — lighter resource limits, extra debugging
services:
  postgres:
    environment:
      POSTGRES_MULTIPLE_DATABASES: "openfoundry_auth_service,openfoundry_dataset_service,openfoundry_pipeline_service,openfoundry_ontology_service,openfoundry_audit_service,openfoundry_ai_service,openfoundry_app_builder_service,openfoundry_code_repo_service,openfoundry_code_repository_review_service,openfoundry_data_connector,openfoundry_fusion_service,openfoundry_geospatial_service,openfoundry_marketplace_service,openfoundry_ml_service,openfoundry_nexus_service,openfoundry_notification_service,openfoundry_report_service,openfoundry_event_streaming_service,openfoundry_workflow_automation_service"

  redis:
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --loglevel verbose

  nats:
    command: --jetstream --store_dir /data --http_port 8222 -DV

  minio:
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
