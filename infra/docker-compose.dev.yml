# Dev overrides — lighter resource limits, extra debugging
services:
  postgres:
    environment:
      POSTGRES_MULTIPLE_DATABASES: "openfoundry_auth,openfoundry_datasets,openfoundry_pipelines,openfoundry_ontology,openfoundry_audit"

  redis:
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --loglevel verbose

  nats:
    command: --jetstream --store_dir /data --http_port 8222 -DV

  minio:
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
