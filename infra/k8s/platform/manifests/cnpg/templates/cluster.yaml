{{- /*
  CloudNativePG `Cluster` template for OpenFoundry.

  Parametrizable base used by service-specific overlays/charts. Defaults
  are aligned with the rest of the data plane:

    * `instances`      = 3   — same replica count as Strimzi's KafkaNodePool
                              (`infra/k8s/platform/manifests/strimzi/kafka-cluster.yaml`).
    * `syncReplicas`   = 1   — at least one synchronous standby, matching
                              the durability stance of Kafka
                              (`min.insync.replicas=2`,
                              `unclean.leader.election.enable=false`).
    * `storageClass`   = ceph-rbd — same SC used by Kafka JBOD volumes
                              and by the existing CNPG `apicurio-pg`
                              `Cluster` (`infra/k8s/platform/manifests/strimzi/apicurio-registry.yaml`).
    * `storage.size`   = 50Gi — sane default for service catalogs; bump
                              per-service via values overrides.
    * `backup`         = barman-cloud to `s3://openfoundry-pg-backups/`
                              with one subdirectory per cluster name.

  The CloudNativePG operator (Apache-2.0) must be installed cluster-wide
  via `infra/k8s/platform/manifests/cnpg/operator/values.yaml` before any Cluster is applied.

  The template intentionally uses Helm Go-templating so it can be reused
  by service-specific umbrella charts (mirroring
  `infra/k8s/platform/manifests/cnpg/templates/cluster.yaml`).
  When applied stand-alone (e.g. `helm template ... | kubectl apply -f -`)
  the `default` pipelines below provide all required values.
*/ -}}
{{- $name := .Values.name | default "openfoundry-pg" -}}
{{- $namespace := .Values.namespace | default .Release.Namespace -}}
{{- $instances := int (.Values.instances | default 3) -}}
{{- $syncReplicas := int (.Values.syncReplicas | default 1) -}}
{{- $storageClass := .Values.storageClass | default "ceph-rbd" -}}
{{- $storage := .Values.storage | default dict -}}
{{- $bootstrap := .Values.bootstrap | default dict -}}
{{- $backup := .Values.backup | default dict -}}
{{- $storageSize := $storage.size | default "50Gi" -}}
{{- $imageName := .Values.imageName | default "ghcr.io/cloudnative-pg/postgresql:16.4" -}}
{{- $bootstrapDB := $bootstrap.database | default "app" -}}
{{- $bootstrapOwner := $bootstrap.owner | default "app" -}}
{{- $bootstrapSecret := $bootstrap.secretName | default (printf "%s-app" $name) -}}
{{- /* `default` cannot be used for booleans (false is falsy), so detect
       the key explicitly and treat "unset" as enabled. */ -}}
{{- $backupEnabled := true -}}
{{- if hasKey $backup "enabled" -}}
{{-   $backupEnabled = $backup.enabled -}}
{{- end -}}
{{- $backupBucket := $backup.destinationBucket | default "openfoundry-pg-backups" -}}
{{- $backupPath := $backup.destinationPath | default (printf "s3://%s/%s" $backupBucket $name) -}}
{{- $backupRetention := $backup.retentionPolicy | default "30d" -}}
{{- $backupSecret := $backup.s3CredentialsSecret | default (printf "%s-backup" $name) -}}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: postgres
    openfoundry.io/managed-by: cnpg
spec:
  instances: {{ $instances }}
  imageName: {{ $imageName | quote }}
  primaryUpdateStrategy: unsupervised

  # Durability: at least one synchronous standby acks every commit, so a
  # primary loss cannot lose data as long as one in-sync replica survives.
  minSyncReplicas: {{ $syncReplicas }}
  maxSyncReplicas: {{ $syncReplicas }}

  postgresql:
    parameters:
      # Mirror the "no silent data loss" stance from the Kafka cluster.
      synchronous_commit: "on"
      wal_level: "logical"
      max_wal_size: "2GB"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: {{ $bootstrapDB | quote }}
      owner: {{ $bootstrapOwner | quote }}
      secret:
        name: {{ $bootstrapSecret | quote }}

  storage:
    size: {{ $storageSize | quote }}
    storageClass: {{ $storageClass | quote }}

  {{- with .Values.resources }}
  resources:
{{ toYaml . | indent 4 }}
  {{- end }}

  # Spread instances across zones so a zonal outage cannot take down the
  # quorum (matches the Kafka topologySpreadConstraints).
  affinity:
    topologyKey: topology.kubernetes.io/zone
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred

  monitoring:
    enablePodMonitor: true

  {{- if $backupEnabled }}
  backup:
    retentionPolicy: {{ $backupRetention | quote }}
    barmanObjectStore:
      destinationPath: {{ $backupPath | quote }}
      {{- with $backup.endpointURL }}
      endpointURL: {{ . | quote }}
      {{- end }}
      s3Credentials:
        accessKeyId:
          name: {{ $backupSecret | quote }}
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: {{ $backupSecret | quote }}
          key: ACCESS_SECRET_KEY
        {{- with $backup.region }}
        region:
          name: {{ $backupSecret | quote }}
          key: REGION
        {{- end }}
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 2
  {{- end }}
