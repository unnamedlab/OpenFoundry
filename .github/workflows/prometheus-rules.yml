name: CI — Prometheus rules

on:
  push:
    branches: [main]
    paths:
      - "infra/observability/prometheus-rules/**"
      - ".github/workflows/prometheus-rules.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/observability/prometheus-rules/**"
      - ".github/workflows/prometheus-rules.yml"

permissions:
  contents: read

jobs:
  promtool:
    name: promtool check + test rules
    runs-on: ubuntu-latest
    env:
      PROMETHEUS_VERSION: "3.0.1"
    steps:
      - uses: actions/checkout@v6
      - name: Install promtool
        run: |
          set -euo pipefail
          curl -sSL --fail \
            "https://github.com/prometheus/prometheus/releases/download/v${PROMETHEUS_VERSION}/prometheus-${PROMETHEUS_VERSION}.linux-amd64.tar.gz" \
            -o /tmp/prometheus.tar.gz
          tar -xzf /tmp/prometheus.tar.gz -C /tmp
          sudo install -m 0755 \
            "/tmp/prometheus-${PROMETHEUS_VERSION}.linux-amd64/promtool" \
            /usr/local/bin/promtool
          promtool --version
      - name: Check rule syntax (all components)
        run: promtool check rules infra/observability/prometheus-rules/*.yaml
      - name: Run alert unit tests
        run: promtool test rules infra/observability/prometheus-rules/tests/*.yaml
