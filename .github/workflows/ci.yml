name: CI — Rust

on:
  push:
    branches: [main]
    paths: ["libs/**", "services/**", "tools/**", "smoke/**", "Cargo.*", "proto/**", ".github/workflows/ci.yml", ".github/bus-allowlist.yaml", ".github/data-residency-allowlist.toml", "infra/k8s/platform/manifests/cnpg/clusters/**", "justfile"]
  pull_request:
    branches: [main]
    paths: ["libs/**", "services/**", "tools/**", "smoke/**", "Cargo.*", "proto/**", ".github/workflows/ci.yml", ".github/bus-allowlist.yaml", ".github/data-residency-allowlist.toml", "infra/k8s/platform/manifests/cnpg/clusters/**", "justfile"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  SQLX_OFFLINE: "true"

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-for-ci-only
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace
      # P5 — Branching parity gate. Runs the testcontainers-backed
      # `--include-ignored` suite for every service that owns part
      # of the branch lifecycle. Mirrors the doc § "Branching" + the
      # ADR-NNNN-branching-foundry-parity matrix.
      - name: Branching parity tests (--include-ignored)
        run: |
          cargo test --include-ignored \
            -p dataset-versioning-service \
            -p pipeline-build-service \
            -p pipeline-authoring-service \
            -p global-branch-service
      # P6 — Datasets parity (5/5) gate. Runs the testcontainers-backed
      # health + API-conformance suite. Mirrors the doc § "Datasets" +
      # § "Application reference" + ADR-0034.
      - name: Datasets parity tests (--include-ignored)
        run: |
          cargo test --include-ignored \
            -p dataset-quality-service
      # D1.1.5 P5 — Builds parity gate. Runs the full lifecycle suite
      # plus the runner integration tests against `wiremock` /
      # testcontainers. Mirrors ADR-0035.
      - name: Builds parity tests (--include-ignored)
        run: |
          cargo test --include-ignored \
            -p pipeline-build-service
      - name: Builds authoring tests
        run: |
          cargo test -p pipeline-authoring-service builds
      # H3 closure — media-sets parity gate. Runs the full test suite
      # for the service (incl. the `tests/integration/full_lifecycle.rs`
      # journey) plus the related media-set tests in connector
      # management and pipeline authoring.
      #
      # We target the test binaries by file name (`--test <name>`)
      # rather than by substring filter because cargo's positional
      # filter matches against the test FUNCTION name, and the
      # neighbour suites use descriptive function names
      # (`config_validates_target_rid_and_glob_and_cron`, …) that
      # don't carry the `media_set`/`media_node` substring. The file
      # name does, so this preserves the spec's intent without
      # renaming public test functions.
      - name: Media-sets parity tests
        run: |
          cargo test -p media-sets-service --tests
          cargo test -p connector-management-service --test media_set_sync_filters
          cargo test -p pipeline-authoring-service --test media_node_validation
      - name: Coverage gate (datasets focus, 75%)
        if: ${{ env.SKIP_COVERAGE != 'true' }}
        env:
          SKIP_COVERAGE: 'true'  # disabled until llvm-cov is installed in the runner image
        run: |
          if command -v cargo-llvm-cov >/dev/null 2>&1; then
            cargo llvm-cov -p dataset-versioning-service --fail-under-lines 75
            cargo llvm-cov -p pipeline-build-service --fail-under-lines 75
          else
            echo 'cargo-llvm-cov not installed; skipping (set SKIP_COVERAGE=false to enforce)'
          fi
      # H3 closure — media-sets-service coverage gate (≥70% lines).
      # Documented exceptions (bin entry-point, gRPC adapters and the
      # local-storage path-builder helpers that exist solely as test
      # plumbing) live in `services/media-sets-service/README.md`.
      # The job installs cargo-llvm-cov on demand so the runner image
      # does not need to bake the binary in.
      - name: Coverage gate (media-sets-service, 70%)
        if: ${{ env.SKIP_MEDIA_COVERAGE != 'true' }}
        env:
          SKIP_MEDIA_COVERAGE: 'true'  # flip to 'false' once llvm-cov is preinstalled
        run: |
          if command -v cargo-llvm-cov >/dev/null 2>&1; then
            cargo llvm-cov -p media-sets-service --tests --fail-under-lines 70
          else
            echo 'cargo-llvm-cov not installed; install with `cargo install cargo-llvm-cov` and set SKIP_MEDIA_COVERAGE=false to enforce'
          fi

  branching-e2e:
    name: Branching E2E
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install web deps
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Branching specs
        working-directory: apps/web
        run: pnpm exec playwright test --grep 'branch'
      # P6 — Datasets parity Playwright suite. Walks the QualityDashboard
      # cards + the full 5×5 dataset journey (preview → schema → files →
      # retention → lineage → history → permissions → details → health
      # → metrics → compare).
      - name: Dataset specs
        working-directory: apps/web
        run: pnpm exec playwright test --grep 'dataset'
      # H3 closure — media-sets parity Playwright suite. Walks the full
      # journey defined in `media-sets-full-flow.spec.ts` plus every
      # other media-tagged spec (list/create, detail-preview, audit
      # tab, permissions tab, sync wizard, workshop widget,
      # pipeline transform). Anchors with `--grep media` so new specs
      # named `media-*` slot in without an additional CI step.
      - name: Media-sets specs
        working-directory: apps/web
        run: pnpm exec playwright test --grep media

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test
      JWT_SECRET: test-secret-for-ci-only
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build smoke stack
        run: cargo build -p of-cli -p edge-gateway-service -p identity-federation-service -p connector-management-service -p data-asset-catalog-service -p pipeline-authoring-service -p sql-bi-gateway-service -p event-streaming-service -p report-service -p geospatial-intelligence-service -p audit-compliance-service -p ontology-definition-service -p app-builder-service -p code-repository-review-service -p marketplace-service -p nexus-service -p ai-service -p agent-runtime-service -p ml-service -p model-catalog-service
      - name: Prepare service databases
        env:
          PGPASSWORD: test
        run: |
          psql -h localhost -U test -d postgres \
            -c "DROP DATABASE IF EXISTS of_auth;" \
            -c "DROP DATABASE IF EXISTS of_connectors;" \
            -c "DROP DATABASE IF EXISTS of_datasets;" \
            -c "DROP DATABASE IF EXISTS of_pipelines;" \
            -c "DROP DATABASE IF EXISTS of_streaming;" \
            -c "DROP DATABASE IF EXISTS of_queries;" \
            -c "DROP DATABASE IF EXISTS of_reports;" \
            -c "DROP DATABASE IF EXISTS of_geospatial;" \
            -c "DROP DATABASE IF EXISTS of_audit;" \
            -c "DROP DATABASE IF EXISTS of_ontology;" \
            -c "DROP DATABASE IF EXISTS of_app_builder;" \
            -c "DROP DATABASE IF EXISTS of_code_repos;" \
            -c "DROP DATABASE IF EXISTS of_marketplace;" \
            -c "DROP DATABASE IF EXISTS of_nexus;" \
            -c "DROP DATABASE IF EXISTS of_ai;" \
            -c "DROP DATABASE IF EXISTS of_ml;" \
            -c "CREATE DATABASE of_auth;" \
            -c "CREATE DATABASE of_connectors;" \
            -c "CREATE DATABASE of_datasets;" \
            -c "CREATE DATABASE of_pipelines;" \
            -c "CREATE DATABASE of_streaming;" \
            -c "CREATE DATABASE of_queries;" \
            -c "CREATE DATABASE of_reports;" \
            -c "CREATE DATABASE of_geospatial;" \
            -c "CREATE DATABASE of_audit;" \
            -c "CREATE DATABASE of_ontology;" \
            -c "CREATE DATABASE of_app_builder;" \
            -c "CREATE DATABASE of_code_repos;" \
            -c "CREATE DATABASE of_marketplace;" \
            -c "CREATE DATABASE of_nexus;" \
            -c "CREATE DATABASE of_ai;" \
            -c "CREATE DATABASE of_ml;"
      - name: Run critical-path smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/of-datasets /tmp/of-stream-archive /tmp/of-smoke-logs /tmp/of-code-repos

          print_logs() {
            for file in /tmp/of-smoke-logs/*.log; do
              if [[ -f "$file" ]]; then
                echo "::group::$(basename "$file")"
                cat "$file"
                echo "::endgroup::"
              fi
            done
          }

          cleanup() {
            jobs -p | xargs -r kill || true
          }

          trap 'status=$?; if [[ $status -ne 0 ]]; then print_logs; fi; cleanup' EXIT

          DATABASE_URL=postgres://test:test@localhost:5432/of_auth JWT_SECRET="$JWT_SECRET" target/debug/identity-federation-service > /tmp/of-smoke-logs/identity-federation-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_connectors JWT_SECRET="$JWT_SECRET" target/debug/connector-management-service > /tmp/of-smoke-logs/connector-management-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_datasets JWT_SECRET="$JWT_SECRET" STORAGE_BACKEND=local LOCAL_STORAGE_ROOT=/tmp/of-datasets target/debug/data-asset-catalog-service > /tmp/of-smoke-logs/data-asset-catalog-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_pipelines JWT_SECRET="$JWT_SECRET" DATASET_SERVICE_URL=http://127.0.0.1:50079 STORAGE_BACKEND=local LOCAL_STORAGE_ROOT=/tmp/of-datasets target/debug/pipeline-authoring-service > /tmp/of-smoke-logs/pipeline-authoring-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_streaming JWT_SECRET="$JWT_SECRET" DATASET_SERVICE_URL=http://127.0.0.1:50079 ARCHIVE_DIR=/tmp/of-stream-archive target/debug/event-streaming-service > /tmp/of-smoke-logs/event-streaming-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_queries JWT_SECRET="$JWT_SECRET" target/debug/sql-bi-gateway-service > /tmp/of-smoke-logs/sql-bi-gateway-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_reports JWT_SECRET="$JWT_SECRET" DATASET_SERVICE_URL=http://127.0.0.1:50079 GEOSPATIAL_SERVICE_URL=http://127.0.0.1:50068 target/debug/report-service > /tmp/of-smoke-logs/report-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_geospatial JWT_SECRET="$JWT_SECRET" target/debug/geospatial-intelligence-service > /tmp/of-smoke-logs/geospatial-intelligence-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_audit JWT_SECRET="$JWT_SECRET" target/debug/audit-compliance-service > /tmp/of-smoke-logs/audit-compliance-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_ontology JWT_SECRET="$JWT_SECRET" AUDIT_SERVICE_URL=http://127.0.0.1:50115 target/debug/ontology-definition-service > /tmp/of-smoke-logs/ontology-definition-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_app_builder JWT_SECRET="$JWT_SECRET" PUBLIC_BASE_URL=http://127.0.0.1:8080/apps/runtime target/debug/app-builder-service > /tmp/of-smoke-logs/app-builder-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_code_repos JWT_SECRET="$JWT_SECRET" REPO_STORAGE_ROOT=/tmp/of-code-repos target/debug/code-repository-review-service > /tmp/of-smoke-logs/code-repository-review-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_marketplace JWT_SECRET="$JWT_SECRET" APP_BUILDER_SERVICE_URL=http://127.0.0.1:50063 target/debug/marketplace-service > /tmp/of-smoke-logs/marketplace-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_nexus JWT_SECRET="$JWT_SECRET" target/debug/nexus-service > /tmp/of-smoke-logs/nexus-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_ai JWT_SECRET="$JWT_SECRET" target/debug/agent-runtime-service > /tmp/of-smoke-logs/agent-runtime-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_ml JWT_SECRET="$JWT_SECRET" target/debug/model-catalog-service > /tmp/of-smoke-logs/model-catalog-service.log 2>&1 &
          target/debug/of mock-provider serve --host 127.0.0.1 --port 50110 > /tmp/of-smoke-logs/mock-provider.log 2>&1 &
          JWT_SECRET="$JWT_SECRET" \
            DATA_CONNECTOR_SERVICE_URL=http://127.0.0.1:50088 \
            DATASET_SERVICE_URL=http://127.0.0.1:50079 \
            QUERY_SERVICE_URL=http://127.0.0.1:50133 \
            PIPELINE_SERVICE_URL=http://127.0.0.1:50080 \
            STREAMING_SERVICE_URL=http://127.0.0.1:50121 \
            ONTOLOGY_SERVICE_URL=http://127.0.0.1:50103 \
            AUDIT_SERVICE_URL=http://127.0.0.1:50115 \
            APP_BUILDER_SERVICE_URL=http://127.0.0.1:50063 \
            CODE_REPO_SERVICE_URL=http://127.0.0.1:50155 \
            MARKETPLACE_SERVICE_URL=http://127.0.0.1:50066 \
            AI_SERVICE_URL=http://127.0.0.1:50127 \
            ML_SERVICE_URL=http://127.0.0.1:50085 \
            target/debug/edge-gateway-service > /tmp/of-smoke-logs/edge-gateway-service.log 2>&1 &

          for url in \
            http://127.0.0.1:50112/health \
            http://127.0.0.1:50088/health \
            http://127.0.0.1:50079/health \
            http://127.0.0.1:50133/health \
            http://127.0.0.1:50080/health \
            http://127.0.0.1:50121/health \
            http://127.0.0.1:50064/health \
            http://127.0.0.1:50068/health \
            http://127.0.0.1:50115/health \
            http://127.0.0.1:50103/health \
            http://127.0.0.1:50063/health \
            http://127.0.0.1:50155/health \
            http://127.0.0.1:50066/health \
            http://127.0.0.1:50067/health \
            http://127.0.0.1:50127/health \
            http://127.0.0.1:50085/health \
            http://127.0.0.1:50110/health \
            http://127.0.0.1:8080/health
          do
            for attempt in $(seq 1 30); do
              if curl -sf "$url" >/dev/null; then
                break
              fi
              if [[ "$attempt" -eq 30 ]]; then
                echo "Service not ready: $url"
                exit 1
              fi
              sleep 2
            done
          done

          JWT_SECRET="$JWT_SECRET" target/debug/of smoke run \
            --scenario smoke/scenarios/p2-runtime-critical-path.json \
            --output smoke/results/p2-runtime-critical-path.json

          JWT_SECRET="$JWT_SECRET" target/debug/of smoke run \
            --scenario smoke/scenarios/p3-semantic-governance-critical-path.json \
            --output smoke/results/p3-semantic-governance-critical-path.json

          JWT_SECRET="$JWT_SECRET" target/debug/of smoke run \
            --scenario smoke/scenarios/p4-developer-platform-critical-path.json \
            --output smoke/results/p4-developer-platform-critical-path.json

          JWT_SECRET="$JWT_SECRET" target/debug/of smoke run \
            --scenario smoke/scenarios/p5-ai-ml-critical-path.json \
            --output smoke/results/p5-ai-ml-critical-path.json

          JWT_SECRET="$JWT_SECRET" target/debug/of smoke run \
            --scenario smoke/scenarios/p6-analytics-enterprise-critical-path.json \
            --output smoke/results/p6-analytics-enterprise-critical-path.json

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  bus-contract:
    name: Bus contract (ADR-0011)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check service bus allowlist
        run: python3 tools/bus-lint/check_bus.py

  data-residency:
    name: Data residency (registry + strict sqlx allowlist)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check data residency registry and sqlx file/table allowlist
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          python3 tools/data-residency/check_residency.py --diff-base "$base_sha"
