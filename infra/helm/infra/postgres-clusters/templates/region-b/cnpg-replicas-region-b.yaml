apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-lakekeeper-replica
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: pg-lakekeeper-replica
    openfoundry.io/managed-by: cnpg
    openfoundry.io/cluster-role: lakekeeper-catalog-replica
    openfoundry.io/dr-role: standby
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  replica:
    enabled: true
    source: pg-lakekeeper-primary
  postgresql:
    parameters:
      hot_standby: "on"
      wal_level: "replica"
      shared_buffers: "512MB"
      max_connections: "200"
  bootstrap:
    pg_basebackup:
      source: pg-lakekeeper-primary
  externalClusters:
    - name: pg-lakekeeper-primary
      connectionParameters:
        host: pg-lakekeeper-rw.openfoundry-region-a.svc.openfoundry.example.com
        user: streaming_replica
        dbname: lakekeeper
        port: "5432"
        sslmode: verify-full
      sslCert:     { name: pg-lakekeeper-replica-superuser, key: tls.crt }
      sslKey:      { name: pg-lakekeeper-replica-superuser, key: tls.key }
      sslRootCert: { name: pg-lakekeeper-replica-superuser, key: ca.crt }
      password:    { name: pg-lakekeeper-replica-superuser, key: password }
  storage: { size: 50Gi, storageClass: ceph-rbd }
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "2",  memory: 4Gi }
  affinity:
    topologyKey: topology.kubernetes.io/zone
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred
  monitoring:
    enablePodMonitor: true
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://openfoundry-pg-backups/region-b/pg-lakekeeper"
      endpointURL: "http://rook-ceph-rgw-openfoundry-store.rook-ceph.svc:80"
      s3Credentials:
        accessKeyId:     { name: pg-lakekeeper-backup, key: ACCESS_KEY_ID }
        secretAccessKey: { name: pg-lakekeeper-backup, key: ACCESS_SECRET_KEY }
      wal:  { compression: gzip, maxParallel: 4 }
      data: { compression: gzip, jobs: 2 }
{{- end }}
