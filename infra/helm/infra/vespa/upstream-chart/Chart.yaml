apiVersion: v2
name: vespa
description: |
  Vespa.ai (Apache-2.0) hybrid search engine for OpenFoundry.

  Deploys an HA Vespa cluster on Kubernetes:
    * 3 config-server StatefulSet nodes (PDB minAvailable=2)
    * 2 stateless container nodes (query + feed)
    * 3 stateful content nodes (redundancy=2, PDB minAvailable=2)
    * Application package shipped as a ConfigMap and (re-)deployed by
      a Job that fires on every change of the package checksum.
    * Per-pod PVCs on Ceph RBD (configurable storageClassName).
type: application
version: 0.1.0
appVersion: "8.450.40"
keywords:
  - vespa
  - search
  - hybrid-search
  - vector-search
  - openfoundry
sources:
  - https://github.com/vespa-engine/vespa
