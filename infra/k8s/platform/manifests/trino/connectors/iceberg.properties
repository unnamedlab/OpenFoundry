# S5.6.c — Iceberg connector pinned to Lakekeeper REST catalog.
#
# Mirror of the inline `additionalCatalogs.iceberg` block in
# values.yaml. Kept here as a stand-alone file so that operators can
# `kubectl create configmap trino-iceberg-catalog --from-file` if a
# chart upgrade ever drops the inline knob.
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://lakekeeper.lakekeeper.svc:8181
iceberg.rest-catalog.warehouse=openfoundry-iceberg
iceberg.file-format=PARQUET
iceberg.compression-codec=ZSTD

# Object storage — Ceph RGW, S3-compatible.
fs.native-s3.enabled=true
s3.endpoint=http://rook-ceph-rgw-openfoundry-store.rook-ceph.svc:80
s3.path-style-access=true
s3.region=us-east-1

# Limit how aggressively Trino rewrites — leave compaction to the
# nightly Spark job (`infra/k8s/platform/manifests/spark-jobs/iceberg-rewrite-data-files.yaml`).
iceberg.target-max-file-size=256MB
iceberg.unique-table-location=true
