# Defaults shipped inside the container image.
# Override per-environment via CONFIG_FILE or OF_* env vars.

service:
  name: network-boundary-service
  version: 0.1.0

server:
  addr: ":8080"
  shutdown_timeout: 15s

jwt:
  # In production the secret comes from a Kubernetes Secret mounted
  # as OF_JWT__SECRET, never from this file.
  secret: ""
  issuer: "https://auth.openfoundry.local"
  audience: "openfoundry"

telemetry:
  # When OTEL_TRACES_EXPORTER=none is set, tracing is disabled.
  otlp_endpoint: "localhost:4317"
  log_format: "plain"

database:
  # DATABASE_URL / DATABASE_READ_URL env override these blanks. The
  # service falls back to an in-memory store when no DSN is configured
  # so local dev works without Postgres; production overlays always
  # inject DATABASE_URL via Helm envSecrets.
  url: ""
  read_url: ""
