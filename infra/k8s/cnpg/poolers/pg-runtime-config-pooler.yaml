---
# S6.2 — PgBouncer Pooler for `pg-runtime-config` (transaction mode).
# See `pg-schemas-pooler.yaml` for the design rationale shared by all
# Poolers. Same shape, different cluster reference.
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pg-runtime-config-pooler
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: pg-runtime-config
    openfoundry.io/managed-by: cnpg
spec:
  cluster:
    name: pg-runtime-config
  instances: 3
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1500"
      default_pool_size: "50"
      reserve_pool_size: "10"
      reserve_pool_timeout: "5"
      server_idle_timeout: "120"
      server_lifetime: "3600"
      query_wait_timeout: "30"
  monitoring:
    enablePodMonitor: true
  template:
    spec:
      containers: []
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: topology.kubernetes.io/zone
                labelSelector:
                  matchLabels:
                    cnpg.io/poolerName: pg-runtime-config-pooler
