x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-app-common: &app-common
  <<: *common
  profiles: ["app"]

# Cumulative rollout profiles:
# foundation -> data -> knowledge -> intelligence -> experience -> edge
# Each later profile includes all earlier application services.
x-profiles-foundation: &profiles-foundation ["app", "foundation", "data", "knowledge", "intelligence", "experience", "edge"]
x-profiles-data: &profiles-data ["app", "data", "knowledge", "intelligence", "experience", "edge"]
x-profiles-knowledge: &profiles-knowledge ["app", "knowledge", "intelligence", "experience", "edge"]
x-profiles-intelligence: &profiles-intelligence ["app", "intelligence", "experience", "edge"]
x-profiles-experience: &profiles-experience ["app", "experience", "edge"]
x-profiles-edge: &profiles-edge ["app", "edge"]

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    <<: *common
    image: ${OPENFOUNDRY_POSTGRES_IMAGE:-postgres:16-alpine}
    ports:
      - "${OPENFOUNDRY_POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: openfoundry
      POSTGRES_PASSWORD: openfoundry
      POSTGRES_DB: openfoundry
      # Comma-separated extra databases created by ./local/postgres-init/01-create-databases.sh.
      # Override (extend) in `docker-compose.dev.yml` for full per-service split.
      # `pg_policy` is included by default because the transactional outbox
      # (ADR-0022) lives in `pg_policy.outbox.events` and is mirrored to Kafka
      # by the Debezium Connect service below.
      POSTGRES_MULTIPLE_DATABASES: ${OPENFOUNDRY_POSTGRES_EXTRA_DATABASES:-pg_policy}
    # WAL logical decoding is required by the Debezium Postgres connector
    # (ADR-0022). `max_replication_slots`/`max_wal_senders` are sized for
    # one Debezium task per logical DB plus headroom; bump if you add more.
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./local/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfoundry"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Valkey (OSS Redis-compatible store, BSD-3) ─────────────
  valkey:
    <<: *common
    image: ${OPENFOUNDRY_VALKEY_IMAGE:-valkey/valkey:8-alpine}
    ports:
      - "${OPENFOUNDRY_REDIS_HOST_PORT:-6379}:6379"
    command: valkey-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NATS (JetStream) ───────────────────────────────────────
  nats:
    <<: *common
    image: ${OPENFOUNDRY_NATS_IMAGE:-nats:2-alpine}
    ports:
      - "${OPENFOUNDRY_NATS_HOST_PORT:-4222}:4222"
      - "${OPENFOUNDRY_NATS_MONITOR_HOST_PORT:-8222}:8222"
    command: --jetstream --store_dir /data --http_port 8222
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible) ──────────────────────────────────
  minio:
    <<: *common
    image: ${OPENFOUNDRY_MINIO_IMAGE:-minio/minio:latest}
    ports:
      - "${OPENFOUNDRY_MINIO_API_HOST_PORT:-9000}:9000"
      - "${OPENFOUNDRY_MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: ${OPENFOUNDRY_MINIO_MC_IMAGE:-minio/mc:latest}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/openfoundry &&
      mc mb --ignore-existing local/openfoundry-datasets &&
      mc mb --ignore-existing local/openfoundry-notebooks &&
      mc mb --ignore-existing local/openfoundry-artifacts
      "

  # ── Vespa Lite (DX search engine, Apache-2.0) ──────────────
  # Single-node container of the same Vespa engine that runs in production
  # (see infra/runbooks/vespa.md and docs/architecture/adr/ADR-0007-search-engine-choice.md).
  # Exposes the config server on 19071 (deploy endpoint) and the container
  # cluster on 8080 (query/feed); the latter is remapped to host port
  # ${OPENFOUNDRY_VESPA_QUERY_HOST_PORT:-18080} to avoid clashing with the
  # API gateway. Use this for hybrid (BM25 + vector + filters + ranking)
  # search during local development; pgvector still covers the embedded
  # vector case.
  #
  # Meilisearch is no longer part of the default DX stack; it lives under
  # the optional `--profile demo` in infra/docker-compose.dev.yml for
  # first-run demos only (no production code or test depends on it).
  vespa:
    <<: *common
    image: ${OPENFOUNDRY_VESPA_IMAGE:-vespaengine/vespa:8.450.30}
    hostname: vespa
    ports:
      - "${OPENFOUNDRY_VESPA_QUERY_HOST_PORT:-18080}:8080"
      - "${OPENFOUNDRY_VESPA_CONFIG_HOST_PORT:-19071}:19071"
    volumes:
      - vespa_data:/opt/vespa/var
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:19071/state/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # Qdrant se retiró por restricción de licencia OSS; fue sustituido por
  # Vespa (Apache-2.0). pgvector cubre el caso embebido.

  # ── Cassandra 5 (single-node DX) ────────────────────────
  # Single-node Cassandra 5 for local development. Production runs the
  # full 3-DC × 3-rack × RF=3 layout via k8ssandra-operator (see
  # `infra/k8s/platform/manifests/cassandra/` and `infra/runbooks/cassandra.md`); here we
  # use one node with `SimpleSnitch`-grade overrides because dev work
  # never validates replica placement.
  cassandra:
    <<: *common
    image: ${OPENFOUNDRY_CASSANDRA_IMAGE:-cassandra:5.0}
    hostname: cassandra
    ports:
      - "${OPENFOUNDRY_CASSANDRA_HOST_PORT:-9042}:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: of-dev
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 1G
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Init container that creates the 6 application keyspaces with RF=1.
  # Mirrors `infra/helm/infra/cassandra-cluster/templates/keyspaces-job.yaml`
  # but with RF=1 since this is a single-node dev cluster. The
  # `temporal_persistence` / `temporal_visibility` keyspaces that
  # used to be auto-bootstrapped by the Temporal devserver are
  # not created — Temporal was retired in FASE 9 of the
  # Foundry-pattern migration (ADR-0037).
  cassandra-init:
    image: ${OPENFOUNDRY_CASSANDRA_IMAGE:-cassandra:5.0}
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        cqlsh cassandra 9042 -e "
          CREATE KEYSPACE IF NOT EXISTS ontology_objects     WITH replication = {'class':'NetworkTopologyStrategy','dc1':'1'};
          CREATE KEYSPACE IF NOT EXISTS ontology_indexes     WITH replication = {'class':'NetworkTopologyStrategy','dc1':'1'};
          CREATE KEYSPACE IF NOT EXISTS actions_log          WITH replication = {'class':'NetworkTopologyStrategy','dc1':'1'};
          CREATE KEYSPACE IF NOT EXISTS auth_runtime         WITH replication = {'class':'NetworkTopologyStrategy','dc1':'1'};
          CREATE KEYSPACE IF NOT EXISTS notifications_inbox  WITH replication = {'class':'NetworkTopologyStrategy','dc1':'1'};
          CREATE KEYSPACE IF NOT EXISTS agent_state          WITH replication = {'class':'NetworkTopologyStrategy','dc1':'1'};
          DESCRIBE KEYSPACES;
        "
    restart: "no"

  # ── Temporal (retired) ─────────────────────────────────
  # Removed by FASE 9 / Tarea 9.1 of the Foundry-pattern migration
  # (ADR-0037). The dev compose stack no longer boots a Temporal
  # frontend or UI; the substrate that replaced it lives in the
  # Rust services (state machines + outbox + Kafka consumers).

  # ── OpenSearch (dev/CI search backend) ────────────────────
  # Per ADR-0028, OpenSearch is the dev / CI fallback for the Vespa
  # production search backend. Single-node, security plugin disabled,
  # heap capped at ~512 MB so the whole compose stack still fits in
  # ~6–7 GB on a developer laptop.
  opensearch:
    <<: *common
    image: ${OPENFOUNDRY_OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.18.0}
    hostname: opensearch
    ports:
      - "${OPENFOUNDRY_OPENSEARCH_HOST_PORT:-9200}:9200"
      - "${OPENFOUNDRY_OPENSEARCH_PERF_HOST_PORT:-9600}:9600"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ── Kafka (KRaft, single-broker) ───────────────────────
  # Required by Debezium Connect to publish CDC events from the
  # `pg_policy.outbox.events` table (ADR-0022). KRaft mode (no
  # ZooKeeper) keeps the dev footprint to a single container.
  kafka:
    <<: *common
    image: ${OPENFOUNDRY_KAFKA_IMAGE:-apache/kafka:3.7.1}
    hostname: kafka
    ports:
      - "${OPENFOUNDRY_KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: ${OPENFOUNDRY_KAFKA_CLUSTER_ID:-of-dev-kafka-cluster-1}
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ── Debezium Kafka Connect (Postgres CDC) ─────────────────
  # Implements the relay side of ADR-0022 (Postgres outbox → Kafka).
  # The connector itself is registered by `debezium-connect-init`
  # below so this container stays a vanilla Kafka Connect distribution
  # whose lifecycle does not depend on the connector definition.
  debezium-connect:
    <<: *common
    image: ${OPENFOUNDRY_DEBEZIUM_IMAGE:-debezium/connect:2.7}
    ports:
      - "${OPENFOUNDRY_DEBEZIUM_HOST_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: of-debezium-connect
      CONFIG_STORAGE_TOPIC: of_connect_configs
      OFFSET_STORAGE_TOPIC: of_connect_offsets
      STATUS_STORAGE_TOPIC: of_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Registers the `pg_policy.outbox.events` Debezium connector once
  # Connect is up. Idempotent: `PUT` against `/connectors/<name>/config`
  # creates or updates the connector. The `publication.autocreate.mode`
  # is `filtered` so Debezium only creates a publication for the table
  # we actually CDC.
  #
  # The `transforms.outbox.*` block wires the Debezium **EventRouter**
  # SMT (S0.9.c): each WAL record is converted into a Kafka message
  # whose topic is taken from the `topic` column, whose key is the
  # `aggregate_id`, and whose headers are populated from the `headers`
  # JSONB column (notably the `ol-*` OpenLineage trio). The producer
  # side deletes the row inside the same transaction
  # (`libs/outbox/src/lib.rs::enqueue`); the EventRouter only emits on
  # INSERT so the downstream Kafka topic stays clean and the table
  # stays empty without a janitor — this is the canonical Debezium
  # outbox pattern. The plan refers to this behaviour as
  # `outbox.event.deletion.policy=delete`; that exact key is not part
  # of the upstream connector schema, the in-transaction DELETE is the
  # operative mechanism.
  debezium-connect-init:
    image: curlimages/curl:8.10.1
    depends_on:
      debezium-connect:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo "Registering Debezium connector pg-policy-outbox…"
        curl -fsS -X PUT \
          -H 'Content-Type: application/json' \
          --data '{
            "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
            "tasks.max": "1",
            "database.hostname": "postgres",
            "database.port": "5432",
            "database.user": "openfoundry",
            "database.password": "openfoundry",
            "database.dbname": "pg_policy",
            "topic.prefix": "openfoundry.pg_policy",
            "table.include.list": "outbox.events",
            "plugin.name": "pgoutput",
            "slot.name": "of_outbox_slot",
            "publication.name": "of_outbox_pub",
            "publication.autocreate.mode": "filtered",
            "snapshot.mode": "initial",
            "tombstones.on.delete": "false",
            "key.converter": "org.apache.kafka.connect.json.JsonConverter",
            "value.converter": "org.apache.kafka.connect.json.JsonConverter",
            "key.converter.schemas.enable": "false",
            "value.converter.schemas.enable": "false",
            "transforms": "outbox",
            "transforms.outbox.type": "io.debezium.transforms.outbox.EventRouter",
            "transforms.outbox.table.field.event.id": "event_id",
            "transforms.outbox.table.field.event.key": "aggregate_id",
            "transforms.outbox.table.field.event.payload": "payload",
            "transforms.outbox.table.field.event.timestamp": "created_at",
            "transforms.outbox.table.expand.json.payload": "true",
            "transforms.outbox.route.by.field": "topic",
            "transforms.outbox.route.topic.replacement": "${routedByValue}",
            "transforms.outbox.table.fields.additional.placement": "aggregate:header:aggregateType,event_id:header:id",
            "transforms.outbox.headers.json.fields.placement": "headers"
          }' \
          http://debezium-connect:8083/connectors/pg-policy-outbox/config
        echo "Registering Debezium connector event-streaming-outbox…"
        curl -fsS -X PUT \
          -H 'Content-Type: application/json' \
          --data '{
            "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
            "tasks.max": "1",
            "database.hostname": "postgres",
            "database.port": "5432",
            "database.user": "openfoundry",
            "database.password": "openfoundry",
            "database.dbname": "openfoundry_event_streaming_service",
            "topic.prefix": "openfoundry.event_streaming",
            "table.include.list": "outbox.events",
            "plugin.name": "pgoutput",
            "slot.name": "of_event_streaming_outbox_slot",
            "publication.name": "of_event_streaming_outbox_pub",
            "publication.autocreate.mode": "filtered",
            "snapshot.mode": "initial",
            "tombstones.on.delete": "false",
            "key.converter": "org.apache.kafka.connect.json.JsonConverter",
            "value.converter": "org.apache.kafka.connect.json.JsonConverter",
            "key.converter.schemas.enable": "false",
            "value.converter.schemas.enable": "false",
            "transforms": "outbox",
            "transforms.outbox.type": "io.debezium.transforms.outbox.EventRouter",
            "transforms.outbox.table.field.event.id": "event_id",
            "transforms.outbox.table.field.event.key": "aggregate_id",
            "transforms.outbox.table.field.event.payload": "payload",
            "transforms.outbox.table.field.event.timestamp": "created_at",
            "transforms.outbox.table.expand.json.payload": "true",
            "transforms.outbox.route.by.field": "topic",
            "transforms.outbox.route.topic.replacement": "${routedByValue}",
            "transforms.outbox.table.fields.additional.placement": "aggregate:header:aggregateType,event_id:header:id",
            "transforms.outbox.headers.json.fields.placement": "headers"
          }' \
          http://debezium-connect:8083/connectors/event-streaming-outbox/config
        echo "Registering Debezium connector connector-management-outbox…"
        curl -fsS -X PUT \
          -H 'Content-Type: application/json' \
          --data '{
            "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
            "tasks.max": "1",
            "database.hostname": "postgres",
            "database.port": "5432",
            "database.user": "openfoundry",
            "database.password": "openfoundry",
            "database.dbname": "openfoundry_data_connector",
            "topic.prefix": "openfoundry.data_connector",
            "table.include.list": "outbox.events",
            "plugin.name": "pgoutput",
            "slot.name": "of_connector_management_outbox_slot",
            "publication.name": "of_connector_management_outbox_pub",
            "publication.autocreate.mode": "filtered",
            "snapshot.mode": "initial",
            "tombstones.on.delete": "false",
            "key.converter": "org.apache.kafka.connect.json.JsonConverter",
            "value.converter": "org.apache.kafka.connect.json.JsonConverter",
            "key.converter.schemas.enable": "false",
            "value.converter.schemas.enable": "false",
            "transforms": "outbox",
            "transforms.outbox.type": "io.debezium.transforms.outbox.EventRouter",
            "transforms.outbox.table.field.event.id": "event_id",
            "transforms.outbox.table.field.event.key": "aggregate_id",
            "transforms.outbox.table.field.event.payload": "payload",
            "transforms.outbox.table.field.event.timestamp": "created_at",
            "transforms.outbox.table.expand.json.payload": "true",
            "transforms.outbox.route.by.field": "topic",
            "transforms.outbox.route.topic.replacement": "${routedByValue}",
            "transforms.outbox.table.fields.additional.placement": "aggregate:header:aggregateType,event_id:header:id",
            "transforms.outbox.headers.json.fields.placement": "headers"
          }' \
          http://debezium-connect:8083/connectors/connector-management-outbox/config
        echo "Done."

  # ── Apicurio Registry (Schema Registry) ────────────────────
  # ADR-0022 §3.6 — schemas of every event published through the
  # outbox are registered in Apicurio (group `openfoundry`,
  # artifact id = Kafka topic). In dev we run the in-memory variant
  # (`apicurio/apicurio-registry-mem:2.6`) so the registry has zero
  # external dependencies; production uses the same image with the
  # Postgres backend (`apicurio-pg`, see infra/runbooks/kafka.md).
  # The connector still publishes JSON values today so this service
  # is consumed only by producers/consumers that need a schema
  # contract — switching `value.converter` to the Apicurio Avro
  # converter is a follow-up that does not block S0.9.
  apicurio-registry:
    <<: *common
    image: ${OPENFOUNDRY_APICURIO_IMAGE:-apicurio/apicurio-registry-mem:2.6.4.Final}
    ports:
      - "${OPENFOUNDRY_APICURIO_HOST_PORT:-8087}:8080"
    environment:
      QUARKUS_PROFILE: prod
      REGISTRY_AUTH_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  # Registers the JSON Schemas for the outbox event envelope and a
  # representative payload (`ontology.object.changed.v1`) so consumers
  # can validate against a stable contract from day one. Idempotent:
  # `PUT /artifacts/{id}` with `X-Registry-ArtifactId` upserts.
  apicurio-registry-init:
    image: curlimages/curl:8.10.1
    depends_on:
      apicurio-registry:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        BASE='http://apicurio-registry:8080/apis/registry/v2/groups/openfoundry/artifacts'
        echo "Registering outbox.event.envelope.v1 …"
        curl -fsS -X POST \
          -H 'Content-Type: application/json' \
          -H 'X-Registry-ArtifactId: outbox.event.envelope.v1' \
          -H 'X-Registry-ArtifactType: JSON' \
          --data '{
            "$schema": "http://json-schema.org/draft-07/schema#",
            "title": "OutboxEventEnvelope",
            "type": "object",
            "required": ["event_id", "aggregate", "aggregate_id", "topic", "payload"],
            "properties": {
              "event_id":     {"type": "string", "format": "uuid"},
              "aggregate":    {"type": "string"},
              "aggregate_id": {"type": "string"},
              "topic":        {"type": "string"},
              "payload":      {"type": "object"},
              "headers":      {"type": "object", "additionalProperties": {"type": "string"}}
            }
          }' \
          "$BASE?ifExists=RETURN_OR_UPDATE" >/dev/null
        echo "Registering ontology.object.changed.v1 payload schema …"
        curl -fsS -X POST \
          -H 'Content-Type: application/json' \
          -H 'X-Registry-ArtifactId: ontology.object.changed.v1' \
          -H 'X-Registry-ArtifactType: JSON' \
          --data '{
            "$schema": "http://json-schema.org/draft-07/schema#",
            "title": "OntologyObjectChangedV1",
            "type": "object",
            "required": ["tenant", "type_id", "object_id", "version"],
            "properties": {
              "tenant":    {"type": "string"},
              "type_id":   {"type": "string"},
              "object_id": {"type": "string"},
              "version":   {"type": "integer", "minimum": 0}
            }
          }' \
          "$BASE?ifExists=RETURN_OR_UPDATE" >/dev/null
        echo "Registering dataset.streaming.changed.v1 payload schema …"
        curl -fsS -X POST \
          -H 'Content-Type: application/json' \
          -H 'X-Registry-ArtifactId: dataset.streaming.changed.v1' \
          -H 'X-Registry-ArtifactType: JSON' \
          --data '{
            "$schema": "http://json-schema.org/draft-07/schema#",
            "title": "DatasetStreamingChangedV1",
            "type": "object",
            "required": ["event_type", "aggregate", "aggregate_id", "version", "occurred_at", "payload"],
            "properties": {
              "event_type":   {"type": "string"},
              "aggregate":    {"type": "string"},
              "aggregate_id": {"type": "string"},
              "stream_id":    {"type": ["string", "null"]},
              "version":      {"type": "string"},
              "occurred_at":  {"type": "string", "format": "date-time"},
              "payload":      {"type": "object"}
            },
            "additionalProperties": false
          }' \
          "$BASE?ifExists=RETURN_OR_UPDATE" >/dev/null
        echo "Registering connector.connection.changed.v1 payload schema …"
        curl -fsS -X POST \
          -H 'Content-Type: application/json' \
          -H 'X-Registry-ArtifactId: connector.connection.changed.v1' \
          -H 'X-Registry-ArtifactType: JSON' \
          --data '{
            "$schema": "http://json-schema.org/draft-07/schema#",
            "title": "ConnectorConnectionChangedV1",
            "type": "object",
            "required": ["event_type", "aggregate", "aggregate_id", "version", "occurred_at", "name", "connector_type", "status", "payload"],
            "properties": {
              "event_type":     {"type": "string"},
              "aggregate":      {"type": "string"},
              "aggregate_id":   {"type": "string"},
              "version":        {"type": "string"},
              "occurred_at":    {"type": "string", "format": "date-time"},
              "name":           {"type": "string"},
              "connector_type": {"type": "string"},
              "status":         {"type": "string"},
              "payload":        {"type": "object"}
            },
            "additionalProperties": false
          }' \
          "$BASE?ifExists=RETURN_OR_UPDATE" >/dev/null
        echo "Done."

