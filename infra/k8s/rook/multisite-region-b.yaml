---
# S7.1.a — Region B side of the Ceph RGW multisite topology.
#
# Apply this manifest in the region-B Kubernetes cluster ONLY, and
# AFTER:
#   1. `infra/k8s/rook/multisite-region-a.yaml` is healthy in region A,
#   2. the pull token (`radosgw-admin period get`) has been copied
#      from region A to a Secret named `rgw-multisite-pull-token` in
#      `rook-ceph` namespace of region B with keys `access-key` and
#      `secret-key` (see `infra/runbooks/ceph-multisite-bootstrap.md`).
#
# Once the secondary zone catches up, region B's RGW serves the same
# bucket namespace (`openfoundry-iceberg`, etc.) in **read-only** mode
# from the local Ceph cluster. Lakekeeper region B (S7.1.b) signs URLs
# against this endpoint.
apiVersion: ceph.rook.io/v1
kind: CephObjectRealm
metadata:
  name: openfoundry
  namespace: rook-ceph
spec:
  defaultRealm: true
  pull:
    endpoint: "https://rgw-region-a.openfoundry.example.com"
---
apiVersion: ceph.rook.io/v1
kind: CephObjectZoneGroup
metadata:
  name: openfoundry-zg
  namespace: rook-ceph
spec:
  realm: openfoundry
---
apiVersion: ceph.rook.io/v1
kind: CephObjectZone
metadata:
  name: openfoundry-zone-b
  namespace: rook-ceph
spec:
  zoneGroup: openfoundry-zg
  metadataPool:
    failureDomain: zone
    replicated:
      size: 3
      requireSafeReplicaSize: true
  dataPool:
    failureDomain: zone
    erasureCoded:
      dataChunks: 4
      codingChunks: 2
    parameters:
      bulk: "true"
      compression_mode: aggressive
  preservePoolsOnDelete: true
  customEndpoints:
    - "https://rgw-region-b.openfoundry.example.com"
---
# Secondary CephObjectStore that serves the replicated bucket namespace
# from region B. Wired to `openfoundry-zone-b` so reads land on local
# OSDs while writes are forwarded to the master zone in region A
# (read-only invariant for Lakekeeper region B).
apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: rgw-data
  namespace: rook-ceph
spec:
  zone:
    name: openfoundry-zone-b
  preservePoolsOnDelete: true
  gateway:
    port: 80
    securePort: 0
    instances: 3
    placement:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: rook-ceph-rgw
              topologyKey: kubernetes.io/hostname
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    priorityClassName: system-cluster-critical
  healthCheck:
    bucket:
      disabled: false
      interval: 60s
    livenessProbe:
      disabled: false
    readinessProbe:
      disabled: false
