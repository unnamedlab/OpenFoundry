release: of-apps-ops

serviceAccount:
  create: true
  name: ""
  annotations: {}

image:
  registry: ghcr.io/openfoundry
  tag: "0.1.0"

global:
  imagePullPolicy: IfNotPresent
  imageRegistry: ""
  imagePullSecrets: []
  existingSecret: open-foundry-env
  publicWebOrigin: https://openfoundry.example.com
  labels:
    app.kubernetes.io/part-of: openfoundry
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    readOnlyRootFilesystem: false
  terminationGracePeriodSeconds: 30
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  networkPolicy:
    enabled: true
    allowSameNamespaceTraffic: true
    additionalEgressCidrs: []
  platformProfile:
    enabled: true
    configMapName: openfoundry-platform-profile
  probes:
    readiness:
      enabled: true
      path: /healthz
      initialDelaySeconds: 8
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    liveness:
      enabled: true
      path: /healthz
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
  deploymentFabric:
    cloud: kubernetes
    environment: shared
    cell: core
    region: global
    multiCloud:
      enabled: false
      activeProvider: ""
      workloadIdentity:
        awsRoleArn: ""
        gcpServiceAccount: ""
        azureClientId: ""
      providers: []
    airGap:
      enabled: false
      privateRegistry: ""
      releaseBundle: ""
      disablePublicEgress: false
      mirrorRegistries: []
      allowedEgressCidrs: []
    geoRestrictions:
      enabled: false
      allowedCountries: []
      allowedIngressCidrs: []
      allowedEgressCidrs: []
      ingressAnnotations: {}
      requiredNodeLabels: {}
      residencyLabel: ""
  cassandra:
    localDc: dc1
  kafka:
    bootstrap: ""
    topicPrefix: ""

migrations:
  pg-schemas:
    enabled: true
    dsnSecret:
      name: pg-schemas-app
      key: dsn
  pg-policy:
    enabled: true
    dsnSecret:
      name: pg-policy-app
      key: dsn
  pg-lakekeeper:
    enabled: false
    dsnSecret:
      name: pg-lakekeeper-app
      key: dsn

# FASE 7 / Tarea 7.4 — `approvals-timeout-sweep` CronJob.
# Drives the `pending → expired` transition on
# `audit_compliance.approval_requests` rows past their `expires_at`.
# Disabled by default; enable per-environment in
# values-{dev,staging,prod}.yaml once the workflow-automation-service
# image carries the second binary (see SERVICE_OVERRIDES in
# tools/regenerate_service_dockerfiles.py — the binary is bundled
# into the same container as the main service).
# Moved from `of-platform` to `of-apps-ops` as part of the S8 merge
# (the merged `workflow-automation-service` lives in this release).
approvalsTimeoutSweep:
  enabled: false
  schedule: "*/5 * * * *"
  logLevel: info
  image:
    repository: workflow-automation-service
    # Empty ⇒ inherit `global.imageTag`.
    tag: ""
  # When set, mounts DATABASE_URL from the named secret. Defaults
  # to leaving DATABASE_URL unset, expecting the operator to wire
  # it via `env`.
  databaseUrlSecretName: ""
  databaseUrlSecretKey: DATABASE_URL
  env: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

services:
  application-composition-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  notebook-runtime-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  ontology-exploratory-analysis-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  solution-design-service:
    replicas: 1
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  workflow-automation-service:
    # FASE 5 / Tarea 5.3 — the service now embeds the Foundry-pattern
    # condition consumer + effect dispatcher. KAFKA_BOOTSTRAP_SERVERS
    # is injected by the _shared helper template from
    # `global.kafka.bootstrap`; the per-service env below configures
    # the effect call to `ontology-actions-service`.
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    env:
      OF_ONTOLOGY_ACTIONS_URL: http://ontology-actions-service:8080
      OF_OPENLINEAGE_NAMESPACE: openfoundry
    envSecrets:
      OF_ONTOLOGY_ACTIONS_BEARER_TOKEN:
        secretName: open-foundry-worker-secrets
        key: ontology-actions-bearer-token
        optional: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  notification-alerting-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  audit-compliance-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  audit-sink:
    replicas: 2
    ports:
      - name: metrics
        containerPort: 9090
        servicePort: 9090
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
      prometheus.io/path: /metrics
    serviceAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
      prometheus.io/path: /metrics
    probes:
      readiness:
        path: /healthz
        port: metrics
      liveness:
        path: /healthz
        port: metrics
    env:
      ICEBERG_CATALOG_URL: http://lakekeeper.lakekeeper.svc:8181
      ICEBERG_WAREHOUSE: openfoundry-iceberg
      METRICS_ADDR: 0.0.0.0:9090
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  telemetry-governance-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  federation-product-exchange-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  code-repository-review-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  # Stub (501 on every product route) backing the gateway's
  # `GlobalBranch` upstream — see
  # services/edge-gateway-service/internal/proxy/router_table.go:285-287
  # and docs/migration/foundry-global-branching-1to1-checklist.md.
  # ADR-0030 merged this surface into code-repository-review-service;
  # this entry re-stands the binary so routes stop returning 502 while
  # the GB.* checklist is filled in.
  global-branch-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    # TODO(global-branch): add a dependency-aware readiness endpoint;
    # /healthz is liveness-only today and does not verify Postgres.
    envSecrets:
      OF_DATABASE_URL:
        secretName: global-branch-db-dsn
        key: writer_url
      OF_JWT__SECRET:
        secretName: openfoundry-jwt
        key: jwt_secret
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: "250m"
        memory: 256Mi

  sdk-generation-service:
    replicas: 1
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi

  entity-resolution-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  # ── Apps & Ops services completed (S8.6 — full coverage) ──────────
  # S8 / ADR-0030 (C2) — `app-builder-service` retired (legacy);
  # domain covered by `application-composition-service`. No Deployment
  # renders here.

  # S8 / ADR-0030 (B19) — `application-curation-service` merged →
  # `application-composition-service`. No Deployment renders here.

  # S8 / ADR-0030: `automation-operations-service` merged →
  # `workflow-automation-service` (live binary above absorbs its saga
  # substrate, `saga.step.requested.v1` consumer — group id preserved
  # — and its `automation_operations` schema migrations).
  # S8 / ADR-0030: `code-security-scanning-service` merged →
  # `code-repository-review-service` (live binary above absorbed its
  # `code_security_scans` / `code_security_findings` migrations).
  # S8 / ADR-0030: `compute-modules-control-plane-service` and
  # `compute-modules-runtime-service` were never wired (`fn main() {}`
  # stubs with no router and a single placeholder migration each). The
  # consolidation map (`docs/architecture/service-consolidation-map.md`)
  # marks both as `merged → pipeline-build-service`; runtime ownership
  # of the compute-modules domain stays with the build service.

  # S8 / ADR-0030 (B19) — `custom-endpoints-service` and
  # `developer-console-service` merged → `application-composition-service`.
  # No Deployments render here.

  # ── S8 / ADR-0030 — document-intelligence-service merged into
  # retrieval-context-service (Helm release `of-ml-aip`). It does not
  # belong to the apps-ops plane; this release no longer renders a
  # Deployment for it. ──

  # S8 / ADR-0030 — `document-reporting-service` merged →
  # `notebook-runtime-service`. The notepad domain
  # (`notepad_documents` schema, `/api/v1/notepad/*` HTTP surface)
  # now lives in the notebook runtime; no Deployment renders here.

  # S8 / ADR-0030 (B22) — `execution-observability-service` merged →
  # `telemetry-governance-service`. No Deployment renders here.

  # S8 / ADR-0030 (B20) — `geospatial-intelligence-service` merged →
  # `ontology-exploratory-analysis-service` (lives in `of-ontology`).
  # No Deployment renders here.

  # S8 / ADR-0030 (B19) — `managed-workspace-service` merged →
  # `application-composition-service`. No Deployment renders here.

  # S8 / ADR-0030 (B21) — `marketplace-service` and
  # `marketplace-catalog-service` merged →
  # `federation-product-exchange-service`. No Deployments render here.

  # S8 / ADR-0030 (B22) — `monitoring-rules-service` merged →
  # `telemetry-governance-service`. No Deployment renders here.

  # S8 / ADR-0030 (C3) — `nexus-service` retired (legacy); domain
  # covered by `tenancy-organizations-service` and
  # `federation-product-exchange-service`. No Deployment renders here.

  # S8 / ADR-0030 (B21) — `product-distribution-service` merged →
  # `federation-product-exchange-service`. No Deployment renders here.

  # S8.6 — `report-service` rescaffolded as a stub binary because the
  # edge gateway still routes `/api/v1/reports*` to a dedicated upstream
  # (router_table.go `u.Report` branch) and was returning 502s. The S8 /
  # ADR-0030 (C4) retirement remains the long-term plan (domain moves
  # into the absorbed `document-reporting` module in
  # `notebook-runtime-service`); until that wiring lands, this Deployment
  # serves a structured 501 envelope so the frontend renders a typed
  # error instead.
  report-service:
    replicas: 2
    ports:
      - name: http
        containerPort: 8080
    # TODO(report): add a dependency-aware readiness endpoint before
    # wiring live report storage; /healthz only proves the process is up.
    envSecrets:
      OF_JWT__SECRET:
        secretName: openfoundry-jwt
        key: jwt_secret
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: "200m"
        memory: 256Mi

  # S8 / ADR-0030 (B20) — `scenario-simulation-service` merged →
  # `ontology-exploratory-analysis-service` (lives in `of-ontology`).
  # No Deployment renders here.

  # S8 / ADR-0030 (B15) — `sds-service` merged →
  # `audit-compliance-service` (lives in `of-platform`). No
  # Deployment renders here.

  # S8 / ADR-0030 — `spreadsheet-computation-service` merged →
  # `notebook-runtime-service`. The source was a scaffold placeholder
  # (`fn main() {}`, generic CRUD over `spreadsheet_sheets` /
  # `spreadsheet_recalcs`); schema preserved on `notebook-pg`. No
  # Deployment renders here.

  tabular-analysis-service:
    # S8 / ADR-0030: retired — merged into `sql-bi-gateway-service`
    # under the of-data-engine release. The `tabular_analysis_jobs`
    # and `tabular_analysis_results` schemas are migrated by the
    # gateway's pre-install Job
    # (`infra/helm/apps/of-data-engine/templates/sql-bi-gateway-migrations.yaml`).
    enabled: false

  # S8 / ADR-0030: `workflow-trace-service` merged → `lineage-service`
  # (lives in `of-data-engine`). `workflow_trace_runs` and
  # `workflow_trace_events` schemas applied by lineage-service against
  # the `lineage-pg` cluster. No Deployment renders here.
