---
# Medusa backup bucket for production. One ObjectBucketClaim per
# environment so the credentials surface as a Secret in-namespace and
# can be wired into the K8ssandraCluster `medusa.storageSecretRef`.
#
# The Ceph S3 endpoint resolves to `rook-ceph-rgw-rgw-data.rook-ceph.svc`
# (see infra/k8s/platform/manifests/rook). Bucket pattern matches `infra/k8s/platform/manifests/rook/bucket.yaml`.
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: cassandra-backups-prod
  namespace: cassandra
spec:
  generateBucketName: cassandra-backups-prod
  storageClassName: ceph-bucket
  additionalConfig:
    # 30-day lifecycle aligns with `maxBackupAge` in the
    # K8ssandraCluster medusa block. RGW will GC objects past the
    # retention even if Medusa loses track of them.
    bucketLifecycle: |
      <LifecycleConfiguration>
        <Rule>
          <ID>medusa-retention</ID>
          <Status>Enabled</Status>
          <Expiration>
            <Days>35</Days>
          </Expiration>
        </Rule>
      </LifecycleConfiguration>
---
# Translate the OBC-generated Secret/ConfigMap into the exact key
# names Medusa expects (`medusa-bucket-key`, `medusa-bucket-secret`).
# k8ssandra-operator reads the storageSecretRef by these keys.
apiVersion: v1
kind: Secret
metadata:
  name: medusa-bucket-credentials
  namespace: cassandra
  annotations:
    # Populate via ExternalSecret in real clusters; this manifest
    # documents the contract. Plain placeholder values fail-loud.
    openfoundry.dev/source: "ObjectBucketClaim/cassandra-backups-prod"
type: Opaque
stringData:
  medusa_bucket_key: REPLACE_FROM_OBC_SECRET_AWS_ACCESS_KEY_ID
  medusa_bucket_secret: REPLACE_FROM_OBC_SECRET_AWS_SECRET_ACCESS_KEY
