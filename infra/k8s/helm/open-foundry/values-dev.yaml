global:
  existingSecret: open-foundry-dev-env
  podDisruptionBudget:
    enabled: false
  ingress:
    enabled: false
  networkPolicy:
    enabled: false

# Dev keeps the S3-compatible backend served by RustFS (Apache-2.0).
# We do NOT use MinIO here. RustFS speaks the S3 API, so the
# `libs/storage-abstraction` layer remains untouched.
objectStore:
  backend: rustfs
  endpoint: http://rustfs:9000

services:
  gateway:
    replicas: 1
    autoscaling:
      minReplicas: 1
      maxReplicas: 2
      keda:
        enabled: false
  identity-federation-service:
    replicas: 1
    autoscaling:
      minReplicas: 1
      maxReplicas: 2
  data-asset-catalog-service:
    replicas: 1
    autoscaling:
      minReplicas: 1
      maxReplicas: 3
  sql-bi-gateway-service:
    replicas: 1
    env:
      DISTRIBUTED_QUERY_WORKERS: "2"
    autoscaling:
      minReplicas: 1
      maxReplicas: 3
      keda:
        enabled: false
  pipeline-authoring-service:
    replicas: 1
    autoscaling:
      minReplicas: 1
      maxReplicas: 3
      keda:
        enabled: false
  geospatial-intelligence-service:
    replicas: 1
    autoscaling:
      minReplicas: 1
      maxReplicas: 2
