# Prometheus scrape config for Temporal server tiers.
# Worker-side metrics (Go SDK) are scraped from the workers-go/*
# deployments — see workers-go/README.md once S2.2 lands.

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: temporal-server
  namespace: temporal
  labels:
    app.kubernetes.io/part-of: temporal
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: temporal
  namespaceSelector:
    matchNames: [temporal]
  endpoints:
    # Frontend
    - port: metrics
      path: /metrics
      interval: 30s
      relabelings:
        - { sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_component], targetLabel: component }
    # History
    - port: metrics-history
      path: /metrics
      interval: 30s
    # Matching
    - port: metrics-matching
      path: /metrics
      interval: 30s
    # System worker
    - port: metrics-worker
      path: /metrics
      interval: 30s
---
# Companion PrometheusRule with the burn-rate alerts that mirror the
# freeze policy of ADR-0012 §3 (general) and §A.5 (ontology hot path).
# Temporal-specific budgets land here when ADR-0012 incorporates the
# Temporal SLOs; for now we ship the basic liveness alerts only.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: temporal-liveness
  namespace: temporal
  labels:
    app.kubernetes.io/part-of: temporal
    release: kube-prometheus-stack
spec:
  groups:
    - name: temporal-liveness
      rules:
        - alert: TemporalFrontendDown
          expr: up{job=~"temporal.*frontend.*"} == 0
          for: 5m
          labels:
            severity: critical
            runbook: infra/runbooks/temporal.md#frontend-down
          annotations:
            summary: "Temporal frontend pod down"
            description: "{{ $labels.pod }} ha estado down >5m; ver runbook."
        - alert: TemporalHistoryShardOwnershipFlapping
          expr: |
            increase(history_shard_controller_requests_total{operation="acquire"}[15m]) > 50
          for: 15m
          labels:
            severity: warning
            runbook: infra/runbooks/temporal.md#history-shard-flapping
          annotations:
            summary: "History shards rebalancing repeatedly"
            description: "Posible inestabilidad de pods history o split-brain en Cassandra."
        - alert: TemporalCassandraPersistenceErrors
          expr: |
            sum by (operation) (
              rate(persistence_errors_with_type{store="cassandra"}[5m])
            ) > 0.05
          for: 10m
          labels:
            severity: warning
            runbook: infra/runbooks/temporal.md#cassandra-persistence-errors
          annotations:
            summary: "Persistence errors > 5 % en operación {{ $labels.operation }}"
            description: "Inspeccionar nodetool status y latencias de Cassandra."
