# Helm values for the official Trino chart.
#
# Chart coordinates (verify before each upgrade):
#   repository: https://trinodb.github.io/charts/
#   chart:      trino
#   alt OCI:    oci://ghcr.io/trinodb/charts/trino
#
# Install:
#   helm repo add trino https://trinodb.github.io/charts/
#   helm upgrade --install trino trino/trino \
#     -n trino --create-namespace \
#     -f infra/k8s/trino/values.yaml
#
# Catalog ConfigMaps in this directory are applied separately and mounted into
# both coordinator and worker pods at /etc/trino/catalog via the
# `additionalVolumes` / `additionalVolumeMounts` blocks below. The chart's
# native `catalogs:` field is intentionally left empty to avoid double-mounting
# the same path.

image:
  repository: trinodb/trino
  # Pin to a known-good Trino LTS at deploy time; bump in a dedicated PR.
  tag: "443"
  pullPolicy: IfNotPresent

server:
  # Worker pod count. Adjust per workload; HPA may also drive this.
  workers: 6
  node:
    environment: production
    dataDir: /data/trino
  log:
    trino:
      level: INFO
  config:
    # Required when more than one coordinator pod is running so the
    # discovery service and internal HTTPS handshake share a secret.
    # Provide via existing Secret `trino-internal-shared-secret` (key
    # `shared-secret`); see runbook for rotation.
    query:
      maxMemory: "50GB"
    https:
      enabled: false  # Linkerd mTLS terminates TLS between pods; intra-cluster HTTP is fine.
    authenticationType: ""  # Set to "JWT" when external auth is enabled (see auth section).

# -----------------------------------------------------------------------------
# Coordinator: HA pair with leader election (Trino >= 425 experimental).
# A standby coordinator joins the cluster and becomes active if the primary
# disappears. With Linkerd injection (see annotations), pod-to-pod traffic is
# mTLS-protected automatically.
# -----------------------------------------------------------------------------
coordinator:
  replicas: 2
  jvm:
    maxHeapSize: "8G"
    gcMethod:
      type: "UseG1GC"
      g1:
        heapRegionSize: "32M"
  config:
    memory:
      heapHeadroomPerNode: "2GB"
    query:
      maxMemoryPerNode: "4GB"
  additionalConfigProperties:
    # Experimental multi-coordinator HA. Only one coordinator answers queries
    # at a time; the other stays warm for failover. Discovery happens via the
    # in-cluster Service, so no external coordinator needs to be configured.
    - "experimental.coordinator.high-availability.enabled=true"
    - "discovery.uri=http://trino:8080"
    - "node-scheduler.include-coordinator=false"
  resources:
    requests:
      cpu: "2"
      memory: 10Gi
    limits:
      cpu: "4"
      memory: 12Gi
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: ["coordinator"]
          topologyKey: kubernetes.io/hostname
  annotations:
    # Linkerd injects a sidecar that provides automatic mTLS for all pod-to-pod
    # traffic, satisfying the "internal authentication via mTLS" requirement
    # without configuring TLS keystores inside Trino itself.
    linkerd.io/inject: enabled
  # Mount the standalone catalog ConfigMaps as files under /etc/trino/catalog.
  additionalVolumes:
    - name: catalog-iceberg
      configMap:
        name: trino-catalog-iceberg
    - name: catalog-postgresql
      configMap:
        name: trino-catalog-postgresql
    - name: catalog-kafka
      configMap:
        name: trino-catalog-kafka
  additionalVolumeMounts:
    - name: catalog-iceberg
      mountPath: /etc/trino/catalog/iceberg.properties
      subPath: iceberg.properties
    - name: catalog-postgresql
      mountPath: /etc/trino/catalog/postgresql.properties
      subPath: postgresql.properties
    - name: catalog-kafka
      mountPath: /etc/trino/catalog/kafka.properties
      subPath: kafka.properties

# -----------------------------------------------------------------------------
# Worker: 6 stateless replicas, scaled horizontally. Same catalog mounts so
# any worker can read from any source. No PDB at this layer — workers are
# fungible and the cluster keeps running while individual pods restart.
# -----------------------------------------------------------------------------
worker:
  replicas: 6  # mirrors `server.workers`; chart uses both keys for templating
  jvm:
    maxHeapSize: "16G"
    gcMethod:
      type: "UseG1GC"
      g1:
        heapRegionSize: "32M"
  config:
    memory:
      heapHeadroomPerNode: "4GB"
    query:
      maxMemoryPerNode: "8GB"
  resources:
    requests:
      cpu: "4"
      memory: 20Gi
    limits:
      cpu: "8"
      memory: 24Gi
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values: ["worker"]
            topologyKey: kubernetes.io/hostname
  annotations:
    linkerd.io/inject: enabled
  additionalVolumes:
    - name: catalog-iceberg
      configMap:
        name: trino-catalog-iceberg
    - name: catalog-postgresql
      configMap:
        name: trino-catalog-postgresql
    - name: catalog-kafka
      configMap:
        name: trino-catalog-kafka
  additionalVolumeMounts:
    - name: catalog-iceberg
      mountPath: /etc/trino/catalog/iceberg.properties
      subPath: iceberg.properties
    - name: catalog-postgresql
      mountPath: /etc/trino/catalog/postgresql.properties
      subPath: postgresql.properties
    - name: catalog-kafka
      mountPath: /etc/trino/catalog/kafka.properties
      subPath: kafka.properties

# -----------------------------------------------------------------------------
# Catalogs: managed externally as standalone ConfigMaps (see *-configmap.yaml
# in this directory). Leaving this empty so the chart does not generate its
# own competing /etc/trino/catalog mount.
# -----------------------------------------------------------------------------
catalogs: {}
additionalCatalogs: {}

service:
  type: ClusterIP
  port: 8080
  annotations: {}

serviceAccount:
  create: true
  name: trino

# -----------------------------------------------------------------------------
# Authentication.
#
# Internal (pod-to-pod) authentication is provided by Linkerd mTLS via the
# `linkerd.io/inject: enabled` annotations above. No additional configuration
# inside Trino is required for that.
#
# External (client -> coordinator) authentication uses JWT issued by the
# platform IdP. The block below is rendered only if you also set
# `server.config.authenticationType=JWT`. Tokens are validated against the
# JWKS endpoint exposed by the IdP.
# -----------------------------------------------------------------------------
auth:
  passwordAuth: ""  # disabled
# JWT settings rendered into etc/jwt-authenticator.properties when needed.
# Move into server.additionalConfigProperties or a values overlay when the
# IdP coordinates are known:
#   - "http-server.authentication.type=JWT"
#   - "http-server.authentication.jwt.key-file=https://idp.openfoundry.svc/.well-known/jwks.json"
#   - "http-server.authentication.jwt.required-issuer=https://idp.openfoundry"
#   - "http-server.authentication.jwt.required-audience=trino"

ingress:
  enabled: false  # exposed through the platform gateway, not directly

# Disable the chart's own PDB; we ship our own (coordinator-pdb.yaml) with
# minAvailable=1 to keep at least one coordinator scheduled during voluntary
# disruptions.
serverCoordinatorPodDisruptionBudget:
  enabled: false
serverWorkerPodDisruptionBudget:
  enabled: false
