name: CI — Rust

on:
  push:
    branches: [main]
    paths: ["libs/**", "services/**", "tools/**", "smoke/**", "Cargo.*", "proto/**", ".github/workflows/ci.yml", "justfile"]
  pull_request:
    branches: [main]
    paths: ["libs/**", "services/**", "tools/**", "smoke/**", "Cargo.*", "proto/**", ".github/workflows/ci.yml", "justfile"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  SQLX_OFFLINE: "true"

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-for-ci-only
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test
      JWT_SECRET: test-secret-for-ci-only
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build smoke stack
        run: cargo build -p of-cli -p gateway -p auth-service -p data-connector -p dataset-service -p pipeline-service -p query-service -p streaming-service -p report-service -p geospatial-service -p audit-service -p ontology-service -p app-builder-service -p code-repo-service -p marketplace-service -p nexus-service -p ai-service -p ml-service
      - name: Prepare service databases
        env:
          PGPASSWORD: test
        run: |
          psql -h localhost -U test -d postgres \
            -c "DROP DATABASE IF EXISTS of_auth;" \
            -c "DROP DATABASE IF EXISTS of_connectors;" \
            -c "DROP DATABASE IF EXISTS of_datasets;" \
            -c "DROP DATABASE IF EXISTS of_pipelines;" \
            -c "DROP DATABASE IF EXISTS of_streaming;" \
            -c "DROP DATABASE IF EXISTS of_queries;" \
            -c "DROP DATABASE IF EXISTS of_reports;" \
            -c "DROP DATABASE IF EXISTS of_geospatial;" \
            -c "DROP DATABASE IF EXISTS of_audit;" \
            -c "DROP DATABASE IF EXISTS of_ontology;" \
            -c "DROP DATABASE IF EXISTS of_app_builder;" \
            -c "DROP DATABASE IF EXISTS of_code_repos;" \
            -c "DROP DATABASE IF EXISTS of_marketplace;" \
            -c "DROP DATABASE IF EXISTS of_nexus;" \
            -c "DROP DATABASE IF EXISTS of_ai;" \
            -c "DROP DATABASE IF EXISTS of_ml;" \
            -c "CREATE DATABASE of_auth;" \
            -c "CREATE DATABASE of_connectors;" \
            -c "CREATE DATABASE of_datasets;" \
            -c "CREATE DATABASE of_pipelines;" \
            -c "CREATE DATABASE of_streaming;" \
            -c "CREATE DATABASE of_queries;" \
            -c "CREATE DATABASE of_reports;" \
            -c "CREATE DATABASE of_geospatial;" \
            -c "CREATE DATABASE of_audit;" \
            -c "CREATE DATABASE of_ontology;" \
            -c "CREATE DATABASE of_app_builder;" \
            -c "CREATE DATABASE of_code_repos;" \
            -c "CREATE DATABASE of_marketplace;" \
            -c "CREATE DATABASE of_nexus;" \
            -c "CREATE DATABASE of_ai;" \
            -c "CREATE DATABASE of_ml;"
      - name: Run critical-path smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/of-datasets /tmp/of-stream-archive /tmp/of-smoke-logs /tmp/of-code-repos

          print_logs() {
            for file in /tmp/of-smoke-logs/*.log; do
              if [[ -f "$file" ]]; then
                echo "::group::$(basename "$file")"
                cat "$file"
                echo "::endgroup::"
              fi
            done
          }

          cleanup() {
            jobs -p | xargs -r kill || true
          }

          trap 'status=$?; if [[ $status -ne 0 ]]; then print_logs; fi; cleanup' EXIT

          DATABASE_URL=postgres://test:test@localhost:5432/of_auth JWT_SECRET="$JWT_SECRET" target/debug/auth-service > /tmp/of-smoke-logs/auth-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_connectors JWT_SECRET="$JWT_SECRET" target/debug/data-connector > /tmp/of-smoke-logs/data-connector.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_datasets JWT_SECRET="$JWT_SECRET" STORAGE_BACKEND=local LOCAL_STORAGE_ROOT=/tmp/of-datasets target/debug/dataset-service > /tmp/of-smoke-logs/dataset-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_pipelines JWT_SECRET="$JWT_SECRET" DATASET_SERVICE_URL=http://127.0.0.1:50053 STORAGE_BACKEND=local LOCAL_STORAGE_ROOT=/tmp/of-datasets target/debug/pipeline-service > /tmp/of-smoke-logs/pipeline-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_streaming JWT_SECRET="$JWT_SECRET" DATASET_SERVICE_URL=http://127.0.0.1:50053 ARCHIVE_DIR=/tmp/of-stream-archive target/debug/streaming-service > /tmp/of-smoke-logs/streaming-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_queries JWT_SECRET="$JWT_SECRET" target/debug/query-service > /tmp/of-smoke-logs/query-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_reports JWT_SECRET="$JWT_SECRET" DATASET_SERVICE_URL=http://127.0.0.1:50053 GEOSPATIAL_SERVICE_URL=http://127.0.0.1:50068 target/debug/report-service > /tmp/of-smoke-logs/report-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_geospatial JWT_SECRET="$JWT_SECRET" target/debug/geospatial-service > /tmp/of-smoke-logs/geospatial-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_audit JWT_SECRET="$JWT_SECRET" target/debug/audit-service > /tmp/of-smoke-logs/audit-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_ontology JWT_SECRET="$JWT_SECRET" AUDIT_SERVICE_URL=http://127.0.0.1:50070 target/debug/ontology-service > /tmp/of-smoke-logs/ontology-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_app_builder JWT_SECRET="$JWT_SECRET" PUBLIC_BASE_URL=http://127.0.0.1:8080/apps/runtime target/debug/app-builder-service > /tmp/of-smoke-logs/app-builder-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_code_repos JWT_SECRET="$JWT_SECRET" REPO_STORAGE_ROOT=/tmp/of-code-repos target/debug/code-repo-service > /tmp/of-smoke-logs/code-repo-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_marketplace JWT_SECRET="$JWT_SECRET" APP_BUILDER_SERVICE_URL=http://127.0.0.1:50063 target/debug/marketplace-service > /tmp/of-smoke-logs/marketplace-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_nexus JWT_SECRET="$JWT_SECRET" target/debug/nexus-service > /tmp/of-smoke-logs/nexus-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_ai JWT_SECRET="$JWT_SECRET" target/debug/ai-service > /tmp/of-smoke-logs/ai-service.log 2>&1 &
          DATABASE_URL=postgres://test:test@localhost:5432/of_ml JWT_SECRET="$JWT_SECRET" target/debug/ml-service > /tmp/of-smoke-logs/ml-service.log 2>&1 &
          target/debug/of mock-provider serve --host 127.0.0.1 --port 50110 > /tmp/of-smoke-logs/mock-provider.log 2>&1 &
          JWT_SECRET="$JWT_SECRET" \
            DATA_CONNECTOR_SERVICE_URL=http://127.0.0.1:50052 \
            DATASET_SERVICE_URL=http://127.0.0.1:50053 \
            QUERY_SERVICE_URL=http://127.0.0.1:50055 \
            PIPELINE_SERVICE_URL=http://127.0.0.1:50056 \
            STREAMING_SERVICE_URL=http://127.0.0.1:50054 \
            ONTOLOGY_SERVICE_URL=http://127.0.0.1:50057 \
            AUDIT_SERVICE_URL=http://127.0.0.1:50070 \
            APP_BUILDER_SERVICE_URL=http://127.0.0.1:50063 \
            CODE_REPO_SERVICE_URL=http://127.0.0.1:50065 \
            MARKETPLACE_SERVICE_URL=http://127.0.0.1:50066 \
            AI_SERVICE_URL=http://127.0.0.1:50060 \
            ML_SERVICE_URL=http://127.0.0.1:50059 \
            target/debug/gateway > /tmp/of-smoke-logs/gateway.log 2>&1 &

          for url in \
            http://127.0.0.1:50051/health \
            http://127.0.0.1:50052/health \
            http://127.0.0.1:50053/health \
            http://127.0.0.1:50055/health \
            http://127.0.0.1:50056/health \
            http://127.0.0.1:50054/health \
            http://127.0.0.1:50064/health \
            http://127.0.0.1:50068/health \
            http://127.0.0.1:50070/health \
            http://127.0.0.1:50057/health \
            http://127.0.0.1:50063/health \
            http://127.0.0.1:50065/health \
            http://127.0.0.1:50066/health \
            http://127.0.0.1:50067/health \
            http://127.0.0.1:50060/health \
            http://127.0.0.1:50059/health \
            http://127.0.0.1:50110/health \
            http://127.0.0.1:8080/health
          do
            for attempt in $(seq 1 30); do
              if curl -sf "$url" >/dev/null; then
                break
              fi
              if [[ "$attempt" -eq 30 ]]; then
                echo "Service not ready: $url"
                exit 1
              fi
              sleep 2
            done
          done

          JWT_SECRET="$JWT_SECRET" target/debug/of smoke run \
            --scenario smoke/scenarios/p2-runtime-critical-path.json \
            --output smoke/results/p2-runtime-critical-path.json

          JWT_SECRET="$JWT_SECRET" target/debug/of smoke run \
            --scenario smoke/scenarios/p3-semantic-governance-critical-path.json \
            --output smoke/results/p3-semantic-governance-critical-path.json

          JWT_SECRET="$JWT_SECRET" target/debug/of smoke run \
            --scenario smoke/scenarios/p4-developer-platform-critical-path.json \
            --output smoke/results/p4-developer-platform-critical-path.json

          JWT_SECRET="$JWT_SECRET" target/debug/of smoke run \
            --scenario smoke/scenarios/p5-ai-ml-critical-path.json \
            --output smoke/results/p5-ai-ml-critical-path.json

          JWT_SECRET="$JWT_SECRET" target/debug/of smoke run \
            --scenario smoke/scenarios/p6-analytics-enterprise-critical-path.json \
            --output smoke/results/p6-analytics-enterprise-critical-path.json

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
