[workspace.dependencies.audit-trail]
path = "libs/audit-trail"

[workspace.dependencies.auth-middleware]
path = "libs/auth-middleware"

[workspace.dependencies.axum]
version = "0.8"
features = ["macros", "ws"]

[workspace.dependencies.axum-extra]
version = "0.10"
features = ["typed-header"]

[workspace.dependencies.chrono]
version = "0.4"
features = ["serde"]

[workspace.dependencies.core-models]
path = "libs/core-models"

[workspace.dependencies.event-bus-control]
path = "libs/event-bus-control"

[workspace.dependencies.event-bus-data]
path = "libs/event-bus-data"

[workspace.dependencies.geospatial-core]
path = "libs/geospatial-core"

[workspace.dependencies.hyper]
version = "1"

[workspace.dependencies.object_store]
version = "0.11"
features = ["aws", "gcp", "azure"]

[workspace.dependencies.ontology-kernel]
path = "libs/ontology-kernel"

[workspace.dependencies.plugin-sdk]
path = "libs/plugin-sdk"

[workspace.dependencies.pyo3]
version = "0.22"
features = ["auto-initialize"]

[workspace.dependencies.query-engine]
path = "libs/query-engine"

[workspace.dependencies.redis]
version = "0.27"
features = ["tokio-comp", "connection-manager"]

[workspace.dependencies.reqwest]
version = "0.12"
features = ["json", "rustls-tls"]
default-features = false

[workspace.dependencies.serde]
version = "1"
features = ["derive"]

[workspace.dependencies.sqlx]
version = "0.8"
features = ["runtime-tokio", "tls-rustls", "postgres", "uuid", "chrono", "json", "migrate"]

[workspace.dependencies.storage-abstraction]
path = "libs/storage-abstraction"

[workspace.dependencies.testing]
path = "libs/testing"

[workspace.dependencies.tokio]
version = "1"
features = ["full"]

[workspace.dependencies.tonic]
version = "0.12"
features = ["tls"]

[workspace.dependencies.tower]
version = "0.5"
features = ["full"]

[workspace.dependencies.tower-http]
version = "0.6"
features = ["cors", "trace", "request-id", "compression-gzip"]

[workspace.dependencies.tracing-subscriber]
version = "0.3"
features = ["env-filter", "json"]

[workspace.dependencies.url]
version = "2"
features = ["serde"]

[workspace.dependencies.uuid]
version = "1"
features = ["v7", "serde"]

[workspace.dependencies.vector-store]
path = "libs/vector-store"

[workspace.package]
edition = "2024"
version = "0.0.1"
license = "AGPL-3.0-only"
repository = "https://github.com/open-foundry/open-foundry"
rust-version = "1.85"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true

[profile.docker-release]
inherits = "release"
lto = "off"
codegen-units = 16
incremental = true

[profile.release.package]

[profile.dev]
opt-level = 0
debug = true

[profile.dev.package]

# Local patch: arrow-arith 53.4.0 calls `d.quarter()` ambiguously between
# `chrono::Datelike::quarter()` (added upstream in chrono 0.4.40) and
# `arrow_arith::temporal::ChronoDateExt::quarter()`. Newer chrono is pulled in
# by `iceberg = ^0.9` (transitive `chrono = ^0.4.41`) and we cannot downgrade.
# `vendor/arrow-arith/` is a verbatim copy of 53.4.0 with one disambiguation
# (see vendor/arrow-arith/src/temporal.rs:91). Drop this once we move to
# datafusion >= 53 / arrow-arith >= 53.4.1.
[patch.crates-io]
arrow-arith = { path = "vendor/arrow-arith" }
