[package]
name = "connector-management-service"
description = "Connector catalog, connections, and capability management"

[package.edition]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[package.rust-version]
workspace = true

[dependencies]
csv = "1.3"
sha2 = "0.10"
hmac = "0.12"
aes-gcm = "0.10"
arrow-array = "53"
arrow-schema = "53"
arrow-ipc = "53"
aws-config = { version = "1", default-features = false, features = ["rustls", "rt-tokio"] }
aws-sdk-sts = { version = "1", default-features = false, features = ["rustls", "rt-tokio"] }
aws-sdk-kinesis = { version = "1", default-features = false, features = ["rustls", "rt-tokio"] }
rumqttc = { version = "0.24", default-features = false, features = ["use-rustls"] }
prometheus = { workspace = true }

[dependencies.async-trait]
workspace = true

[dependencies.rand]
workspace = true

[dependencies.tonic]
workspace = true

[dependencies.prost]
workspace = true

[build-dependencies.tonic-build]
workspace = true

[dependencies.auth-middleware]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.config]
workspace = true

[dependencies.core-models]
workspace = true

[dependencies.event-bus-control]
workspace = true

[features]
default = []
# Enables the live Kafka I/O path (rdkafka via librdkafka) in
# `connectors::kafka`. Default off keeps CI light and the catalog-backed
# behaviour available; production builds turn it on through the Dockerfile.
kafka-rdkafka = ["event-bus-control/kafka-rdkafka"]
# E2E feature flags — gate the integration tests under `tests/`. Each
# requires Docker plus the corresponding workspace toolchain. Default-off
# keeps `cargo test` light; opt in with e.g.
# `cargo test -p connector-management-service --features kafka-it --test kafka_real_broker -- --ignored`.
kafka-it = []
postgres-it = []
s3-it = []
schema-registry-it = []

[dependencies.reqwest]
workspace = true
features = ["multipart"]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.storage-abstraction]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.object_store]
workspace = true

[dependencies.bytes]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.jsonwebtoken]
workspace = true

[dependencies.url]
workspace = true

[dependencies.uuid]
workspace = true

[[bin]]
path = "src/main.rs"
name = "connector-management-service"
required-features = []
